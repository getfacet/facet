# Execution Manifest: Screens + Declarative View Actions (behavior language, phase 1)
#
# Keep synchronized with specs/dev-specs/screens-view-actions.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "screens-view-actions"
spec_path: "specs/dev-specs/screens-view-actions.md"
context_evidence_path: "specs/context/screens-view-actions.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; playground buildable for WU-7 visual sanity and the DC-007 live dogfood"
    owner: "main-agent"
    verification: "pnpm --filter @facet/playground dev reachable on port 5290"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"

# Final gate chain (main agent):
#   /update-tests -> /verify -> /code-review (P0-P2 = 0) -> /update-docs
#   -> DC-007 live dogfood (main-agent manual: playground serve + facet-bridge,
#      multi-screen page, instant navigate/toggle with agent idle; record in PR)
#   -> squash to one feature commit; commit/PR on the user's explicit go.

work_units:
  - id: "WU-1"
    title: "Core vocabulary — action union, screens/entry/hidden shape, validateTree normalization"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Land the source-compatible FacetAction union, BoxNode.hidden, and FacetTree.screens/entry, with validateTree as the single fail-safe normalization point, leaving the whole repo green."
    files:
      - path: "packages/core/src/nodes.ts"
        change_type: "update"
        purpose: "AgentAction (kind optional) / NavigateAction / ToggleAction / FacetAction union; BoxNode.hidden?: boolean"
      - path: "packages/core/src/tree.ts"
        change_type: "update"
        purpose: "FacetTree.screens?: Readonly<Record<string, NodeId>> + entry?: string (named roots into the shared flat map); EMPTY_TREE unchanged"
      - path: "packages/core/src/validate.ts"
        change_type: "update"
        purpose: "asAction union normalization + issues; hidden coercion; screens/entry sanitize (box-target rule, entry fallback); breakCycles from root + every kept screen root"
      - path: "packages/core/src/validate.test.ts"
        change_type: "update"
        purpose: "RED-first tests: legacy stamp, unknown-kind strip, malformed to/target strip, screens/entry sanitize, hidden coercion, cyclic/deep non-entry screen, legacy screenless pass-through"
      - path: "apps/playground/src/generated.tsx"
        change_type: "update"
        purpose: "setLastAction(action.name ?? null) — sole repo-wide compile break from the union (consumer sweep verified)"
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts -t 'normalizes a legacy onPress action to kind agent'"
      target: "packages/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts -t 'normalizes a legacy onPress action to kind agent'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "unit"
        target: "packages/core/src/validate.test.ts"
        covers_dc: ["DC-004", "DC-005", "DC-006"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "pnpm typecheck green repo-wide; only generated.tsx changed outside core"
      - "validateTree never throws on every new malformed-shape case; existing validate tests untouched and green"
      - "No regression: pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

