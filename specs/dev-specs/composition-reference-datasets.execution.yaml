# Execution Manifest: Composition Reference Datasets
# Mirror: specs/dev-specs/composition-reference-datasets.md

feature_slug: "composition-reference-datasets"
spec_path: "specs/dev-specs/composition-reference-datasets.md"
context_evidence_path: "specs/context/composition-reference-datasets.md"
intake_brief_path: "specs/feature-intake/composition-reference-datasets.md"
baseline_commit: "89175af6edef1cb9df8dfa2bd779abc4ea309b1a"
approval_status: "awaiting-owner-approval"

shared_preflight:
  - concern: "isolated-worktree"
    requirement: "Run /worktree-prep only after owner approval; preserve the four untracked display-leaf-compositions spec files in the source checkout."
    owner: "main-agent"
    verification: "git status --short; worktree path/branch report"
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts."
    owner: "main-agent"
    verification: "record commands and first failing line if any"
  - concern: "package-builds"
    requirement: "All eight affected public packages build before implementation."
    owner: "main-agent"
    verification: "pnpm --filter @facet/core --filter @facet/runtime --filter @facet/assets --filter @facet/agent-tools --filter @facet/reference-agent --filter @facet/quickstart --filter @facet/agent --filter @facet/store-postgres build"

execution_policy:
  tdd: "For each behavioral WU, change/add its target test first, run red_check and record FAIL, implement to GREEN, then refactor and run quick/no-regression checks."
  file_ownership: "Each planned file is owned by exactly one WU; max five files per WU."
  combined_check: "After WU-1..WU-20 and WU-26, run pnpm typecheck before the hard gate."
  docs_stage: "WU-21..WU-25 execute inside final /update-docs, whose final evidence invokes the already-reviewed WU-26 scanner."
  no_compatibility: "Do not add aliases, fallback parsing, dual tools, or deprecated expansion paths."

review_fix_policy:
  batching_rule: "Batch review comments by WU. Apply scoped fixes, rerun the WU quick checks, then rerun /verify and /code-review for the batch."
  work_unit_scope: "Only listed files unless the main agent updates both spec and manifest with owner-visible evidence."
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"
  required_extras:
    - "pnpm package:smoke"
    - "Tier 2 provider smoke is blocking; missing OPENAI_API_KEY/ANTHROPIC_API_KEY is FAIL."
    - "Tier 3 both-provider smoke before merge/release."

handoff_format:
  - "changed_files"
  - "executed_commands"
  - "red_check_output_before"
  - "red_check_output_after"
  - "green_diff_summary"
  - "refactor_decision"
  - "pass_fail"
  - "first_error_line"
  - "assumptions"
  - "next_action"

wu_defaults: &wu_defaults
  done_conditions:
    - "RED-to-GREEN evidence reported; an N/A WU records and satisfies its narrow justification."
    - "The WU objective and listed file purposes are complete with no compatibility shim."
    - "quick_checks and no_regression_checks pass, or the first blocking line is reported."
  handoff_format:
    - "changed_files"
    - "executed_commands"
    - "red_check_output_before"
    - "red_check_output_after"
    - "green_diff_summary"
    - "refactor_decision"
    - "pass_fail"
    - "first_error_line"
    - "assumptions"
    - "next_action"

work_units:
