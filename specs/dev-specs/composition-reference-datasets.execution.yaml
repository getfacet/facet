  - "pnpm exec vitest run packages/agent-stack/agent-tools/src packages/agent-stack/reference-agent/src"
  - "pnpm exec vitest run packages/agent-stack/quickstart/src/cli.test.ts packages/agent-stack/quickstart/src/quickstart.e2e.test.ts"
  - "pnpm exec vitest run packages/extensions/agent/src packages/extensions/store-postgres/src/postgres-assets.test.ts"
  - "pnpm exec vitest run apps/playground/src/App.test.ts apps/playground/src/generator.test.ts"
  - "node --test scripts/check-composition-hard-cut.test.mjs"

shipping_surface_searches:
  archive_exclusion: "Do not search or rewrite specs/**; it is historical evidence. Preserve user-owned untracked display-leaf specs."
  commands:
    - "node --test scripts/check-composition-hard-cut.test.mjs"
    - "node scripts/check-composition-hard-cut.mjs"
  expectation: "Scanner treats rg exit 1 as clean, exit 0 as a match set, and >1 as an error; zero unannotated shipping legacy hits. Negative-test lines require the exact composition-hard-cut: allowed-negative annotation; no broad waiver."

live_test:
  tier_1: "All blocking: verdict policy; quickstart E2E twice; built bundle; journey harness."
  tier_2:
    required: true
    command: "pnpm exec vitest run --config packages/agent-stack/quickstart/e2e/vitest.config.ts packages/agent-stack/quickstart/e2e/smoke.test.ts"
    missing_key_policy: "FAIL"
  tier_3:
    when: "pre-merge/release"
    command: "FACET_SMOKE_PROVIDERS=both pnpm exec vitest run --config packages/agent-stack/quickstart/e2e/vitest.config.ts packages/agent-stack/quickstart/e2e/smoke.test.ts"

approval_gate:
