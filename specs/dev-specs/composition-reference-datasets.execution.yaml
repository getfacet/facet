  - id: "WU-26"
    <<: *wu_defaults
    title: "Deterministic shipping hard-cut scanner"
    owner_role: "implementer"
    packages: ["repository-tooling"]
    objective: "Build and unit-test the deterministic scanner before code review; final /update-docs later invokes it against converged shipping surfaces."
    module_shape:
      decision: "focused-quality-script"
      rationale: "A tested scanner can distinguish rg no-hit, hit, and execution-error statuses; raw zero-hit shell commands cannot."
    files:
      - {
          path: "scripts/check-composition-hard-cut.mjs",
          change_type: "add",
          purpose: "Scan exact roots packages, apps, docs, scripts, .changeset, README.md, and AGENTS.md with the three locked pattern groups; exclude specs and ignored build outputs; restrict annotations to test/fixture paths; fail on rg errors or unannotated matches.",
        }
      - {
          path: "scripts/check-composition-hard-cut.test.mjs",
          change_type: "add",
          purpose: "Node tests for clean, eligible annotated-negative, annotated-ineligible-path, unannotated-match, slotless inline/multiline raw-use references, scanner-self-match prevention, and search-error fixtures.",
        }
    scanner_contract:
      roots: ["packages", "apps", "docs", "scripts", ".changeset", "README.md", "AGENTS.md"]
      exclusions: ["specs/**", "**/node_modules/**", "**/dist/**", "**/coverage/**", "**/.turbo/**"]
      pattern_groups:
        retired_symbols: "use_composition|useComposition|UseCompositionToolInput|UseCompositionResult|expandComposition|ExpandComposition(Result|Options)?|CompositionParams|CompositionRef|ExpandAt|validateCompositionGraph|composition-graph|expand-composition|allowReference|allowSlotMarkers|SLOT_MARKER_RE|NodeFiller|NodeStringLeaves|compositionCatalogViolation"
        legacy_data: '\{\{[A-Za-z_][A-Za-z0-9_-]*\}\}|"slots"\s*:|slots:|\{\s*(?:"use"|use)\s*:|^\s*(?:"use"|use)\s*:\s*["''\x60]'
        semantic_case_insensitive: "composition -> component -> primitive|expanded server-side|server-side expansion|composition-first|composition first|composition.*before.*(patch|component|primitive)|prefer.*composition|graft.*composition|composition.*metadata.*prompt"
      exit_codes: { clean: 1, matches: 0, error: ">1" }
      allowed_negative:
        annotation: "composition-hard-cut: allowed-negative"
        eligible_paths: "basename contains .test. or .spec., or a path segment equals fixtures, __fixtures__, or test-data"
        same_line_required: true
        forbidden_paths: "all production source, docs, changesets, README.md, AGENTS.md, and scanner source"
      self_match_policy: "Scanner source is not excluded and must construct its pattern definitions without matching itself."
    depends_on: []
    parallel_group: "quality-a"
    red_check:
      command: "node --test scripts/check-composition-hard-cut.test.mjs"
      target: "scripts/check-composition-hard-cut.test.mjs"
      justification: ""
    quick_checks: ["node --test scripts/check-composition-hard-cut.test.mjs"]
    no_regression_checks:
      ["pnpm format:check", "node --test scripts/check-composition-hard-cut.test.mjs"]
    test_plan:
      - {
          type: "quality-gate",
          target: "scripts/check-composition-hard-cut.test.mjs",
          covers_dc: ["DC-008", "DC-012"],
          action: "add",
        }

