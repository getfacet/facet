    title: "Concrete native composition contract"
    owner_role: "implementer"
    packages: ["@facet/core"]
    objective: "Make FacetComposition a required metadata-description plus native FacetNode fragment, retaining normal node/topology bounds and fragment roots."
    module_shape:
      decision: "shrink-existing"
      rationale: "The semantic gate already lives in composition/tree/primitive validation; remove composition-only modes without adding a core abstraction."
    files:
      - {
          path: "packages/core/core/src/composition-validation.ts",
          change_type: "update",
          purpose: "Required metadata.description; remove top-level description/slots/CompositionRef; native nodes only.",
        }
      - {
          path: "packages/core/core/src/primitive-node-validation.ts",
          change_type: "update",
          purpose: "Remove slot/ref sanitizer modes and functions; sanitizeNode returns FacetNode only.",
        }
      - {
          path: "packages/core/core/src/tree-validation.ts",
          change_type: "update",
          purpose: "Narrow shared sanitizer/topology helpers back to FacetNode only.",
        }
      - {
          path: "packages/core/core/src/slot-marker.ts",
          change_type: "update",
          purpose: "Remove SLOT_MARKER_RE while preserving generic name regexes used elsewhere.",
        }
      - {
          path: "packages/core/core/src/validate.test.ts",
          change_type: "update",
          purpose: "RED/GREEN native-only, required description, hostile data, topology, leaf-root, and legacy-shape tests.",
        }
    depends_on: []
    parallel_group: "core-a"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/validate.test.ts -t 'concrete composition contract'"
      target: "packages/core/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/validate.test.ts"
    no_regression_checks:
      [
        "pnpm exec vitest run packages/core/core/src/validate.test.ts packages/core/core/src/tree.test.ts",
      ]
    test_plan:
      - {
          type: "unit-adversarial",
          target: "packages/core/core/src/validate.test.ts",
          covers_dc: ["DC-001", "DC-002", "DC-007", "DC-008"],
          action: "update",
