# Execution Manifest: Container Components as Composition References
#
# Keep synchronized with specs/dev-specs/container-component-compositions.md.
# Scope: card, section, and emptyState node-type retirement. stat is excluded.
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "container-component-compositions"
spec_path: "specs/dev-specs/container-component-compositions.md"
context_evidence_path: "specs/context/container-component-compositions.md"

shared_preflight:
  - concern: "worktree"
    requirement: "Run /worktree-prep and implement on an isolated codex/ feature branch; never commit implementation on main."
    owner: "main-agent"
    verification: "git branch --show-current and git worktree list"
  - concern: "baseline-green"
    requirement: "pnpm typecheck, pnpm test, and pnpm lint pass before any WU starts."
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "atomicity"
    requirement: "All WUs form one indivisible hard cutover. Each WU runs only scoped Vitest; combined pnpm typecheck runs after every WU lands."
    owner: "main-agent"
    verification: "WU handoffs plus one combined typecheck result"
  - concern: "git-safety"
    requirement: "Do not alter PR-5a artifacts, merge, or push without owner approval; do not add Co-Authored-By."
    owner: "main-agent"
    verification: "git status, git diff, and final commit inspection"

review_fix_policy:
  batching_rule: "Group review comments into bounded batches. Scoped fixes rerun their quick checks; main agent reruns the authoritative gate chain."
  subagent_scope: "Assigned WU files, quick_checks, and no_regression_checks only."
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "execute-WUs"
    - "combined-typecheck"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-01"
    title: "Assets — native container-pattern references"
    owner_role: "subagent"
    packages: ["@facet/assets"]
    objective: "Publish native section/card/empty-state reference data, rewrite all 16 embedded retired nodes and 15 hints, and prove 22 references validate."
    module_shape:
      decision: "sibling-helper"
      rationale: "Add a private role-specific composition-containers.ts sibling, following composition-chart-table.ts; keep it behind DEFAULT_COMPOSITIONS with no barrel export."
    files:
      - path: "packages/core/assets/src/composition-containers.ts"
        change_type: "add"
        purpose: "Own the three canonical native section/card/empty-state references."
      - path: "packages/core/assets/src/compositions.ts"
        change_type: "update"
        purpose: "Import canonical references and rewrite embedded retired nodes and parent hints."
      - path: "packages/core/assets/src/composition-chart-table.ts"
        change_type: "update"
        purpose: "Rewrite the section root as a native box plus explicit title text."
      - path: "packages/core/assets/src/compositions.test.ts"
        change_type: "update"
        purpose: "Assert exact count, native structure, tokens, zero residual types, and empty-state action ownership."
    depends_on: []
    parallel_group: "serial-assets-native"
    red_check:
      command: "pnpm exec vitest run packages/core/assets/src/compositions.test.ts -t 'ships native section card and empty-state references'"
      target: "packages/core/assets/src/compositions.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/assets/src/compositions.test.ts -t 'ships native section card and empty-state references'"
      - "pnpm exec vitest run packages/core/assets/src/compositions.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/assets/src/compositions.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/core/assets/src/compositions.test.ts"
        covers_dc: ["DC-004", "DC-005", "DC-006", "DC-007", "DC-011"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported."
      - "Exactly 22 valid references; all 16 retired nodes and 15 hints are gone."
      - "Empty-state root is actionless, its child button is explicit, and no raw style scalar is introduced."
    handoff_format: &handoff
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

