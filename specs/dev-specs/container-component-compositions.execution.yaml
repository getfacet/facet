final_gate_details:
  update_tests: "Map every changed production file to an affected Vitest test and run affected package suites."
  verify:
    - "pnpm verify"
    - "pnpm --filter @facet/playground typecheck"
    - "pnpm --filter @facet/playground build"
    - "pnpm --filter @facet/quickstart build"
    - "pnpm package:smoke"
  code_review: "Review the direct worktree diff; PASS requires P0-P2 = 0."
  live_test: "Run Tier 1 plus blocking Tier 2 provider smoke with OPENAI_API_KEY and the owner live journey required by the skill."
  update_docs:
    - "Update STAGE_SPEC, root/package documentation, architecture text, and changeset entries for the six behavior/release-note packages."
    - "Treat the @facet/store-postgres README edit as documentation-only with no direct changeset entry; .changeset/config.json fixes @facet/* together."
    - "Run pnpm exec changeset status --since=main and verify the complete fixed-group release plan."
    - "Run node scripts/check-composition-hard-cut.mjs."
    - 'Run rg -n ''CardNode|SectionNode|EmptyStateNode|type: "(card|section|emptyState)"|preferredParent: "(section|card)"|render(Card|Section|EmptyState)'' packages apps docs README.md AGENTS.md .changeset; hits may remain only in annotated negative/fail-safe tests.'
    - 'Run rg -n ''"type"[[:space:]]*:[[:space:]]*"(card|section|emptyState)"'' packages apps docs README.md AGENTS.md .changeset; hits may remain only in annotated negative/fail-safe tests.'
    - "Run rg -n 'card|section|emptyState|empty-state' packages apps docs README.md AGENTS.md .changeset; classify every hit as a legal composition/reference name, ordinary non-node prose, or annotated negative."
  commit_policy: "One feature commit after all gates; no merge or push without owner approval; no Co-Authored-By trailer."

final_gate_test_plan:
  owner: "main-agent"
  target: "recorded combined typecheck and complete ordered feature hard-gate evidence"
  covers_dc: ["DC-012"]
  commands:
    - "pnpm typecheck"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test (blocking Tier 2 with OPENAI_API_KEY)"
    - "/update-docs"
  pass_condition: "Every ordered step and every supplemental build, package smoke, changeset status, and hard-cut scan is recorded PASS."
