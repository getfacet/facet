      rationale: "Pure deletion from the existing theme-data owner."
    files:
      - path: "packages/core/assets/src/theme.ts"
        change_type: "update"
        purpose: "Delete the three retired recipe blocks."
      - path: "packages/core/assets/src/theme.test.ts"
        change_type: "update"
        purpose: "Assert retired recipe absence and surviving theme coverage."
    depends_on: ["WU-01"]
    parallel_group: "serial-assets-recipes"
    red_check:
      command: "pnpm exec vitest run packages/core/assets/src/theme.test.ts -t 'omits retired container-pattern recipes'"
      target: "packages/core/assets/src/theme.test.ts"
      justification: ""
    quick_checks:
