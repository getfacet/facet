# Execution Manifest: Brick Style System Hard Cutover

feature_slug: "brick-style-system-hard-cutover"
spec_path: "specs/dev-specs/brick-style-system-hard-cutover.md"
context_evidence_path: "specs/context/brick-style-system-hard-cutover.md"
intake_path: "specs/feature-intake/brick-style-system-hard-cutover.md"

shared_preflight:
  - concern: "isolated-worktree"
    requirement: "Run /worktree-prep from synchronized origin/main on feat/brick-style-system-hard-cutover; carry the intake, context, spec, and manifest; never implement on main."
    owner: "main-agent"
    verification: "record worktree path, branch, base commit, and clean status apart from planning artifacts"
  - concern: "baseline-green"
    requirement: "pnpm install is healthy and pnpm typecheck && pnpm test && pnpm lint pass before WU-01"
    owner: "main-agent"
    verification: "record commands and outputs"
  - concern: "scoped-tdd"
    requirement: "Each production-changing WU records its exact owned-test RED before production edits, edits only owned files, reruns GREEN, then its scoped no-regression suite. Drained deletion WUs WU-10A/WU-13B/WU-19A and test-only integration WU-35 are N/A."
    owner: "main-agent"
    verification: "audit WU handoffs and git diff ownership"

review_fix_policy:
  batching_rule: "Batch findings by owning WU, rerun scoped checks, then main agent reruns verify/review; full feature gate remains final."
  subagent_scope: "Owned WU files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

common_handoff_format: &handoff
  - "changed_files"
  - "executed_commands"
  - "red_check_output_before"
  - "red_check_output_after"
  - "green_diff_summary"
  - "refactor_decision"
  - "pass_fail"
  - "first_error_line"
  - "assumptions"
  - "next_action"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep before implementation"
    - "/implement every manifest WU with scoped RED→GREEN evidence"
    - "/update-tests using the test-only migration ledger; production edits forbidden"
    - "/verify including pnpm package:smoke and pnpm exec changeset status"
    - "/code-review on the direct worktree; P0-P2 = 0"
    - "/live-test mandatory Tier 1 and required provider Tier 2 plus owner live journey"
    - "/update-docs including migration guide, current docs/READMEs/changesets, and final scanner rerun"
    - "stop with evidence; no commit/push/PR/merge without explicit owner go"

final_update_tests_ledger:
  production_edits_allowed: false
  sweep:
    - "Core protocol/event/tree/richtext/fold/index fixtures"
    - "React budget/sort/overlay/hold and remaining renderer fixtures"
    - "client view event/storage and server/ag-ui event fixtures"
    - "agent-tools buffer/index and reference provider/loop/transcript fixtures"
    - "quickstart CLI/bundle, Postgres, and playground authored-document/print/App/generator fixtures"
  verification:
    - "every changed production file has a test obligation and every DC-001..DC-025 maps to at least one test"
    - "run affected package suites, then combined pnpm typecheck"

final_docs_ledger:
  update:
    - "AGENTS.md, README.md, docs/ARCHITECTURE.md, docs/PACKAGE-BOUNDARIES.md, docs/REVIEW-RULES.md, docs/AGENT-TOOL-RESULT-CONTRACT.md, docs/comparisons/a2ui.md"
    - "all directly affected package READMEs"
    - "current .changeset prose that otherwise teaches retired current vocabulary"
  add:
    - "operator migration guide for file/Postgres assets, persisted stages/sessions, initial tree, summaries, and atomic package upgrade"
    - ".changeset/brick-style-system-hard-cutover.md: pre-1.0 minor entries for every directly affected published package"
  exclude:
    - "archival specs/** from lexical hard-cut scanning"
  verification:
    - "node scripts/check-style-hard-cut.mjs"
    - "node scripts/check-style-hard-cut.test.mjs"

final_gate_test_plan:
  - type: "e2e"
    target: "recorded feature hard-gate evidence"
    covers_dc: ["DC-023", "DC-024", "DC-025"]
    action: "new"
    verification: "all WU handoffs, update-tests, verify, review P0-P2=0, live-test, update-docs, scanner, package smoke, and changeset status are recorded"

