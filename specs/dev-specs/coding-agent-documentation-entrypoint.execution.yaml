# Execution Manifest: Coding-Agent Documentation Entrypoint
#
# Keep synchronized with coding-agent-documentation-entrypoint.md.

feature_slug: "coding-agent-documentation-entrypoint"
spec_path: "specs/dev-specs/coding-agent-documentation-entrypoint.md"
context_evidence_path: "specs/context/coding-agent-documentation-entrypoint.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "Node >=20, pnpm install complete, and repository packages buildable"
    owner: "main-agent"
    verification: "node --version && pnpm build"
  - concern: "scope"
    requirement: "No production TypeScript, public export, package manifest contract, protocol, or Facet Document change"
    owner: "main-agent"
    verification: "audit git diff --name-only and git diff before final gates"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply only their WU files and scoped checks. Main agent reruns verify and code-review once per batch; the full feature hard gate runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-01"
    title: "Add the repository documentation drift gate"
    owner_role: "subagent"
    packages: ["repository-tooling"]
    objective: "Fail verification on broken current-doc links/anchors or type errors in explicitly marked concrete TypeScript/TSX snippets."
    module_shape:
      decision: "sibling-helper"
      rationale: "One repository-private script imports no Facet production module; focused GFM AST/slug development dependencies prevent a partial hand-written Markdown parser, and the Node test stays beside it."
    files:
      - path: "scripts/check-docs.test.mjs"
        change_type: "add"
        purpose: "RED tests for local/GitHub links, anchors, opt-in snippets, diagnostics, and archival exclusion"
      - path: "scripts/check-docs.mjs"
        change_type: "add"
        purpose: "Focused full-repository and scoped documentation checker"
      - path: "package.json"
        change_type: "update"
        purpose: "Invoke the docs test/checker from pnpm verify and declare repository-only parser dependencies"
      - path: "pnpm-lock.yaml"
        change_type: "update"
        purpose: "Lock the documentation checker's development-only parser dependencies"
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "node --test scripts/check-docs.test.mjs"
      target: "scripts/check-docs.test.mjs"
      justification: ""
    quick_checks:
      - "node --test scripts/check-docs.test.mjs"
      - "node scripts/check-docs.mjs"
      - "pnpm exec prettier --check scripts/check-docs.mjs scripts/check-docs.test.mjs package.json"
    no_regression_checks:
      - "node --test scripts/check-package-layout.test.mjs scripts/check-style-hard-cut.test.mjs"
    test_plan:
      - type: "unit"
        target: "scripts/check-docs.test.mjs"
        covers_dc: ["DC-006", "DC-009"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported"
      - "Repository-relative and canonical GitHub document links resolve paths and anchors"
      - "Only opt-in TS/TSX fences are typechecked; pseudocode is not misrepresented as executable"
      - "specs/README.md may be checked while completed specs/** bodies stay excluded"
      - "Existing layout/style scanner tests pass"
    handoff_format: &handoff
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-02"
    title: "Make README and Getting Started the adoption entrypoint"
    owner_role: "subagent"
    packages: ["@facet/react", "@facet/client", "@facet/server"]
    objective: "Let a first-time coding agent choose a supported path and wire the minimal React/reference transport flow correctly."
    module_shape:
      decision: "preserve"
      rationale: "Prose-only; public examples use existing barrels and derive from current Quickstart/playground consumers."
    files:
      - path: "README.md"
        change_type: "update"
        purpose: "Concise entrypoint, safety summary, use-case decision table, role summary, and routing"
      - path: "docs/GETTING-STARTED.md"
        change_type: "add"
        purpose: "Prerequisites and supported adoption/wiring paths"
      - path: "packages/renderers/react/README.md"
        change_type: "update"
        purpose: "React role, peer, known-good wiring, and canonical links"
      - path: "packages/adapters/client/README.md"
        change_type: "update"
        purpose: "Transport role, visit/fields/view wiring, and replacement boundary"
      - path: "packages/adapters/server/README.md"
        change_type: "update"
        purpose: "Reference transport and non-hosted security boundary"
    depends_on: ["WU-01"]
    parallel_group: "par-docs"
    red_check:
      command: "N/A"
      target: "scripts/check-docs.mjs at convergence"
      justification: "Documentation-only WU; no production behavior changes and WU-01 plus final convergence enforce snippets and links."
    quick_checks:
      - "pnpm exec prettier --check README.md docs/GETTING-STARTED.md packages/renderers/react/README.md packages/adapters/client/README.md packages/adapters/server/README.md"
      - "rg -n 'visit|fields|withView|view snapshot|FacetTransport' docs/GETTING-STARTED.md packages/renderers/react/README.md packages/adapters/client/README.md"
    no_regression_checks:
      - "node scripts/check-style-hard-cut.mjs"
    test_plan:
      - type: "integration"
        target: "scripts/check-docs.mjs over WU-02 files at convergence"
        covers_dc: ["DC-001", "DC-002", "DC-003", "DC-005", "DC-006", "DC-009", "DC-010"]
        action: "update"
    done_conditions:
      - "N/A RED justification acknowledged"
      - "README answers what, why, how safe, which path, and where next without copying full contracts"
      - "Decision table covers every DC-002 path without implying one-package integration"
      - "React path sends initial visit and preserves fields and view-state"
      - "Reference server/client limitations are explicit"
      - "Style hard-cut scanner passes"
    handoff_format: *handoff

  - id: "WU-03"
    title: "Establish the canonical Design System guide"
    owner_role: "subagent"
    packages: ["@facet/core", "@facet/assets"]
    objective: "Give operators and coding agents one current explanation of styling concepts and asset authoring without duplicating Core's exhaustive vocabulary."
    module_shape:
      decision: "preserve"
      rationale: "Documentation only; Core remains the contract source and assets remain data."
    files:
      - path: "docs/DESIGN-SYSTEM.md"
        change_type: "add"
        purpose: "Canonical current design-system concepts and operator workflow"
      - path: "docs/ARCHITECTURE.md"
        change_type: "update"
        purpose: "Link practical guide while retaining invariant/behavior authority"
      - path: "docs/STYLE-SYSTEM-MIGRATION.md"
        change_type: "update"
        purpose: "Narrow responsibility to pre-cutover migration"
      - path: "packages/core/core/README.md"
        change_type: "update"
        purpose: "Contract role and canonical guide links"
      - path: "packages/core/assets/README.md"
        change_type: "update"
        purpose: "Default asset/operator role and canonical guide links"
    depends_on: ["WU-01"]
    parallel_group: "par-docs"
    red_check:
      command: "N/A"
      target: "style hard-cut and scripts/check-docs.mjs"
      justification: "Documentation-only WU; terminology and links are covered by existing hard-cut checks and the WU-01 checker."
    quick_checks:
      - "pnpm exec prettier --check docs/DESIGN-SYSTEM.md docs/ARCHITECTURE.md docs/STYLE-SYSTEM-MIGRATION.md packages/core/core/README.md packages/core/assets/README.md"
      - "node scripts/check-style-hard-cut.mjs"
    no_regression_checks:
      - "node scripts/check-package-layout.mjs"
    test_plan:
      - type: "integration"
        target: "style hard-cut plus scripts/check-docs.mjs over WU-03 files"
        covers_dc: ["DC-003", "DC-004", "DC-006", "DC-007", "DC-010"]
        action: "update"
    done_conditions:
      - "N/A RED justification acknowledged"
      - "Terminology includes author/resolver ownership and three distinct failure boundaries"
      - "No exhaustive hand-written Brick/token choice table is introduced"
      - "Pattern and Preset remain guidance/style assets rather than behavior or node kinds"
      - "Current docs use bounded box overlay wording, not a dedicated overlay Brick"
      - "Package-layout scanner passes"
    handoff_format: *handoff

  - id: "WU-04"
    title: "Establish the canonical custom-agent integration guide"
    owner_role: "subagent"
    packages: ["@facet/agent-tools", "@facet/agent", "@facet/reference-agent"]
    objective: "Document the complete provider-neutral stage-tool handoff while keeping provider, history, backend, and business policy outside Facet."
    module_shape:
      decision: "preserve"
      rationale: "Public root barrels only; provider calls remain explicit pseudocode rather than an invented Facet adapter."
    files:
      - path: "docs/AGENT-INTEGRATION.md"
        change_type: "add"
        purpose: "Canonical custom LLM loop, discovery, executor handoff, three failure boundaries, tool-input vs wire distinction, retries, and host boundaries"
      - path: "docs/AGENT-TOOL-RESULT-CONTRACT.md"
        change_type: "update"
        purpose: "Link onboarding while retaining exact outcome authority"
      - path: "packages/agents/agent-tools/README.md"
        change_type: "update"
        purpose: "Compact package usage and canonical guide/contract links"
      - path: "packages/agents/agent/README.md"
        change_type: "update"
        purpose: "Distinguish code-authored agents from LLM tool schemas"
      - path: "packages/agents/reference-agent/README.md"
        change_type: "update"
        purpose: "Label reference brain and forbid internal imports as integration guidance"
    depends_on: ["WU-01"]
    parallel_group: "par-docs"
    red_check:
      command: "N/A"
      target: "selected-snippet mode of scripts/check-docs.mjs"
      justification: "Documentation-only WU; marked snippets are checked by WU-01 and exact outcomes already have production tests."
    quick_checks:
      - "pnpm exec prettier --check docs/AGENT-INTEGRATION.md docs/AGENT-TOOL-RESULT-CONTRACT.md packages/agents/agent-tools/README.md packages/agents/agent/README.md packages/agents/reference-agent/README.md"
      - "rg -n 'createStageToolAssetSnapshot|createStageToolBuffer|executeStageTool|rejected|applied_visible|fail-soft|Theme fallback|RFC 6902|patches only|host-owned' docs/AGENT-INTEGRATION.md"
    no_regression_checks:
      - "node scripts/check-style-hard-cut.mjs"
    test_plan:
      - type: "integration"
        target: "selected-snippet mode of scripts/check-docs.mjs"
        covers_dc: ["DC-003", "DC-005", "DC-006", "DC-009", "DC-010"]
        action: "update"
    done_conditions:
      - "N/A RED justification acknowledged"
      - "Guide covers snapshot/buffer/executor/runtime-message handoff"
      - "agent-tools, agent, and agent-client cannot be conflated"
      - "Provider/history/retry/business policy is host-owned"
      - "No unpublished src/* import appears"
      - "Rejected mutations require repair and retry"
      - "Agent Integration distinguishes strict author rejection, fail-soft stale rendering, and whole-Theme fallback"
      - "Agent Integration distinguishes complete mutation-tool input from the patches-only runtime wire contract after initial state"
    handoff_format: *handoff

  - id: "WU-05"
    title: "Normalize runtime and adapter package guidance"
    owner_role: "subagent"
    packages: ["@facet/runtime", "@facet/agent-client", "@facet/ag-ui", "@facet/store-postgres"]
    objective: "Make integration collaborators, intentional subpaths, and reference/official/optional deployment boundaries explicit."
    module_shape:
      decision: "preserve"
      rationale: "Package APIs and subpaths stay unchanged; only their supported use is clarified."
    files:
      - path: "packages/core/runtime/README.md"
        change_type: "update"
        purpose: "Runtime/store/assets role, browser root vs runtime/node, and links"
      - path: "packages/adapters/agent-client/README.md"
        change_type: "update"
        purpose: "External-agent transport role and distinction from LLM authoring tools"
      - path: "packages/adapters/ag-ui/README.md"
        change_type: "update"
        purpose: "Official adapter role, browser root vs ag-ui/server, and stage boundary"
      - path: "packages/adapters/store-postgres/README.md"
        change_type: "update"
        purpose: "Peer/install and persistence-not-platform boundary"
      - path: "docs/PACKAGE-BOUNDARIES.md"
        change_type: "update"
        purpose: "Remove resolved doc gaps and align role/collaborator wording"
    depends_on: ["WU-01"]
    parallel_group: "par-docs"
    red_check:
      command: "N/A"
      target: "docs checker plus package smoke"
      justification: "Documentation-only WU; public subpaths and package links are checked without behavior changes."
    quick_checks:
      - "pnpm exec prettier --check packages/core/runtime/README.md packages/adapters/agent-client/README.md packages/adapters/ag-ui/README.md packages/adapters/store-postgres/README.md docs/PACKAGE-BOUNDARIES.md"
      - "rg -n '@facet/runtime/node|@facet/ag-ui/server|reference|hosted|peer' packages/core/runtime/README.md packages/adapters/agent-client/README.md packages/adapters/ag-ui/README.md packages/adapters/store-postgres/README.md"
    no_regression_checks:
      - "node scripts/check-package-layout.mjs"
    test_plan:
      - type: "integration"
        target: "docs checker plus pnpm package:smoke"
        covers_dc: ["DC-002", "DC-003", "DC-006", "DC-008", "DC-010"]
        action: "update"
    done_conditions:
      - "N/A RED justification acknowledged"
      - "Intentional public subpaths are accurate and no unpublished path is recommended"
      - "Reference native transport, official AG-UI adapter, and optional persistence remain distinct"
      - "Hosted control-plane responsibilities remain outside Facet"
      - "Package-layout scanner passes"
    handoff_format: *handoff

  - id: "WU-06"
    title: "Repair tool navigation and mark historical specs archival"
    owner_role: "subagent"
    packages: ["@facet/quickstart", "@facet/cli", "@facet/bridge"]
    objective: "Complete package-to-guide navigation, remove the stale README anchor dependency, and give repository search one deterministic current-authority path."
    module_shape:
      decision: "preserve"
      rationale: "Documentation only; no CLI, bridge, or Quickstart command/runtime path changes."
    files:
      - path: "packages/tools/quickstart/README.md"
        change_type: "update"
        purpose: "First-run role, prerequisites, guide links, and no stale root anchor"
      - path: "packages/tools/cli/README.md"
        change_type: "update"
        purpose: "Local stage-control role and links"
      - path: "packages/tools/bridge/README.md"
        change_type: "update"
        purpose: "Local coding-agent bridge role and links"
      - path: "specs/README.md"
        change_type: "add"
        purpose: "Archival notice and current authority order"
      - path: "AGENTS.md"
        change_type: "update"
        purpose: "Route consumers to the reader-task guide map and synchronize the pnpm verify summary with the docs gate"
    depends_on: ["WU-01"]
    parallel_group: "par-docs"
    red_check:
      command: "N/A"
      target: "docs checker and hard-cut scanners"
      justification: "Documentation-only WU; archive and navigation are verified through WU-01 and existing scanners."
    quick_checks:
      - "pnpm exec prettier --check packages/tools/quickstart/README.md packages/tools/cli/README.md packages/tools/bridge/README.md specs/README.md AGENTS.md"
      - "! rg -n 'README\\.md#bring-your-own-brain' packages/tools/quickstart/README.md"
    no_regression_checks:
      - "node scripts/check-style-hard-cut.mjs"
      - "node scripts/check-package-layout.mjs"
    test_plan:
      - type: "integration"
        target: "docs checker plus hard-cut/package-layout scanners"
        covers_dc: ["DC-002", "DC-006", "DC-007", "DC-008"]
        action: "update"
    done_conditions:
      - "N/A RED justification acknowledged"
      - "Every tool README states local/reference scope and links to the right guide"
      - "specs/README.md marks history without editing completed specs"
      - "AGENTS routes consumers to README first while preserving maintainer rules"
      - "AGENTS lists the docs check as part of the canonical mechanical gate"
      - "Both hard-cut scanners pass"
    handoff_format: *handoff

  - id: "WU-07"
    title: "Route future changes through maintainer skills"
    owner_role: "main-agent"
    packages: ["maintainer-workflow"]
    objective: "Make future doc updates choose the same canonical homes and make both coding-agent verify workflows run the repository docs gate."
    module_shape:
      decision: "preserve"
      rationale: "Intentional two-environment duplication remains because Codex and Claude load different skill trees; each skill pair must be equivalent."
    files:
      - path: ".agents/skills/update-docs/SKILL.md"
        change_type: "update"
        purpose: "Route changes to the new canonical guide responsibilities"
      - path: ".claude/skills/update-docs/SKILL.md"
        change_type: "update"
        purpose: "Mirror the same routing for the other coding-agent environment"
      - path: ".agents/skills/verify/SKILL.md"
        change_type: "update"
        purpose: "Include the docs test/check in the canonical mechanical sequence"
      - path: ".claude/skills/verify/SKILL.md"
        change_type: "update"
        purpose: "Mirror the same verification gate"
    depends_on: ["WU-02", "WU-03", "WU-04", "WU-05", "WU-06"]
    parallel_group: "serial-b"
    red_check:
      command: "N/A"
      target: "both maintainer skill pairs plus full docs checker"
      justification: "Maintainer-workflow documentation only; the executable docs gate already has RED→GREEN ownership in WU-01."
    quick_checks:
      - "pnpm exec prettier --check .agents/skills/update-docs/SKILL.md .claude/skills/update-docs/SKILL.md .agents/skills/verify/SKILL.md .claude/skills/verify/SKILL.md"
      - "rg -n 'check-docs' .agents/skills/verify/SKILL.md .claude/skills/verify/SKILL.md"
      - "node --test scripts/check-docs.test.mjs"
      - "node scripts/check-docs.mjs"
    no_regression_checks:
      - "node --test scripts/check-package-layout.test.mjs scripts/check-style-hard-cut.test.mjs"
    test_plan:
      - type: "integration"
        target: "both maintainer skill pairs plus full docs checker"
        covers_dc: ["DC-003", "DC-006", "DC-008", "DC-009"]
        action: "update"
    done_conditions:
      - "N/A RED justification acknowledged"
      - "Both update-docs skills route each subject to one canonical guide and remain equivalent"
      - "Both verify skills run and describe the same docs test/check as root pnpm verify"
      - "Full docs checker passes after parallel documentation WUs converge"
    handoff_format: *handoff

  - id: "WU-08"
    title: "Synchronize contributor gate docs and converge"
    owner_role: "main-agent"
    packages: ["maintainer-workflow"]
    objective: "Keep public contribution/review descriptions synchronized with root verification and run every repository-wide documentation/publication gate."
    module_shape:
      decision: "preserve"
      rationale: "These remain short public/maintainer gate documents; no new workflow layer is introduced."
    files:
      - path: "CONTRIBUTING.md"
        change_type: "update"
        purpose: "Include documentation validation in the CI pnpm verify summary"
      - path: "docs/REVIEW-RULES.md"
        change_type: "update"
        purpose: "List the docs checker in the canonical mechanical gate and its evidence expectations"
    depends_on: ["WU-07"]
    parallel_group: "serial-c"
    red_check:
      command: "N/A"
      target: "full repository documentation gate"
      justification: "Documentation-only convergence WU; executable docs-gate tests belong to WU-01 and this WU runs the full completed gate."
    quick_checks:
      - "pnpm exec prettier --check CONTRIBUTING.md docs/REVIEW-RULES.md"
      - "node --test scripts/check-docs.test.mjs"
      - "node scripts/check-docs.mjs"
      - "node scripts/check-style-hard-cut.mjs"
      - "node scripts/check-package-layout.mjs"
      - "pnpm exec vitest run packages/core/core/src/validate.test.ts packages/core/runtime/src/assets.test.ts packages/core/runtime/src/runtime.test.ts packages/agents/agent-tools/src/executor.test.ts packages/adapters/agent-client/src/connect.test.ts"
    no_regression_checks:
      - "pnpm package:smoke"
    test_plan:
      - type: "integration"
        target: "full docs checker, scanners, and package smoke"
        covers_dc:
          [
            "DC-001",
            "DC-002",
            "DC-003",
            "DC-004",
            "DC-005",
            "DC-006",
            "DC-007",
            "DC-008",
            "DC-009",
            "DC-010",
          ]
        action: "update"
      - type: "integration"
        target: "existing fail-safe/Theme/offline/serialization boundary regression suites named in quick_checks"
        covers_dc: ["DC-004", "DC-005", "DC-008"]
        action: "existing"
    done_conditions:
      - "N/A RED justification acknowledged"
      - "CONTRIBUTING, REVIEW-RULES, AGENTS, both verify skills, and root package.json describe one mechanical gate"
      - "Full docs checker, hard-cut scanners, and package smoke pass"
      - "Existing strict-author, fail-soft tree, whole-Theme fallback, offline/reconnect, and same-visitor serialization tests pass unchanged"
      - "Changed-file audit confirms no production TypeScript, published package manifest contract, or public API change"
    handoff_format: *handoff

execution_order:
  - "WU-01"
  - ["WU-02", "WU-03", "WU-04", "WU-05", "WU-06"]
  - "WU-07"
  - "WU-08"

extra_final_checks:
  - "node --test scripts/check-docs.test.mjs"
  - "node scripts/check-docs.mjs"
  - "node scripts/check-style-hard-cut.mjs"
  - "node scripts/check-package-layout.mjs"
  - "pnpm package:smoke"
