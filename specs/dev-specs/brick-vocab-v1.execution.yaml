        change_type: "update"
        purpose: "import mediaStyle/isSafeMediaSrc; renderNode case media (<video> when kind=video else <img>) + thin case image legacy alias; case field input branch (native select/checkbox/radio/switch; unknown->text) stamping data-facet-field-id on every control; collectFieldValues selector [data-facet-field-id], Map<string,Element[]>, per-kind read (select.value/.checked/radio checked-member/omit-when-off); NO position:absolute/z-index"
      - path: "packages/react/src/theme.ts"
