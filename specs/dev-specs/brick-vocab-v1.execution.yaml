        change_type: "update"
        purpose: "RED-first: media video renders <video> (poster/controls); unknown kind/missing src skipped never throws; legacy {type:image} raw node renders via alias; select/checkbox/radio/switch native controls (options); unknown input->text; collect over select+checkbox+radio captures select.value + checked box + CHECKED radio member; columns:3/scroll:x/scroll:true CSS; raw junk renders plain"
      - path: "packages/react/src/theme.test.ts"
        change_type: "update"
        purpose: "mediaStyle CSS unchanged; boxStyle({scroll:x}) overflowX+maxWidth:100% never unbounded; scroll:y/true = today vertical; boxStyle({columns:3}) display:grid+gridTemplateColumns:repeat(3,minmax(0,1fr)); junk scroll/columns yield no CSS"
