# Execution Manifest: Brick/Token Vocabulary v1 — media · form controls · layout tokens
#
# Keep synchronized with specs/dev-specs/brick-vocab-v1.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "brick-vocab-v1"
spec_path: "specs/dev-specs/brick-vocab-v1.md"
context_evidence_path: "specs/context/brick-vocab-v1.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "playground buildable (pnpm --filter @facet/playground dev reachable) for the DC-006/007/010 browser check; pnpm --filter @facet/quickstart build runnable for the live gate"
    owner: "main-agent"
    verification: "pnpm --filter @facet/playground dev ; pnpm --filter @facet/quickstart build"
  - concern: "breaking-rename-sequencing"
    requirement: "This is a repo-wide breaking rename (image->media, isSafeImageSrc->isSafeMediaSrc, imageStyle->mediaStyle). Full-repo `pnpm typecheck` is EXPECTED red between WU-1 and WU-5; per-WU no_regression is package-scoped; full typecheck/test/build is a final-gate check. Each WU red_check targets a single test file that runs green regardless of other-package breakage."
    owner: "main-agent"
    verification: "final gate runs full pnpm typecheck && pnpm test && pnpm build after WU-5"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"

work_units:
  - id: "WU-1"
    title: "Core contract + validation — media node, field options, scroll axis, columns token, safe-src rename"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Land the contract and dual-path-shared validation (MediaNode/MediaStyle + MEDIA_KINDS, expanded FIELD_INPUTS + FieldNode.options?, BoxStyle.scroll axis + columns token via SCROLL_AXES/COLUMNS, isSafeImageSrc->isSafeMediaSrc) with sanitizeNode normalize/strip-with-issue across validateTree/fold/stamp, incl. legacy {type:image} normalization."
    files:
      - path: "packages/core/src/nodes.ts"
        change_type: "update"
        purpose: "MediaNode/MediaStyle (rename ImageNode/ImageStyle; add kind/poster/controls); MEDIA_KINDS const; FIELD_INPUTS +checkbox/radio/select/switch; FieldNode.options?; BoxStyle.scroll:ScrollAxis|true + columns?:Columns; swap FacetNode union; doc comments"
      - path: "packages/core/src/tokens.ts"
        change_type: "update"
        purpose: "SCROLL_AXES=[x,y]+ScrollAxis; COLUMNS=[2,3,4]+Columns numeric token group"
      - path: "packages/core/src/validate.ts"
        change_type: "update"
        purpose: "imageStyle->mediaStyle; isSafeImageSrc->isSafeMediaSrc (+poster gate); sanitizeNode case media (kind default/unknown-drop, src/poster safe-gate, controls bool) + legacy image normalize; field options sanitizer (MAX_FIELD_OPTIONS); boxStyle scroll axis-normalizer + columns numeric-membership strip-with-issue"
      - path: "packages/core/src/validate.test.ts"
        change_type: "update"
        purpose: "RED-first: media video kept; missing-src/unknown-kind dropped; legacy image normalized; unknown input omitted; junk options sanitized + empty-safe; scroll x/y kept + legacy true->y + junk stripped (invert :786 y case, add x); columns 3 kept, 9/lots stripped; isSafeMediaSrc blocks javascript:"
      - path: "packages/core/src/stage-fold.test.ts"
        change_type: "update"
        purpose: "fold-path parity for scroll axis/columns/media-kind junk (update scroll-parity cases :261-320)"
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts -t 'brick-vocab v1'"
      target: "packages/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - "re-run red_check"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts packages/core/src/stage-fold.test.ts"
      - "cd /Users/hoon/workspace/apps/facet && pnpm -C packages/core exec tsc --noEmit"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm -C packages/core test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "unit"
        target: "packages/core/src/validate.test.ts"
        covers_dc: ["DC-002", "DC-005", "DC-006", "DC-007", "DC-008", "DC-010"]
        action: "update"
      - type: "unit"
        target: "packages/core/src/stage-fold.test.ts"
        covers_dc: ["DC-008"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "validateTree/foldPatchIntoStage/validateStamp strip the same junk (shared sanitizeNode); legacy {type:image} normalizes to media/kind:image"
      - "Unknown media kind / missing src / junk options / non-axis scroll / non-member columns all strip WITH a bounded issue, never throw"
      - "No regression: pnpm -C packages/core test (full-repo typecheck deferred to final gate)"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

