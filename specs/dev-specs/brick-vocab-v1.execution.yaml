        purpose: "imageStyle->mediaStyle; boxStyle scroll-axis branch (x->overflowX+maxWidth:100%+minWidth:0 bounded; y/true->today vertical) with RISK-INV-6a comment rewritten; columns grid branch (display:grid + repeat(N,minmax(0,1fr)), direction/wrap ignored)"
