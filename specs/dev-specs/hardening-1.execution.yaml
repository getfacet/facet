# Execution Manifest: Hardening Campaign 1
#
# Keep synchronized with specs/dev-specs/hardening-1.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.
# Requirements source: docs/HARDENING-BACKLOG.md (finding ids H-01..H-28 = backlog
# bullets in document order; a/b halves split package-spanning bullets).
# OUT of scope (specs/context/hardening-1.md): H-08, H-09, H-10.
# DROPPED with justification (see spec): H-23 (naming), H-28 (createFacetServer
# extraction), H-16 auth/CORS sub-item (accepted trust model; body cap IS fixed).

feature_slug: "hardening-1"
spec_path: "specs/dev-specs/hardening-1.md"
context_evidence_path: "specs/context/hardening-1.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts (branch chore/hardening-1)"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; no live server/bridge needed (server tests use the existing in-file random-port pattern)"
    owner: "main-agent"
    verification: "pnpm install"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  - "/update-tests"
  - "/verify"
  - "/code-review (PASS = P0-P2 = 0)"
  - "/update-docs"

work_units:
  - id: "WU-1"
    title: "core/validate: sibling dedupe, MAX_DEPTH export, isSafeImageSrc coverage"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Dedupe duplicate sibling child ids in validateTree, export MAX_DEPTH as the single source, and pin every isSafeImageSrc branch."
    findings: ["H-01a", "H-04a", "H-25"]
    files:
      - path: "packages/core/src/validate.ts"
        change_type: "update"
        purpose: "dedupe siblings in the child-filter pass (keep first, emit issue); export const MAX_DEPTH"
      - path: "packages/core/src/validate.test.ts"
        change_type: "update"
        purpose: "dup-sibling dedupe test; MAX_DEPTH export test; isSafeImageSrc branch matrix"
    depends_on: []
    parallel_group: "par-1"
    red_check:
      command: "pnpm exec vitest run packages/core/src/validate.test.ts -t \"dedupes duplicate sibling child ids\""
      target: "packages/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/src/validate.test.ts -t \"dedupes duplicate sibling child ids\""
      - "pnpm exec vitest run packages/core/src/validate.test.ts"
