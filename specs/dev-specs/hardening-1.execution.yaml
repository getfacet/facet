    no_regression_checks:
      - "pnpm test"
    test_plan:
      - type: "unit"
        target: "packages/core/src/validate.test.ts"
        covers_dc: ["H-01a", "H-04a", "H-25"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "MAX_DEPTH importable from @facet/core barrel; dedupe emits an issue; every isSafeImageSrc branch asserted"
      - "No regression: pnpm test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

