# Execution Manifest: Renderer Transitions
#
# Keep synchronized with specs/dev-specs/renderer-transitions.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "renderer-transitions"
spec_path: "specs/dev-specs/renderer-transitions.md"
context_evidence_path: "specs/context/renderer-transitions.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts, or any pre-existing failure is recorded before implementation"
    owner: "main-agent"
    verification: "cd /Users/hoon/workspace/apps/facet && pnpm typecheck && pnpm test && pnpm lint"
  - concern: "runtime"
    requirement: "pnpm install is healthy; quickstart and playground remain buildable"
    owner: "main-agent"
    verification: "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/quickstart build && pnpm --filter @facet/playground build"
  - concern: "quickstart-bundle"
    requirement: "WU-4 can execute the real page bundle test from packages/quickstart/dist/page/app.js"
    owner: "main-agent"
    verification: "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/quickstart build"

review_fix_policy:
  batching_rule: "Group review comments into batches. Main agent applies scoped fixes + quick checks, then re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "No subagent required by this manifest; if owner later delegates, scope is Work Unit files + quick_checks + no_regression_checks only."
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "`useFacet` transition metadata"
    owner_role: "main-agent"
    packages: ["@facet/core", "@facet/react"]
    objective: "Add an additive patch-shape transition hint to useFacet without changing the wire protocol."
    files:
      - path: "packages/react/src/useFacet.ts"
        change_type: "update"
        purpose: "Add StageTransitionHint, FacetState.transition, and atomic tree+hint state update using foldPatchIntoStage(...).mutated/rootReplaced."
      - path: "packages/react/src/useFacet.test.tsx"
        change_type: "update"
        purpose: "RED-first tests for revision increments, root replace detection, no increment for test-only or dropped batches, and initialTree revision 0."
      - path: "packages/core/src/stage-fold.ts"
        change_type: "update"
        purpose: "Add additive StageFoldResult.rootReplaced metadata for actually-applied root document writes."
      - path: "packages/core/src/stage-fold.test.ts"
        change_type: "update"
        purpose: "Cover applied root document writes and guarded root writes that do not land."
    depends_on: []
    parallel_group: "par-1"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/react/src/useFacet.test.tsx -t 'exposes transition metadata for root document writes'"
      target: "packages/react/src/useFacet.test.tsx"
      justification: ""
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/react/src/useFacet.test.tsx -t 'exposes transition metadata for root document writes'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/react/src/useFacet.test.tsx"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "unit"
        target: "packages/react/src/useFacet.test.tsx"
        covers_dc: ["DC-003", "DC-009"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "transition.revision changes only for mutated folds"
      - "Root writes are detected from shared fold metadata with no protocol diff"
      - "No regression: pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Internal motion CSS and constants"
    owner_role: "main-agent"
    packages: ["@facet/react"]
    objective: "Create the renderer-owned static CSS/classes/constants for default lifecycle motion and stage crossfade."
    files:
      - path: "packages/react/src/motion.ts"
        change_type: "add"
        purpose: "Internal constants MANY_CHANGE_THRESHOLD=8, motion durations, stage crossfade duration, class names, MOTION_CSS, and class-composition helpers."
      - path: "packages/react/src/motion.test.ts"
        change_type: "add"
        purpose: "RED-first tests for class names, static CSS, reduced-motion media query, no raw tree interpolation, and threshold value."
    depends_on: []
    parallel_group: "par-1"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/react/src/motion.test.ts -t 'defines scoped motion css with reduced motion'"
      target: "packages/react/src/motion.test.ts"
      justification: ""
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/react/src/motion.test.ts -t 'defines scoped motion css with reduced motion'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/react/src/motion.test.ts"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "unit"
        target: "packages/react/src/motion.test.ts"
        covers_dc: ["DC-001", "DC-005", "DC-006"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "motion.ts is not exported from packages/react/src/index.ts"
      - "CSS includes prefers-reduced-motion: reduce scoped to motion classes"
      - "No regression: pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-3"
    title: "StageRenderer lifecycle and crossfade behavior"
    owner_role: "main-agent"
    packages: ["@facet/react"]
    objective: "Apply the transition policy in StageRenderer while preserving fail-safe rendering, inert stale visuals, stable same-id DOM identity, and existing appear behavior."
    files:
      - path: "packages/react/src/StageRenderer.tsx"
        change_type: "update"
        purpose: "Add optional transition prop; visible-id collection; enter/exit diff; previous-tree exit snapshots; stage crossfade path; inert render mode; motion CSS injection; class combination with existing appear."
      - path: "packages/react/src/StageRenderer.interaction.test.tsx"
        change_type: "update"
        purpose: "RED-first jsdom fake-timer tests for enter, exit, stage crossfade, threshold crossfade, same-id no-motion/no-remount, stale exit cancel, stale fields ignored by collect, and handler-less/offline renderer transitions completing without onAction."
      - path: "packages/react/src/StageRenderer.test.ts"
        change_type: "update"
        purpose: "Static/fail-safe pins: no transition prop first render remains byte-identical, existing appear suite green, malformed/cyclic/null raw trees do not throw with transition logic."
      - path: "packages/react/src/StageRenderer.budget.test.tsx"
        change_type: "update"
        purpose: "Assert visible-id collection and exit snapshot rendering respect render budget and do not add an unbounded traversal."
    depends_on: ["WU-1", "WU-2"]
    parallel_group: "serial-b"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/react/src/StageRenderer.interaction.test.tsx -t 'keeps a removed brick as inert exit visual until the exit timer completes'"
      target: "packages/react/src/StageRenderer.interaction.test.tsx"
      justification: ""
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/react/src/StageRenderer.interaction.test.tsx -t 'keeps a removed brick as inert exit visual until the exit timer completes'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/react/src"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "unit"
        target: "packages/react/src/StageRenderer.interaction.test.tsx"
        covers_dc: ["DC-001", "DC-002", "DC-003", "DC-004", "DC-005"]
        action: "update"
      - type: "unit"
        target: "packages/react/src/StageRenderer.test.ts"
        covers_dc: ["DC-006", "DC-007", "DC-008"]
        action: "update"
      - type: "unit"
        target: "packages/react/src/StageRenderer.budget.test.tsx"
        covers_dc: ["DC-007"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Exit/stage-previous visuals have no live handlers and no field data attrs"
      - "Same-id content/style/media updates preserve field/focus or scroll identity"
      - "Handler-less/offline renderer transitions complete and clean up without a transport/action path"
      - "Existing appear tests and token-free static output remain compatible"
      - "No regression: pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-4"
    title: "Consumer wiring and documentation"
    owner_role: "main-agent"
    packages: ["@facet/react", "@facet/quickstart", "apps/playground"]
    objective: "Wire the transition hint into first-party live surfaces and document the additive API."
    files:
      - path: "packages/quickstart/src/page/main.tsx"
        change_type: "update"
        purpose: "Destructure transition from useFacet and pass it to StageRenderer."
      - path: "packages/quickstart/e2e/bundle.test.ts"
        change_type: "update"
        purpose: "RED-first real-bundle jsdom test that emits an SSE root replace and observes the stage transition path, proving quickstart wiring is present."
      - path: "apps/playground/src/App.tsx"
        change_type: "update"
        purpose: "Pass transition in local two-visitor panes."
      - path: "apps/playground/src/live.tsx"
        change_type: "update"
        purpose: "Pass transition in the live SSE view."
      - path: "packages/react/README.md"
        change_type: "update"
        purpose: "Document useFacet transition and StageRenderer transition wiring; note omission compatibility."
    depends_on: ["WU-1", "WU-3"]
    parallel_group: "serial-c"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/quickstart build && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/bundle.test.ts -t 'wires transition metadata into the real page bundle'"
      target: "packages/quickstart/e2e/bundle.test.ts"
      justification: ""
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/quickstart build && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/bundle.test.ts -t 'wires transition metadata into the real page bundle'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/quickstart build"
      - "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/playground build"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "e2e"
        target: "packages/quickstart/e2e/bundle.test.ts"
        covers_dc: ["DC-003", "DC-009", "DC-010"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Quickstart and playground both pass transition from useFacet into StageRenderer"
      - "README states omitting the prop keeps compatibility but disables exact root-replace crossfade"
      - "No regression: quickstart build + playground build + pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"
