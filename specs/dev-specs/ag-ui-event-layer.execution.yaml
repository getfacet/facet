# Execution Manifest: AG-UI Event Layer
#
# Keep synchronized with specs/dev-specs/ag-ui-event-layer.md (WU ids, files,
# deps, checks). Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "ag-ui-event-layer"
spec_path: "specs/dev-specs/ag-ui-event-layer.md"
context_evidence_path: "specs/context/ag-ui-event-layer.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm install, then pnpm typecheck && pnpm test && pnpm lint pass before any WU starts unless worktree-prep reports an existing unrelated baseline failure"
    owner: "main-agent"
    verification: "run the commands in the prepared worktree"
  - concern: "ag-ui-current"
    requirement: "official @ag-ui/core and @ag-ui/client versions checked during spec-bridge"
    owner: "main-agent"
    verification: "npm view @ag-ui/core@latest version && npm view @ag-ui/client@latest version"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "AG-UI Event Mapping Core"
    owner_role: "subagent"
    packages: ["@facet/ag-ui"]
    objective: "Create the new package skeleton and pure Facet <-> AG-UI event conversion helpers."
    files:
      - path: "packages/extensions/ag-ui/package.json"
        change_type: "add"
        purpose: "package metadata, official AG-UI dependencies, exports/build entries"
      - path: "packages/extensions/ag-ui/tsconfig.json"
        change_type: "add"
        purpose: "strict package typecheck config"
      - path: "packages/extensions/ag-ui/src/events.ts"
        change_type: "add"
        purpose: "state/text/run/custom conversion and Facet shape guards"
      - path: "packages/extensions/ag-ui/src/events.test.ts"
        change_type: "add"
        purpose: "unit coverage for conversion and hostile payloads"
      - path: "pnpm-lock.yaml"
        change_type: "update"
        purpose: "lock official AG-UI dependencies"
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "pnpm exec vitest run packages/extensions/ag-ui/src/events.test.ts"
      target: "packages/extensions/ag-ui/src/events.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/extensions/ag-ui/src/events.test.ts"
      - "pnpm --filter @facet/ag-ui typecheck"
    no_regression_checks:
      - "pnpm typecheck"
    test_plan:
      - type: "unit"
        target: "packages/extensions/ag-ui/src/events.test.ts"
        covers_dc: ["DC-002", "DC-003", "DC-004", "DC-005", "DC-006", "DC-008", "DC-009"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported"
      - "Facet patches map to /facet/stage STATE_DELTA and back"
      - "Malformed, null, empty, cyclic, or non-Facet AG-UI state/custom/raw produces no unsafe stage mutation"
      - "No regression: pnpm typecheck"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Browser FacetTransport Over AG-UI"
    owner_role: "subagent"
    packages: ["@facet/ag-ui"]
    objective: "Implement a browser-safe AgUiTransport that wraps an AG-UI agent or HttpAgent and emits native Facet messages to useFacet."
    files:
      - path: "packages/extensions/ag-ui/src/transport.ts"
        change_type: "add"
        purpose: "FacetTransport implementation and createHttpAgUiTransport"
      - path: "packages/extensions/ag-ui/src/transport.test.ts"
        change_type: "add"
        purpose: "serialized send/record and event-to-message behavior"
    depends_on: ["WU-1"]
    parallel_group: "serial-b"
    red_check:
      command: "pnpm exec vitest run packages/extensions/ag-ui/src/transport.test.ts"
      target: "packages/extensions/ag-ui/src/transport.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/extensions/ag-ui/src/transport.test.ts"
      - "pnpm exec vitest run packages/extensions/ag-ui/src/events.test.ts packages/extensions/ag-ui/src/transport.test.ts"
      - "pnpm --filter @facet/ag-ui typecheck"
    no_regression_checks:
      - "pnpm typecheck"
    test_plan:
      - type: "unit"
        target: "packages/extensions/ag-ui/src/transport.test.ts"
        covers_dc: ["DC-001", "DC-002", "DC-003", "DC-004", "DC-005", "DC-007", "DC-009"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported"
      - "AgUiTransport implements send, record, and subscribe without importing Node built-ins"
      - "Text chunks are buffered to Facet say in order and state events become Facet patch"
      - "Rapid send/record calls are serialized with monotonic Facet seq; duplicate snapshots do not duplicate chat or crash"
      - "No regression: pnpm typecheck"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-3"
    title: "Server Runtime to AG-UI Stream Adapter"
    owner_role: "subagent"
    packages: ["@facet/ag-ui"]
    objective: "Implement a Node-only server adapter that validates AG-UI input, calls FacetRuntime, and writes AG-UI event streams."
    files:
      - path: "packages/extensions/ag-ui/src/server.ts"
        change_type: "add"
        purpose: "runFacetAsAgUi, handleAgUiRequest, SSE writer"
      - path: "packages/extensions/ag-ui/src/server.test.ts"
        change_type: "add"
        purpose: "integration tests with a memory runtime and fake HTTP requests"
    depends_on: ["WU-1"]
    parallel_group: "serial-c"
    red_check:
      command: "pnpm exec vitest run packages/extensions/ag-ui/src/server.test.ts"
      target: "packages/extensions/ag-ui/src/server.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/extensions/ag-ui/src/server.test.ts"
      - "pnpm exec vitest run packages/extensions/ag-ui/src/events.test.ts packages/extensions/ag-ui/src/server.test.ts"
      - "pnpm --filter @facet/ag-ui typecheck"
    no_regression_checks:
      - "pnpm typecheck"
    test_plan:
      - type: "integration"
        target: "packages/extensions/ag-ui/src/server.test.ts"
        covers_dc: ["DC-001", "DC-003", "DC-004", "DC-005", "DC-006", "DC-007"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported"
      - "Valid RunAgentInput.forwardedProps.facet.event reaches FacetRuntime.handle"
      - "Valid forwardedProps.facet.record reaches FacetRuntime.record without invoking the agent"
      - "HTTP handler emits RUN_STARTED first and RUN_FINISHED or RUN_ERROR terminally"
      - "Malformed AG-UI input, agent/runtime throw, and rapid same-visitor requests are covered"
      - "No regression: pnpm typecheck"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-4"
    title: "Package Exports and Browser-Safe Barrel"
    owner_role: "subagent"
    packages: ["@facet/ag-ui"]
    objective: "Expose the browser-safe package entrypoint and TypeScript aliases without exporting Node server code from the root."
    files:
      - path: "packages/extensions/ag-ui/src/index.ts"
        change_type: "add"
        purpose: "browser-safe barrel exports"
      - path: "packages/extensions/ag-ui/src/index.test.ts"
        change_type: "add"
        purpose: "executable export/boundary checks"
      - path: "tsconfig.base.json"
        change_type: "update"
        purpose: "path aliases for @facet/ag-ui and @facet/ag-ui/server"
    depends_on: ["WU-1", "WU-2", "WU-3"]
    parallel_group: "serial-d"
    red_check:
      command: "pnpm exec vitest run packages/extensions/ag-ui/src/index.test.ts"
      target: "packages/extensions/ag-ui/src/index.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/extensions/ag-ui/src/index.test.ts"
      - "pnpm --filter @facet/ag-ui build"
      - "pnpm --filter @facet/ag-ui typecheck"
    no_regression_checks:
      - "pnpm build"
      - "pnpm typecheck"
    test_plan:
      - type: "unit"
        target: "packages/extensions/ag-ui/src/index.test.ts"
        covers_dc: ["DC-008", "DC-009"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported"
      - "@facet/ag-ui root export is browser-safe and does not export server.ts"
      - "@facet/ag-ui/server alias resolves separately for Node consumers"
      - "No regression: pnpm build && pnpm typecheck"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-5"
    title: "Documentation Posture and Boundary Test"
    owner_role: "subagent"
    packages: ["@facet/ag-ui", "docs"]
    objective: "Update architecture/package docs and add an executable boundary test for AG-UI dependency isolation, native fallback posture, and external dial-out waiver."
    files:
      - path: "packages/extensions/ag-ui/src/package-boundary.test.ts"
        change_type: "add"
        purpose: "docs/import boundary grep tests"
      - path: "AGENTS.md"
        change_type: "update"
        purpose: "package map and semantic tier mention"
      - path: "docs/PACKAGE-BOUNDARIES.md"
        change_type: "update"
        purpose: "new package tier and native fallback posture"
      - path: "docs/ARCHITECTURE.md"
        change_type: "update"
        purpose: "AG-UI moved from candidate to adopted adapter"
    depends_on: ["WU-1", "WU-2", "WU-3", "WU-4"]
    parallel_group: "serial-e"
    red_check:
      command: "pnpm exec vitest run packages/extensions/ag-ui/src/package-boundary.test.ts"
      target: "packages/extensions/ag-ui/src/package-boundary.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/extensions/ag-ui/src/package-boundary.test.ts"
      - "pnpm --filter @facet/ag-ui typecheck"
      - 'bash -lc ''! rg "@ag-ui/" packages/core/core packages/core/core/package.json'''
    no_regression_checks:
      - "pnpm typecheck"
    test_plan:
      - type: "integration"
        target: "packages/extensions/ag-ui/src/package-boundary.test.ts"
        covers_dc: ["DC-006", "DC-008", "DC-009", "DC-010"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported"
      - "Docs state that native SSE/POST remains a reference fallback, not the new external interop path"
      - "Docs state that external NAT-safe AG-UI dial-out remains a future adapter and native @facet/agent-client is unchanged"
      - "Boundary test confirms @facet/core has no @ag-ui/* import/dependency and quickstart/playground native consumers are documented as fallback"
      - "No regression: pnpm typecheck"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"
