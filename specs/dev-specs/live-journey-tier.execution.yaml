# Execution Manifest: /live-test "Live Journey" Tier
#
# Keep synchronized with specs/dev-specs/live-journey-tier.md
# (WU ids, files, deps, checks). Final gate source of truth: AGENTS.md +
# docs/REVIEW-RULES.md.

feature_slug: "live-journey-tier"
spec_path: "specs/dev-specs/live-journey-tier.md"
context_evidence_path: "specs/context/live-journey-tier.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; pnpm --filter @facet/quickstart build produces dist/cli.js + dist/page/app.js (bin smoke + the real page the journey loads); pnpm exec playwright install chromium after the Playwright devDep lands (WU-3). OPENAI_API_KEY needed only for the WU-4 recorded real-tier runs, NOT for any red_check (all red_checks use stub/pure logic)."
    owner: "main-agent"
    verification: "pnpm --filter @facet/quickstart build && pnpm exec playwright install chromium"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"

work_units:
  - id: "WU-1"
    title: "Verdict aggregation — HARD/SOFT/quorum rule (pure, unit-tested)"
    owner_role: "subagent"
    packages: ["@facet/quickstart"]
    objective: "Land Decision A — aggregateVerdict(votes, policy?) with the pure HARD/SOFT/quorum rule (below-quorum ⇒ insufficient ⇒ HARD FAIL, never a silent pass; SOFT fail ⇒ warning, never tier FAIL) + DEFAULT_LENS_POLICY + a tiny import.meta-guarded main() CLI the workflow calls; deterministic, no I/O in the function."
    files:
      - path: "packages/quickstart/e2e/journey/verdict.ts"
        change_type: "add"
        purpose: "aggregateVerdict, types, DEFAULT_LENS_POLICY, import.meta-guarded main() (reads votes JSON, prints verdict, exit 0/1)"
      - path: "packages/quickstart/e2e/journey/verdict.test.ts"
        change_type: "add"
        purpose: "RED-first: soft-fail+hard-pass ⇒ PASS+warning (DC-003); HARD below quorum / all-abstain / missing rows ⇒ FAIL insufficient (DC-004); tie ⇒ fail; happy all-pass ⇒ PASS no warnings"
    depends_on: []
    parallel_group: "par-1"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/verdict.test.ts -t 'a soft-lens fail is a warning, not a tier fail'"
      target: "packages/quickstart/e2e/journey/verdict.test.ts"
      justification: ""
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/verdict.test.ts -t 'a soft-lens fail is a warning, not a tier fail'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/verdict.test.ts"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "unit"
        target: "packages/quickstart/e2e/journey/verdict.test.ts"
        covers_dc: ["DC-003", "DC-004"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "aggregateVerdict is pure (no I/O); main() is the only I/O, import.meta-guarded"
      - "File lives under e2e/; pnpm test (root glob) does NOT run it"
      - "No regression: pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Journey harness — shared server boot/teardown + node dist/cli.js bin smoke"
    owner_role: "subagent"
    packages: ["@facet/quickstart"]
    objective: "Land Decision B — bootJourney({agent, agentId}) (random-port + EADDRINUSE retry via startQuickstart, .close() teardown) and runBinSmoke() (spawn node dist/cli.js --stub, poll /health, kill child, return {ok, detail}), proving DC-005 (bin result reported) + DC-006 (no-orphan teardown) against the stub — no key, no network."
    files:
      - path: "packages/quickstart/e2e/journey/harness.ts"
        change_type: "add"
        purpose: "bootJourney, runBinSmoke, resolveJourneyProvider(env) wrapper, BinSmokeResult type; teardown via finally"
      - path: "packages/quickstart/e2e/journey/harness.test.ts"
        change_type: "add"
        purpose: "RED-first: runBinSmoke() against --stub RUNS and returns a {ok, detail} result (typeof result.ok === 'boolean' && result.detail, stderr captured) — DC-005 is 'runs + reports a result', NOT ok===true (in the dev monorepo the documented @facet/* → src/*.ts resolution gap makes ok:false; the value is not asserted); bootJourney({agent:createStubAgent()}) then .close() ⇒ port free again (DC-006 no-orphan); boot retries on port collision"
    depends_on: []
    parallel_group: "par-1"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/harness.test.ts -t 'bin smoke runs the stub cli and reports a result'"
      target: "packages/quickstart/e2e/journey/harness.test.ts"
      justification: "RED = harness.ts absent (import error, no result); GREEN = runBinSmoke() reports a {ok, detail} result regardless of ok's value (dev-monorepo expected ok:false with the resolution error in detail — DC-005 is 'runs + reports', not ok===true)"
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/quickstart build # runBinSmoke spawns dist/cli.js"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/harness.test.ts -t 'bin smoke runs the stub cli and reports a result'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/harness.test.ts"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "e2e"
        target: "packages/quickstart/e2e/journey/harness.test.ts"
        covers_dc: ["DC-005", "DC-006"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl — harness.ts absent ⇒ import error, no result — + PASS post-impl; needs pnpm --filter @facet/quickstart build first)"
      - "runBinSmoke() assertion is that it RUNS and REPORTS a {ok, detail} result (typeof result.ok === 'boolean' && result.detail, stderr captured), NOT ok===true — in the dev monorepo the documented @facet/* → src/*.ts resolution gap makes ok:false (DC-005 = 'runs + reports the result', per Decision B)"
      - "Every boot paired with .close(); bin-smoke child killed in finally; port free after teardown (asserted)"
      - "No @facet/quickstart src/ change (harness only consumes exported startQuickstart/createStubAgent/resolveProvider)"
      - "No regression: pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-3"
    title: "Fixed Playwright journey + DOM-settle wait + negative fixture + self-test (Playwright dep)"
    owner_role: "subagent"
    packages: ["@facet/quickstart", "root-devDep"]
    objective: "Land Decision C — runJourney (4 fixed steps, ≥4 screenshots, settleDom quiet-window+bounded-timeout resolving OQ-1, per-visitor isolation), the main() CLI, the --fixture broken negative mode + broken.html, and the headless-stub self-test red_check; add playwright as a root devDependency so journey.ts typechecks."
    files:
      - path: "packages/quickstart/e2e/journey/journey.ts"
        change_type: "add"
        purpose: "runJourney(page, opts), settleDom (OQ-1), 4-step fixed journey, --fixture broken mode, main() CLI; captures ≥4 shots; no secrets in shots"
      - path: "packages/quickstart/e2e/journey/journey.selftest.test.ts"
        change_type: "add"
        purpose: "RED-first: boot stub via bootJourney, run runJourney headless ⇒ ≥4 screenshots exist; post-chat settle saw a DOM change; a click was dispatched; --fixture broken captures the broken page"
      - path: "packages/quickstart/e2e/journey/fixtures/broken.html"
        change_type: "add"
        purpose: "deliberately broken page (blank canvas + raw JSON text + off-screen overlap) — the DC-002 negative fixture for the safety judge"
      - path: "package.json"
        change_type: "update"
        purpose: "add playwright to root devDependencies (dev-only; not in any package dependencies)"
    depends_on: ["WU-2"]
    parallel_group: "serial-b"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/journey.selftest.test.ts -t 'runs the fixed journey against the stub and captures at least four screenshots'"
      target: "packages/quickstart/e2e/journey/journey.selftest.test.ts"
      justification: ""
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm install # pick up the new playwright devDep"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec playwright install chromium"
      - "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/quickstart build # journey loads the real dist/page/app.js"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/journey.selftest.test.ts -t 'runs the fixed journey against the stub and captures at least four screenshots'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "e2e"
        target: "packages/quickstart/e2e/journey/journey.selftest.test.ts"
        covers_dc: ["DC-001", "DC-002"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (self-test needs pnpm install + playwright install chromium + quickstart build first)"
      - "≥4 screenshots per run; settleDom uses a quiet-window + bounded timeout (no fixed sleep); a settle timeout captures the shot + flags it (no throw)"
      - "playwright added ONLY to root devDependencies; pnpm typecheck green repo-wide"
      - "File lives under e2e/; pnpm test does NOT run it"
      - "No regression: pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-4"
    title: "live-journey Workflow + skill wiring + gitignore + AGENTS.md note"
    owner_role: "subagent"
    packages: ["repo-tooling", "docs"]
    objective: "Land Decision D — the fan-out→judge→synthesize workflow (preflight boot + bin smoke → 3 fresh-visitor journeys → per-(visitor×lens) vision judges → node verdict.js synthesis + GIF + guaranteed teardown), wire /live-test to invoke it after the unchanged Tiers 1-2 (SKIP-with-reason when no key), gitignore the artifacts dir, and note the browser tier in AGENTS.md. Every gating decision is delegated to WU-1's tested verdict.ts."
    files:
      - path: ".claude/workflows/live-journey.js"
        change_type: "add"
        purpose: "fan-out (3 visitors) → per-lens vision-judge panel → synthesize via node verdict.js; preflight boot+bin-smoke; teardown in finally; passes the expected (lens, visitor) matrix so missing votes are insufficient"
      - path: ".claude/skills/live-test/SKILL.md"
        change_type: "update"
        purpose: "add the live-journey tier AFTER Tiers 1a/1b/2 (unchanged); owner-run/not-CI; no key ⇒ SKIP-with-reason (distinct from the Tier-2 SKIPPED=FAIL rule); PASS/FAIL/WARNING/SKIP output row"
      - path: ".gitignore"
        change_type: "update"
        purpose: "ignore packages/quickstart/e2e/journey/artifacts/ (screenshots + GIF; not committed — Decision Lock)"
      - path: "AGENTS.md"
        change_type: "update"
        purpose: "note the new owner-run browser/journey tier alongside the existing vitest /live-test tiers (one-line addition)"
    depends_on: ["WU-1", "WU-2", "WU-3"]
    parallel_group: "serial-c"
    red_check:
      command: "N/A"
      target: ""
      justification: "Orchestration JS (workflow) + skill markdown + gitignore + docs; no production code path with a unit seam. The workflow mirrors spec-bridge.js/code-review.js (which carry no unit tests); its ONLY gating decision is delegated to verdict.ts, unit-covered in WU-1 (DC-003/DC-004). DC-001 (full PASS) and DC-002 (safety judge ⇒ FAIL on broken.html) are inherently LLM/vision-judged and are verified by the recorded owner-run tier runs in this WU's handoff, not by a deterministic vitest."
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && node --check .claude/workflows/live-journey.js"
      - "cd /Users/hoon/workspace/apps/facet && pnpm format:check"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "integration"
        target: "WU-4 recorded owner-run tier runs (happy path on main ⇒ PASS; --fixture broken ⇒ FAIL)"
        covers_dc: ["DC-001", "DC-002", "DC-005", "DC-006"]
        action: "new"
    done_conditions:
      - "N/A red check acknowledged (justification recorded); node --check on the workflow passes"
      - "Workflow delegates PASS/FAIL to node verdict.js (no duplicated aggregation rule); teardown in finally (no orphan)"
      - "Skill invokes the tier AFTER unchanged Tiers 1-2; no-key ⇒ SKIP-with-reason (owner-run/not-CI); Tier-2 SKIPPED=FAIL rule untouched"
      - "Recorded runs in handoff: happy path on main ⇒ PASS + artifacts (DC-001); --fixture broken ⇒ tier FAIL naming the shot (DC-002); bin-smoke line present (DC-005); Tiers 1-2 identical + no listener on the port after (DC-006)"
      - "No regression: pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

execution_order:
  - "WU-1 || WU-2 (par-1; disjoint file sets: verdict.* / harness.*)"
  - "WU-3 (consumes WU-2 bootJourney; adds the playwright devDep)"
  - "WU-4 (consumes WU-1 verdict.js + WU-3 journey.js; orchestration/docs)"

final_gate_chain:
  - "/verify"
  - "/code-review (PASS = P0-P2 = 0)"
  - "/refactor-audit (periodic; owner-run)"
  - "/live-test (Tiers 1a/1b/2 as today; then the new live-journey tier — owner-run, real key; change does NOT touch packages/quickstart/src/, so the Tier-2 SKIPPED=FAIL rule is unaffected and the new tier is SKIP-with-reason without a key)"
  - "Squash → one feature commit; commit/PR on the user's explicit go"
