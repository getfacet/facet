# Execution Manifest: Landing-Grade Vocabulary (v1)
#
# Keep synchronized with specs/dev-specs/landing-grade-vocab.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "landing-grade-vocab"
spec_path: "specs/dev-specs/landing-grade-vocab.md"
context_evidence_path: "specs/context/landing-grade-vocab.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install complete; @facet/core, @facet/react, @facet/assets build cleanly; jsdom available for react render tests"
    owner: "main-agent"
    verification: "pnpm --filter @facet/core --filter @facet/react --filter @facet/assets build"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "Core token vocabulary + node surface + primitive validation"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Add the closed token groups + node style/attribute fields and validate every new style token (drop-with-issue) plus the backdrop string passthrough."
    module_shape:
      decision: "preserve"
      rationale: "Extends existing token arrays, node interfaces, and the single primitive-node-validation module; no new files or boundaries — the vocabulary lives where the closed vocabulary already lives (@facet/core)."
    files:
      - path: "packages/core/core/src/tokens.ts"
        change_type: "update"
        purpose: "Extend FONT_SIZES (4xl/5xl/6xl); add MIN_HEIGHTS, MAX_WIDTHS, TRACKINGS, LEADINGS, GRADIENTS, SCRIMS, SCHEMES, HIGHLIGHTS arrays + derived types."
      - path: "packages/core/core/src/nodes.ts"
        change_type: "update"
        purpose: "BoxStyle += minHeight/maxWidth/sticky/gradient/backdropScrim/scheme; TextStyle += tracking/leading/highlight; BoxNode += backdrop?: NodeId."
      - path: "packages/core/core/src/primitive-node-validation.ts"
        change_type: "update"
        purpose: "boxStyle asToken for minHeight/maxWidth/gradient/backdropScrim/scheme + asBool sticky; textStyle asToken for tracking/leading/highlight; box node backdrop string passthrough."
      - path: "packages/core/core/src/validate.test.ts"
        change_type: "update"
        purpose: "landing-grade-vocab describe: token accept/drop-with-issue/never-throws; backdrop string kept vs non-string dropped; back-compat no-new-token tree unchanged."
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/validate.test.ts -t 'landing-grade-vocab'"
      target: "packages/core/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/validate.test.ts -t 'landing-grade-vocab'"
      - "pnpm --filter @facet/core typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/validate.test.ts"
        covers_dc: ["DC-002", "DC-003", "DC-006"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Every new style token drops-with-issue on unknown and never throws; backdrop non-string dropped, string kept"
      - "No regression: pnpm exec vitest run packages/core/core/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Core operator-theme override groups"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Make every new token group overridable through the operator theme-doc validation machinery (fail-safe clamp/drop preserved)."
    module_shape:
      decision: "preserve"
      rationale: "New groups plug into the existing theme-types / theme-validation / theme-token-validation trio exactly like existing groups; no new module."
    files:
      - path: "packages/core/core/src/theme-types.ts"
        change_type: "update"
        purpose: "FacetTheme += minHeight/maxWidth/tracking/leading/gradient/scrim/highlight/colorDark (Partial<Record<Token,string>>)."
      - path: "packages/core/core/src/theme-validation.ts"
        change_type: "update"
        purpose: "Add the 8 groups to KNOWN_KEYS, the typed input interface, and one validateGroup(...) block each."
      - path: "packages/core/core/src/theme-token-validation.ts"
        change_type: "update"
        purpose: "Handlers for the new groups (dimension/clamp for heights/widths/tracking/leading; CSS-shape for gradient/scrim/highlight; color for colorDark)."
      - path: "packages/core/core/src/theme.test.ts"
        change_type: "update"
        purpose: "landing-grade-vocab cases: each group overrides when valid; malformed clamped/dropped with an issue; unknown key still warned."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/theme.test.ts -t 'landing-grade-vocab'"
      target: "packages/core/core/src/theme.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/theme.test.ts -t 'landing-grade-vocab'"
      - "pnpm --filter @facet/core typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/theme.test.ts"
        covers_dc: ["DC-005"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Each new group accepted when valid; malformed clamped/dropped with an issue"
      - "No regression: pnpm exec vitest run packages/core/core/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-3"
    title: "STAGE_SPEC agent teaching"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Teach the LLM the new tokens + backdrop (closed sets, names only, no raw CSS)."
    module_shape:
      decision: "preserve"
      rationale: "STAGE_SPEC is a single exported constant; teaching edits stay in spec.ts with its lockstep spec.test.ts."
    files:
      - path: "packages/core/core/src/spec.ts"
        change_type: "update"
        purpose: "Add 4xl/5xl/6xl, new BoxStyle/TextStyle tokens, sticky, and backdrop (media-node id) to the STAGE_SPEC lines; note closed-set-only / no raw CSS."
      - path: "packages/core/core/src/spec.test.ts"
        change_type: "update"
        purpose: "Assert STAGE_SPEC mentions each new token name + backdrop and still parses."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/spec.test.ts -t 'landing-grade-vocab'"
      target: "packages/core/core/src/spec.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/spec.test.ts -t 'landing-grade-vocab'"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/spec.test.ts"
        covers_dc: ["DC-007"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "STAGE_SPEC teaches every new token + backdrop, names only"
      - "No regression: pnpm exec vitest run packages/core/core/src/spec.test.ts"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-4"
    title: "Assets default token values + default theme"
    owner_role: "subagent"
    packages: ["@facet/assets"]
    objective: "Provide concrete default CSS for every new group, add the 3 FONT_SIZE keys (RISK-API-1), and assemble them into DEFAULT_THEME."
    module_shape:
      decision: "preserve"
      rationale: "Default token VALUES are the single source of truth in @facet/assets; new maps sit beside the existing SPACE/FONT_SIZE/... maps and feed the existing DEFAULT_THEME assembly."
    files:
      - path: "packages/core/assets/src/theme-tokens.ts"
        change_type: "update"
        purpose: "FONT_SIZE += 4xl/5xl/6xl; add null-proto maps MIN_HEIGHT, MAX_WIDTH, TRACKING, LEADING, GRADIENT, SCRIM, HIGHLIGHT, COLOR_DARK (satisfies Record<Token,string>)."
      - path: "packages/core/assets/src/theme.ts"
        change_type: "update"
        purpose: "Wire the new groups into the default theme assembly / DEFAULT_THEME."
      - path: "packages/core/assets/src/theme.test.ts"
        change_type: "update"
        purpose: "Assert defaults present + resolvable for each new group (incl. the 3 new font sizes and the dark palette)."
    depends_on: ["WU-1", "WU-2"]
    parallel_group: "serial-assets"
    red_check:
      command: "pnpm exec vitest run packages/core/assets/src/theme.test.ts -t 'landing-grade-vocab'"
      target: "packages/core/assets/src/theme.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/assets/src/theme.test.ts -t 'landing-grade-vocab'"
      - "pnpm --filter @facet/assets typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/assets/src"
      - "pnpm --filter @facet/assets typecheck"
    test_plan:
      - type: "unit"
        target: "packages/core/assets/src/theme.test.ts"
        covers_dc: ["DC-005", "DC-001"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "FONT_SIZE has all 10 keys; every new group has default values"
      - "@facet/assets typecheck green (repairs the RISK-API-1 FONT_SIZE record)"
      - "No regression: pnpm exec vitest run packages/core/assets/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-5"
    title: "React theme resolution + token to CSS maps + layout contract"
    owner_role: "subagent"
    packages: ["@facet/react"]
    objective: "Resolve/overlay the new theme groups, map new tokens to CSS in boxStyle/textStyle, and add the flow-only backdrop/scrim/sticky style helpers with position:absolute confined to the synthesized layer."
    module_shape:
      decision: "preserve"
      rationale: "Extends the existing token to CSS theme module and the layout-contract helper module; position:absolute is introduced only inside a new layout-contract helper so the flow-only boundary stays in one auditable place."
    files:
      - path: "packages/core/react/src/theme.ts"
        change_type: "update"
        purpose: "ResolvedTheme += minHeight/maxWidth/tracking/leading/gradient/scrim/highlight/colorDark/colorLight; DEFAULT_RESOLVED entries; resolveTheme overlayGroup per group; boxStyle maps minHeight/maxWidth/sticky/gradient; textStyle maps tracking/leading/highlight."
      - path: "packages/core/react/src/layout-contract.ts"
        change_type: "update"
        purpose: "backdropHostStyle (position:relative) + backdropLayerStyle (position:absolute inset-0 cover) + scrimStyle + stickyStyle (framework top offset); position:absolute only on the layer helper."
      - path: "packages/core/react/src/theme.test.ts"
        change_type: "update"
        purpose: "landing-grade-vocab cases: each group overlays; boxStyle/textStyle emit mapped CSS; unknown token falls to default."
    depends_on: ["WU-1", "WU-2", "WU-4"]
    parallel_group: "serial-b"
    red_check:
      command: "pnpm exec vitest run packages/core/react/src/theme.test.ts -t 'landing-grade-vocab'"
      target: "packages/core/react/src/theme.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/react/src/theme.test.ts -t 'landing-grade-vocab'"
      - "pnpm --filter @facet/react typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/react/src"
      - "pnpm --filter @facet/react typecheck"
    test_plan:
      - type: "unit"
        target: "packages/core/react/src/theme.test.ts"
        covers_dc: ["DC-005", "DC-004", "DC-001"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Each new group overlays; new tokens map to CSS; position:absolute only on the layer helper"
      - "No regression: pnpm exec vitest run packages/core/react/src + @facet/react typecheck green"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-6"
    title: "React renderer - backdrop layer paint + scheme threading + budget"
    owner_role: "subagent"
    packages: ["@facet/react"]
    objective: "Paint the backdrop as exactly two layers via the safe media path, resolve to a media node only, decrement the render budget, thread the scheme color-map swap, and prove fail-safe + flow-only."
    module_shape:
      decision: "preserve"
      rationale: "Backdrop paint lives in the box case of the existing renderer-render path and reuses renderMediaNode (the sole safe media sink); a new co-located backdrop.test.tsx carries the render/fail-safe/flow-only assertions."
    files:
      - path: "packages/core/react/src/renderer-render.tsx"
        change_type: "update"
        purpose: "Box case: resolve node.backdrop read-only to a MEDIA node (else no layer), decrement budget.left, render via renderMediaNode cover mode inside a position:relative host with flow children on top; apply backdropScrim; derive {...theme,color} per scheme for children."
      - path: "packages/core/react/src/renderer-media.tsx"
        change_type: "update"
        purpose: "Add a cover fill mode (absolute inset-0, object-fit:cover, aria-hidden) reusing the isSafeMediaSrc gate; default mode unchanged."
      - path: "packages/core/react/src/backdrop.test.tsx"
        change_type: "add"
        purpose: "DC-001 hero render; DC-003 dangling/non-media/unsafe/self-cycle no-layer no-throw no-recurse budget-honored; DC-004 two layers + no position:absolute on flow child + sticky in flow; DC-006 no-backdrop byte-identical + id in both backdrop+children renders both."
    depends_on: ["WU-1", "WU-5"]
    parallel_group: "serial-c"
    red_check:
      command: "pnpm exec vitest run packages/core/react/src/backdrop.test.tsx"
      target: "packages/core/react/src/backdrop.test.tsx"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/react/src/backdrop.test.tsx"
      - "pnpm --filter @facet/react typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/react/src"
      - "pnpm --filter @facet/react typecheck"
    test_plan:
      - type: "unit"
        target: "packages/core/react/src/backdrop.test.tsx"
        covers_dc: ["DC-001", "DC-003", "DC-004", "DC-006"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Exactly two layers; no flow child gets position:absolute; media-only resolve; budget decremented; never throws"
      - "scheme swaps the subtree color map; node-consumption = render-both"
      - "No regression: pnpm exec vitest run packages/core/react/src + @facet/react typecheck green"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"
