# Execution Manifest: Kits & Themes as Data (Bundle B)
#
# Keep synchronized with specs/dev-specs/kits-themes-as-data.md
# (WU ids, files, deps, checks). Final gate source of truth: AGENTS.md +
# docs/REVIEW-RULES.md.

feature_slug: "kits-themes-as-data"
spec_path: "specs/dev-specs/kits-themes-as-data.md"
context_evidence_path: "specs/context/kits-themes-as-data.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; pnpm --filter @facet/quickstart build runnable (WU-10 Tier 1b needs the real bundle); no provider key required for any blocking WU (keys only for the Tier-2/3 smoke at the final gate)"
    owner: "main-agent"
    verification: "pnpm install && pnpm --filter @facet/quickstart build"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"

work_units:
  - id: "WU-1"
    title: "Core theme documents — FacetTheme + validateTheme"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Land Decision 1 — the FacetTheme document type and validateTheme (per-group membership over the tokens.ts arrays, value allowlist, url()/var()/expression()/javascript: deny-list as errors, dimension/weight clamps as warnings, null-proto output maps, WCAG contrast warning naming pair + ratio), pure and dependency-free."
    files:
      - path: "packages/core/src/theme.ts"
        change_type: "add"
        purpose: "FacetTheme, ThemeIssue, ThemeValidationResult, validateTheme, contrast arithmetic (no color lib, no node:*)"
      - path: "packages/core/src/theme.test.ts"
        change_type: "add"
        purpose: "RED-first table test: hostile values refused as errors; __proto__/constructor keys never resolve; dimension clamp with warning; low-contrast warning with pair + ratio, document accepted; junk inputs never throw; valid partial document round-trips"
      - path: "packages/core/src/index.ts"
        change_type: "update"
        purpose: "add export * from './theme.js'"
    depends_on: []
    parallel_group: "par-1"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/theme.test.ts -t 'rejects url() and expression() color values as errors'"
      target: "packages/core/src/theme.test.ts"
      justification: ""
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/theme.test.ts -t 'rejects url() and expression() color values as errors'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/theme.test.ts"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "unit"
        target: "packages/core/src/theme.test.ts"
        covers_dc: ["DC-003", "DC-004"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "@facet/core still dependency-free, no node:* imports; validateTheme never throws on any input"
      - "No regression: pnpm test + pnpm lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

