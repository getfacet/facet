# Execution Manifest: Async Delivery & Scale Round 1
#
# Keep synchronized with specs/dev-specs/async-delivery-1.md (WU ids, files,
# deps, checks). Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.
# Requirements source: specs/feature-intake/async-delivery-1.md (DC-001..DC-009;
# Decision Lock FIXED). Context evidence: specs/context/async-delivery-1.md
# (RISK-INV-1/2, RISK-API-1/2, RISK-PKG-1 — all resolved in the spec).
# Assumptions resolved in the spec: A-1 seq is server-local (frame ring, Sink and
# store-postgres untouched); A-2 client POST abort = fixed 10s AbortSignal.timeout;
# A-3 interim note = plain non-terminal say.

feature_slug: "async-delivery-1"
spec_path: "specs/dev-specs/async-delivery-1.md"
context_evidence_path: "specs/context/async-delivery-1.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; no live server/bridge needed (server WUs use the in-file random-port harness; bridge WU-5 uses a stub brain command)"
    owner: "main-agent"
    verification: "pnpm install"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  - "/update-tests"
  - "/verify"
  - "/code-review (PASS = P0-P2 = 0)"
  - "/update-docs (STAGE_SPEC must show NO diff)"

work_units:
  - id: "WU-1"
    title: "core: createSemaphore (FIFO concurrency cap primitive)"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "A node-free FIFO semaphore next to createSerialQueue so the bridge can cap cross-visitor concurrency without reordering any single visitor."
    files:
      - path: "packages/core/src/semaphore.ts"
        change_type: "add"
        purpose: "createSemaphore(limit): FIFO waiters; integer limit >= 1 or throw at construction; slot released on settle (resolve OR reject); promise-only, no Node imports (modeled on serial-queue.ts:10-23)"
      - path: "packages/core/src/semaphore.test.ts"
        change_type: "add"
        purpose: "cap honored (limit 2, 5 tasks -> max concurrency 2); FIFO start order; rejection releases slot; limit 1 = strict serial; limit 0/non-integer throws"
      - path: "packages/core/src/index.ts"
        change_type: "update"
        purpose: "export * from './semaphore.js' (barrel-reachable per AGENTS.md)"
    depends_on: []
    parallel_group: "par-1"
    red_check:
      command: 'pnpm exec vitest run packages/core/src/semaphore.test.ts -t "runs at most limit tasks concurrently"'
      target: "packages/core/src/semaphore.test.ts"
      justification: ""
    quick_checks:
      - 'pnpm exec vitest run packages/core/src/semaphore.test.ts -t "runs at most limit tasks concurrently"'
      - "pnpm exec vitest run packages/core/src/semaphore.test.ts"
      - "pnpm typecheck"
    no_regression_checks:
      - "pnpm test"
    test_plan:
      - type: "unit"
        target: "packages/core/src/semaphore.test.ts"
        covers_dc: ["DC-005"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "createSemaphore importable from @facet/core barrel; zero Node-only imports in @facet/core (grep guard); rejection releases the slot"
      - "No regression: pnpm test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "runtime: FacetRuntime.applyMessages (late-result apply path)"
    owner_role: "subagent"
    packages: ["@facet/runtime"]
    objective: "Additive runtime method applying already-produced agent messages to a session through the same per-visitor serial queue, per-op salvage, save, and sink record as a live turn."
    files:
      - path: "packages/runtime/src/runtime.ts"
        change_type: "update"
        purpose: "applyMessages(visitor, event, messages): enqueue on this.serialize(sessionKey) (runtime.ts:39,73); body = handleOne minus the agent call (open -> applyToSession salvage runtime.ts:95-125 -> save -> fire-and-forget serializeRecord with existing .catch log); returns messages"
      - path: "packages/runtime/src/runtime.test.ts"
        change_type: "update"
        purpose: "applyMessages persists patches + records to sink with the given event; ordering vs handle for the same visitor (enqueue order wins); salvage: one stale op + one good op -> good op applied, say kept, no throw (DC-008 unit)"
    depends_on: []
    parallel_group: "par-1"
    red_check:
      command: 'pnpm exec vitest run packages/runtime/src/runtime.test.ts -t "applyMessages applies a late result through the per-visitor queue"'
      target: "packages/runtime/src/runtime.test.ts"
      justification: ""
    quick_checks:
      - 'pnpm exec vitest run packages/runtime/src/runtime.test.ts -t "applyMessages applies a late result through the per-visitor queue"'
      - "pnpm exec vitest run packages/runtime/src/runtime.test.ts"
      - "pnpm typecheck"
    no_regression_checks:
      - "pnpm test"
    test_plan:
      - type: "unit"
        target: "packages/runtime/src/runtime.test.ts"
        covers_dc: ["DC-001", "DC-008"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "handle behavior untouched (existing runtime tests green unmodified); salvage exercised by the stale-op test"
      - "No regression: pnpm test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-3"
    title: "server: seq framing, frame log, resume replay, late delivery, handshake harness"
    owner_role: "subagent"
    packages: ["@facet/server"]
    objective: "Delivery core: per-visitor lane, id era:seq framing + ring log, synchronous Last-Event-ID resume, out-of-lane watermarked full rehydrate with explicit reset, interim-note + late-window /agent/control delivery; pin the remote-agent handshake at the HTTP level."
    files:
      - path: "packages/server/src/server.ts"
        change_type: "update"
        purpose: "sse(res, data, id?); frame-log map (era/nextSeq/ring <= FRAME_LOG_LIMIT=200; LRU <= MAX_FRAME_SESSIONS=1000); synchronous deliver() replacing pushToBrowser (server.ts:260-266; logs even with zero connections); per-visitor lane (createSerialQueue) wrapping /event handle (server.ts:364-373 incl. error-say catch) and late apply; fallback rehydrate OUTSIDE the lane with watermark capture + synchronous finalization (continuity check first — entry/era unchanged AND ring retains (N0, nextSeq), else res.end(); then unstamped reset -> snapshot/says stamped era:N0 -> ring replay seq > N0 -> join; RESIDUAL comment server.ts:311-322 rewritten — window closed, stamping starts at the snapshot; get-or-create logFor mints eras); resume branch on valid last-event-id header (join + synchronous ring replay; all invalid shapes -> fallback; never 4xx/5xx); Pending gains visitor+event (server.ts:79-82); timeout -> non-terminal interim say (A-3) + park in lateWindow (FIFO <= LATE_WINDOW_LIMIT=100); dropAgent parks too; /agent/control late branch -> lane(runtime.applyMessages -> deliver) (server.ts:416-439); FacetServerOptions.agentStaleMs? (default 30000; reaper interval min(10000, agentStaleMs), server.ts:185,447-455)"
      - path: "packages/server/src/server.test.ts"
        change_type: "update"
        purpose: "readFrames grows id: parsing; late delivery (short agentTimeoutMs, fake agent stream, delayed control POST -> interim say then real frames + store updated) [DC-001]; in-time exactly-once (frame count, no interim say) [DC-002]; resume replay under a concurrent delayed-store event -> exactly the gap, in seq order, no dups [DC-003]; malformed/ancient/wrong-era/future token matrix -> full rehydrate, never 4xx/5xx [DC-004]; late result with stale op + good op -> good op lands, stream lives [DC-008]; handshake: 403 bad token on /agent/stream + /agent/control, 409 second agent, heartbeat keeps slot (short agentStaleMs), reaped slot accepts a new dial [DC-009]; stamping rule: reset frame carries NO id: and ids start at the snapshot (assert raw frame text); mid-rehydrate store failure (FailOnceGetStore) -> stream ends AND the reconnect performs a FULL rehydrate, never a false resume; rehydrate window loss-free (DelayedGetStore + concurrent /event -> the event's frame replayed before live flow); dropAgent parks pending in the late window (kill agent stream mid-turn, reconnect agent, control POST -> result lands); lateWindow FIFO eviction -> oldest entry's control POST answers 202 no-op; token-less /stream opened during a mid-flight slow turn (long-delay agent) receives reset+snapshot promptly, well before the turn completes — pins rehydrate-outside-the-lane; existing rehydrate tests updated for the leading reset frame"
    depends_on: ["WU-2"]
    parallel_group: "par-2"
    red_check:
      command: 'pnpm exec vitest run packages/server/src/server.test.ts -t "applies a late /agent/control result after the per-event timeout"'
      target: "packages/server/src/server.test.ts"
      justification: ""
    quick_checks:
      - 'pnpm exec vitest run packages/server/src/server.test.ts -t "applies a late /agent/control result after the per-event timeout"'
      - "pnpm exec vitest run packages/server/src/server.test.ts"
      - "pnpm typecheck"
    no_regression_checks:
      - "pnpm test"
    test_plan:
      - type: "integration"
        target: "packages/server/src/server.test.ts"
        covers_dc: ["DC-001", "DC-002", "DC-003", "DC-004", "DC-008", "DC-009"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "deliver() contains no await; seq assigned only inside a lane task or deliver itself; ServerMessage + STAGE_SPEC untouched; agent-channel frames carry no id:"
      - "/stream has no new 4xx/5xx path; createFacetServer NOT restructured beyond these changes (H-28 stays deferred)"
      - "No regression: pnpm test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-4"
    title: "client: POST abort timeout + server-driven reset"
    owner_role: "subagent"
    packages: ["@facet/client"]
    objective: "Bound the ordered send chain with a 10s abort and stop synthesizing reset on reopen — the server now sends {kind:'reset'} exactly when a full replay follows (a resume replay must NOT clear chat)."
    files:
      - path: "packages/client/src/sse-transport.ts"
        change_type: "update"
        purpose: "POST_TIMEOUT_MS = 10000 const (A-2); chain fetch (sse-transport.ts:38-51) gains signal: AbortSignal.timeout(POST_TIMEOUT_MS) — abort lands in the existing .catch (log + chain continues, no retry); delete the onopen reset synthesis (sse-transport.ts:58-70; server owns the reset decision); ready/queue-flush unchanged"
      - path: "packages/client/src/sse-transport.test.ts"
        change_type: "update"
        purpose: "black-holed POST: stub AbortSignal.timeout (vi.spyOn -> controllable controller) + never-resolving signal-honoring fetch -> abort -> chain sends the NEXT queued event [DC-007]; fetch called with a signal; reopen no longer synthesizes reset (campaign-1 reset test updated to the new contract); a server-sent reset frame passes through onmessage untouched"
    depends_on: ["WU-3"]
    parallel_group: "par-3"
    red_check:
      command: 'pnpm exec vitest run packages/client/src/sse-transport.test.ts -t "aborts a black-holed POST and sends the next queued event"'
      target: "packages/client/src/sse-transport.test.ts"
      justification: ""
    quick_checks:
      - 'pnpm exec vitest run packages/client/src/sse-transport.test.ts -t "aborts a black-holed POST and sends the next queued event"'
      - "pnpm exec vitest run packages/client/src/sse-transport.test.ts"
      - "pnpm typecheck"
    no_regression_checks:
      - "pnpm test"
    test_plan:
      - type: "unit"
        target: "packages/client/src/sse-transport.test.ts"
        covers_dc: ["DC-007"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Ordering unchanged (existing ordered-sends test green); abort logs and does NOT retry (at-most-once kept); LocalTransport untouched"
      - "No regression: pnpm test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-5"
    title: "bridge: spawn concurrency cap (maxConcurrent + FACET_MAX_CONCURRENT)"
    owner_role: "subagent"
    packages: ["@facet/bridge"]
    objective: "Cap concurrent spawn-mode brain CLIs at a global FIFO limit (default 4) while keeping every single visitor's events strictly ordered, with validated env config."
    files:
      - path: "packages/bridge/src/bridge.ts"
        change_type: "update"
        purpose: "BridgeOptions.maxConcurrent?; DEFAULT_MAX_CONCURRENT = 4 const beside MAX_SESSION_IDS (bridge.ts:15; kept out of defaults.ts for the 5-file cap — consolidation is a follow-up nit); createSpawnAgent: agent = serialize(visitorId, () => limit(() => runOne(...))) with limit = createSemaphore(options.maxConcurrent ?? DEFAULT_MAX_CONCURRENT) — semaphore INSIDE the per-visitor serialization (bridge.ts:273-275); crashed/timed-out brain frees its slot via existing finish()/close handlers (bridge.ts:218-223,234,245-255)"
      - path: "packages/bridge/src/env.ts"
        change_type: "update"
        purpose: "parseMaxConcurrent(value): undefined passthrough; integer >= 1; else throw naming FACET_MAX_CONCURRENT and the offending value (mirror parseBridgePort env.ts:37-46)"
      - path: "packages/bridge/src/cli.ts"
        change_type: "update"
        purpose: "parse FACET_MAX_CONCURRENT in the existing try/catch -> clear error + process.exit(1) (cli.ts:27-33 pattern); pass maxConcurrent via conditional spread; docblock gains the FACET_MAX_CONCURRENT line (default 4; spawn mode)"
      - path: "packages/bridge/src/env.test.ts"
        change_type: "update"
        purpose: "parseMaxConcurrent matrix ('4', '1', undefined, '0', 'abc', '-2', '1.5' -> value / passthrough / throw) [DC-006]"
      - path: "packages/bridge/src/bridge.spawn.test.ts"
        change_type: "add"
        purpose: "spawn harness with a stub brain command (process.execPath one-liner recording start/stop to a temp dir, brief sleep): cap=2 + 5 visitors -> max overlap <= 2, all 5 complete, FIFO start order [DC-005]; same-visitor pair never reorders under the cap; a non-zero-exit brain frees its slot"
    depends_on: ["WU-1"]
    parallel_group: "par-2"
    red_check:
      command: 'pnpm exec vitest run packages/bridge/src/bridge.spawn.test.ts -t "never runs more than maxConcurrent brains at once"'
      target: "packages/bridge/src/bridge.spawn.test.ts"
      justification: ""
    quick_checks:
      - 'pnpm exec vitest run packages/bridge/src/bridge.spawn.test.ts -t "never runs more than maxConcurrent brains at once"'
      - "pnpm exec vitest run packages/bridge/src/bridge.spawn.test.ts packages/bridge/src/env.test.ts"
      - "pnpm typecheck"
    no_regression_checks:
      - "pnpm test"
    test_plan:
      - type: "integration"
        target: "packages/bridge/src/bridge.spawn.test.ts"
        covers_dc: ["DC-005"]
        action: "new"
      - type: "unit"
        target: "packages/bridge/src/env.test.ts"
        covers_dc: ["DC-006"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Cap applies across visitors only (per-visitor serialization preserved — pinned by the same-visitor test); persistent mode untouched"
      - "No regression: pnpm test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

execution_order:
  - group: "par-1"
    parallel: ["WU-1", "WU-2"] # disjoint files; both purely additive — repo green after each
  - group: "par-2"
    parallel: ["WU-3", "WU-5"] # WU-3 after WU-2 (consumes applyMessages); WU-5 after WU-1 (consumes createSemaphore); disjoint files (server vs bridge)
  - group: "par-3"
    parallel: ["WU-4"] # after WU-3: server must send the explicit reset before the client stops synthesizing it (transient double reset is idempotent; suites green throughout)
