# Execution Manifest: Overlay (modal / drawer) — the flow-only exception
#
# Keep synchronized with specs/dev-specs/overlay.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "overlay"
spec_path: "specs/dev-specs/overlay.md"
context_evidence_path: "specs/context/overlay.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; playground buildable. No live server needed for the WU vitest tiers; the live-journey real-browser tier needs a real-LLM quickstart URL + provider key at the /live-test gate (MANDATORY for this feature)."
    owner: "main-agent"
    verification: "pnpm --filter @facet/playground build"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "core types + overlay validation (foundation)"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Add the closed-extensible OVERLAY_KINDS/OverlayKind + overlay? on Layered, and a fail-safe sanitizeOverlay in validateBox."
    module_shape:
      decision: "preserve"
      rationale: "overlay is a new slot on the existing module-private Layered concern pack (sibling of backdrop) that BoxNode already composes via extends; validation extends the existing validateBox whitelist. No new module/public boundary; OVERLAY_KINDS/OverlayKind export follows the FIELD_INPUTS/MARK_KINDS precedent in the same file (nodes.ts barrel). Tests stay in the existing validate.test.ts."
    files:
      - path: "packages/core/core/src/nodes.ts"
        change_type: "update"
        purpose: "Add OVERLAY_KINDS const tuple + OverlayKind type; add overlay?: { readonly kind: OverlayKind } to the Layered interface (250-260)."
      - path: "packages/core/core/src/primitive-node-validation.ts"
        change_type: "update"
        purpose: "Widen validateBox local node literal (331-343) with overlay?; add sanitizeOverlay mirroring the backdrop guard (357-364) — admit only kind ∈ OVERLAY_KINDS, strip extra keys, drop unknown/missing/mistyped with a bounded issue."
      - path: "packages/core/core/src/validate.test.ts"
        change_type: "update"
        purpose: "Overlay keep/drop/strip unit tests mirroring the backdrop pattern (2144-2164)."
    depends_on: []
    parallel_group: "par-foundation"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/validate.test.ts -t 'overlay'"
      target: "packages/core/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/validate.test.ts -t 'overlay'"
      - "pnpm exec vitest run packages/core/core/src/validate.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/validate.test.ts"
        covers_dc: ["DC-003", "DC-004"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "overlay:{kind:modal|drawer} kept; {kind:lightbox}/{}/'modal'/42 dropped; {kind:modal,z:999,top:10} → only kind survives"
      - "OVERLAY_KINDS/OverlayKind exported via nodes.js barrel; validateBox derives its check from OVERLAY_KINDS"
      - "No regression: packages/core/core/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "STAGE_SPEC teaches overlay"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Teach the LLM-facing STAGE_SPEC the overlay box capability as closed names only (kind set, renderer-owned placement, toggle-to-open/close, no coords)."
    module_shape:
      decision: "preserve"
      rationale: "Prose + assertion edit to the single STAGE_SPEC source and its test; no code structure change. Files are disjoint from WU-1 (spec.ts/spec.test.ts vs nodes.ts/primitive-node-validation.ts/validate.test.ts) so it parallelizes."
    files:
      - path: "packages/core/core/src/spec.ts"
        change_type: "update"
        purpose: "Box line (13) + BoxStyle note (51 area): add overlay?:{kind:(modal|drawer)} and a sentence on renderer-owned placement + toggle-to-open/close + no coordinates, mirroring the backdrop sentence."
      - path: "packages/core/core/src/spec.test.ts"
        change_type: "update"
        purpose: "DC-007 assertions (contains overlay, kind set, toggle/open-close, names-only) near 201-220."
    depends_on: []
    parallel_group: "par-foundation"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/spec.test.ts -t 'overlay'"
      target: "packages/core/core/src/spec.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/spec.test.ts -t 'overlay'"
      - "pnpm exec vitest run packages/core/core/src/spec.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/spec.test.ts"
        covers_dc: ["DC-007"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "STAGE_SPEC teaches overlay (kind set + renderer-owned placement + toggle open/close + no coords), names only — no raw CSS/pixels/z"
      - "No regression: packages/core/core/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-3"
    title: "renderer positive-z placement presets + scrim"
    owner_role: "subagent"
    packages: ["@facet/react"]
    objective: "Add framework-owned POSITIVE-z overlay band constants + modalFrameStyle (fixed center), drawerFrameStyle (fixed logical end-edge), overlayScrimStyle (fixed inset-0 tint), selected purely by kind."
    module_shape:
      decision: "preserve"
      rationale: "Pure style-helper additions alongside the existing backdrop/scrim/sticky helpers in layout-contract.ts (the module that already owns overlay-discipline constants). A new co-located layout-contract.test.ts holds the unit assertions (no test file exists yet). Files disjoint from WU-1/WU-2 → parallel."
    files:
      - path: "packages/core/react/src/layout-contract.ts"
        change_type: "update"
        purpose: "Add OVERLAY_SCRIM_Z/OVERLAY_FRAME_Z (positive) + modalFrameStyle/drawerFrameStyle/overlayScrimStyle alongside the backdrop helpers (17-80); extend the SSR-can't-verify note to the positive band."
      - path: "packages/core/react/src/layout-contract.test.ts"
        change_type: "add"
        purpose: "Assert presets return position:fixed, positive z, modal centered / drawer end-edge, and no author-controlled top/inset/z beyond the framework constants (DC-002/DC-004 style-level)."
    depends_on: []
    parallel_group: "par-foundation"
    red_check:
      command: "pnpm exec vitest run packages/core/react/src/layout-contract.test.ts"
      target: "packages/core/react/src/layout-contract.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/react/src/layout-contract.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/react/src"
    test_plan:
      - type: "unit"
        target: "packages/core/react/src/layout-contract.test.ts"
        covers_dc: ["DC-002", "DC-004"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Presets are framework-fixed (no argument carries author z/inset/position); modal = center, drawer = logical end-edge; band z is positive and shared"
      - "No regression: packages/core/react/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-4"
    title: "renderer overlay branch + close wiring (Esc/scrim/focus/scroll-lock)"
    owner_role: "subagent"
    packages: ["@facet/react"]
    objective: "Float a rendered box carrying a valid overlay via a client OverlayFrame (kind preset + scrim + focus-trap + Esc + scrim-click + ref-counted body scroll-lock); route every renderer-owned close through the existing toggle writer as an idempotent HIDE keeping view.toggled coherent."
    module_shape:
      decision: "sibling-helper"
      rationale: "OverlayFrame needs client effects (focus move, Esc listener, body scroll-lock) that the pure SSR-capable renderNode cannot host, so it is a new co-located client component file (overlay-frame.tsx). renderer-render.tsx wraps the BoxElement in it and threads a private overlayClose callback via RenderArgs exactly like sortControl.onSort — internal, no public-surface change. closeOverlay lives in StageRenderer with the other view-state writers. Tests in a new renderer-overlay.test.tsx."
    files:
      - path: "packages/core/react/src/overlay-frame.tsx"
        change_type: "add"
        purpose: "Client component: on mount move focus in + ref-counted body scroll-lock; Esc keydown and scrim-click call close(); on unmount restore focus + release lock. Renders the scrim (overlayScrimStyle) + the kind-preset frame around children."
      - path: "packages/core/react/src/renderer-render.tsx"
        change_type: "update"
        purpose: "Box case: read overlay via the same cast style as backdrop (388); when a valid overlay is present wrap the returned BoxElement in <OverlayFrame kind close={() => overlayClose(id)}>; add overlayClose to RenderArgs (69 area) and thread it through the recursion like sortControl."
      - path: "packages/core/react/src/StageRenderer.tsx"
        change_type: "update"
        purpose: "Add closeOverlay(boxId): deterministic set-to-hidden via setVisibilityOverrides — next.set(boxId, false), where the override Map stores EFFECTIVE VISIBILITY (true=shown/false=hidden per renderer-render.tsx:293 + view-snapshot.ts toggled loop), so false=hidden is idempotent (RISK-INV-4) + recordLocalTap({kind:tap, target:boxId, effect:{toggle:boxId}}) (RISK-INV-3); pass as overlayClose into renderNode (282-334). No new public prop."
      - path: "packages/core/react/src/renderer-overlay.test.tsx"
        change_type: "add"
        purpose: "jsdom/RTL: modal scrim+centered frame; drawer end-edge; Esc/scrim/close-button each hide the box and fire onRecord with effect.toggle === boxId (same key as trigger), and the post-close view.toggled[boxId] === 'hidden' (DC-005, pins false=hidden override polarity, RISK-INV-4); two overlays in DOM/tree order; malformed overlay → inline box, no scrim, no throw."
    depends_on: ["WU-1", "WU-3"]
    parallel_group: "serial-b"
    red_check:
      command: "pnpm exec vitest run packages/core/react/src/renderer-overlay.test.tsx -t 'overlay'"
      target: "packages/core/react/src/renderer-overlay.test.tsx"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/react/src/renderer-overlay.test.tsx -t 'overlay'"
      - "pnpm exec vitest run packages/core/react/src/renderer-overlay.test.tsx"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/react/src"
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "integration"
        target: "packages/core/react/src/renderer-overlay.test.tsx"
        covers_dc: ["DC-001", "DC-002", "DC-003", "DC-004", "DC-005", "DC-006"]
        action: "new"
      - type: "e2e"
        # DC-002 (drawer end-edge placement) is a paint/layout fact jsdom cannot
        # truly render, so it is verified in the real browser too (P3-1 fix).
        target: "live-journey real-browser tier (owner-run at /live-test)"
        covers_dc: ["DC-001", "DC-002", "DC-006"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Valid overlay floats (modal center / drawer end-edge) over a scrim; malformed → inline box, no throw"
      - "Esc/scrim/close-button all hide via the SAME view.toggled entry as the trigger; renderer-owned close is idempotent (no reopen)"
      - "EXPLICIT rapid/double-close test (RISK-INV-4): firing Esc/scrim twice leaves the overlay HIDDEN (no reopen) and writes visibility deterministically to false, not a blind toggle re-flip"
      - "NO new StageRenderer public prop; onAction never fires for a close"
      - "No regression: packages/core/react/src, packages/core/core/src"
      - "Live-journey real-browser tier flagged MANDATORY at the gate (stacking/focus not SSR-verifiable)"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"
