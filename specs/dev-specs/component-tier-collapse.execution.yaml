# Execution Manifest: PR-6 — Component Tier Collapse

feature_slug: "component-tier-collapse"
spec_path: "specs/dev-specs/component-tier-collapse.md"
context_evidence_path: "specs/context/component-tier-collapse.md"
intake_path: "specs/feature-intake/component-tier-collapse.md"

shared_preflight:
  - concern: "isolated-worktree"
    requirement: "Run /worktree-prep from synchronized origin/main on codex/component-tier-collapse; preserve unrelated PR-5a specs; never implement on main."
    owner: "main-agent"
    verification: "record path, branch, base commit, and status"
  - concern: "baseline-green"
    requirement: "pnpm install is healthy and pnpm typecheck && pnpm test && pnpm lint pass before WU-01"
    owner: "main-agent"
    verification: "record commands and outputs"
  - concern: "scoped-tdd"
    requirement: "Each WU edits its owned test first, records exact RED, edits only owned files, reruns GREEN, then scoped no-regression Vitest; no per-WU full typecheck."
    owner: "main-agent"
    verification: "audit handoffs and file-scoped commits"

review_fix_policy:
  batching_rule: "Batch findings by owning WU, rerun scoped checks, then main agent reruns verify/review; full feature gate remains final."
  subagent_scope: "Owned WU files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

common_handoff_format: &handoff
  - "changed_files"
  - "executed_commands"
  - "red_check_output_before"
  - "red_check_output_after"
  - "green_diff_summary"
  - "refactor_decision"
  - "pass_fail"
  - "first_error_line"
  - "assumptions"
  - "next_action"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep before implementation"
    - "execute WU-01 through WU-18 with scoped RED→GREEN Vitest evidence"
    - "/update-tests with the explicit test-only cleanup ledger; production edits forbidden"
    - "combined pnpm typecheck once after deleted-import test migrations"
    - "/verify including pnpm package:smoke and quickstart/playground builds"
    - "/code-review on direct worktree; P0-P2 = 0"
    - "/live-test Tier 1a, Tier 1b twice, Tier 1c, Tier 1d, required OpenAI Tier 2; Anthropic owner-skipped"
    - "/update-docs including scanner/test, docs, READMEs, current changesets, and PR-6 changeset"
    - "rerun scanner/test and mechanically affected docs/package checks"
    - "stop and request owner approval; no commit/push/PR/merge without it"

final_update_tests_ledger:
  production_edits_allowed: false
  expected_test_only_cleanup:
    - "inspect/update packages/core/core/src/index.test.ts"
    - "inspect/update packages/core/core/src/richtext-validation.test.ts"
    - "inspect/update packages/core/core/src/tree.test.ts"
    - "inspect/update packages/core/core/src/tree-data.test.ts"
    - "inspect/update packages/core/react/src/StageRenderer.data.test.tsx"
    - "inspect/update packages/agent-stack/agent-tools/src/buffer.test.ts"
    - "inspect/update packages/agent-stack/agent-tools/src/observation.test.ts"
    - "inspect/update packages/agent-stack/reference-agent/src/agent.test.ts"
    - "inspect/update packages/agent-stack/quickstart/src/quickstart.e2e.test.ts"
    - "inspect/update packages/extensions/store-postgres/src/postgres-assets.test.ts"
    - "inspect/update apps/playground/src/App.test.ts"
    - "inspect/update apps/playground/src/generator.test.ts"

final_gate_test_plan:
  - type: "e2e"
    target: "recorded feature hard-gate evidence"
    covers_dc: ["DC-016"]
    action: "new"
    owner: "main-agent"
    verification: "All 18 RED→GREEN handoffs, update-tests, combined typecheck, verify, code-review P0-P2=0, live-test including required OpenAI Tier 2, update-docs, and post-doc scanner rerun are recorded."

final_docs_ledger:
  update:
    - "scripts/check-composition-hard-cut.mjs"
    - "scripts/check-composition-hard-cut.test.mjs"
    - "AGENTS.md"
    - "README.md"
    - "docs/ARCHITECTURE.md"
    - "docs/REVIEW-RULES.md"
    - "docs/PACKAGE-BOUNDARIES.md"
    - "docs/comparisons/a2ui.md"
    - "affected package READMEs: core/react/assets/runtime/agent-tools/reference-agent/quickstart/store-postgres/cli"
    - "current component-tier changesets"
  add:
    - ".changeset/component-tier-collapse.md: core/assets/react/agent-tools minor; reference-agent/quickstart patch"
  classify:
    - "historical specs/** excluded"
    - "generic React/external component prose allowed"
    - "docs/AGENT-TOOL-RESULT-CONTRACT.md may remain with evidence"

