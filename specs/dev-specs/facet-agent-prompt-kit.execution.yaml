# Execution Manifest: Facet Agent Prompt Kit
#
# Keep synchronized with specs/dev-specs/facet-agent-prompt-kit.md
# (WU ids, files, deps, checks). Final gate source of truth: AGENTS.md +
# docs/REVIEW-RULES.md.

feature_slug: "facet-agent-prompt-kit"
spec_path: "specs/dev-specs/facet-agent-prompt-kit.md"
context_evidence_path: "specs/context/facet-agent-prompt-kit.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "worktree-isolation"
    requirement: "/worktree-prep creates an isolated worktree before implementation"
    owner: "main-agent"
    verification: "run /worktree-prep after spec approval"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "Agent-tools Prompt Kit"
    owner_role: "subagent"
    packages: ["@facet/agent-tools"]
    objective: "Add the provider-neutral prompt-kit module, root exports, and tests."
    files:
      - path: "packages/agent-stack/agent-tools/src/prompt-kit.ts"
        change_type: "add"
        purpose: "Reusable prompt sections, asset formatters, and buildFacetAgentSystemPrompt."
      - path: "packages/agent-stack/agent-tools/src/prompt-kit.test.ts"
        change_type: "add"
        purpose: "Content, asset/privacy, and outcome guidance tests."
      - path: "packages/agent-stack/agent-tools/src/index.ts"
        change_type: "update"
        purpose: "Root-export prompt-kit runtime and type surface."
      - path: "packages/agent-stack/agent-tools/src/index.test.ts"
        change_type: "update"
        purpose: "Barrel export coverage for prompt-kit names."
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "pnpm exec vitest run packages/agent-stack/agent-tools/src/prompt-kit.test.ts packages/agent-stack/agent-tools/src/index.test.ts"
      target: "packages/agent-stack/agent-tools/src/prompt-kit.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/agent-stack/agent-tools/src/prompt-kit.test.ts packages/agent-stack/agent-tools/src/index.test.ts"
      - "pnpm --filter @facet/agent-tools typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/agent-stack/agent-tools/src/*.test.ts"
      - "pnpm --filter @facet/agent-tools build"
    test_plan:
      - type: "unit"
        target: "packages/agent-stack/agent-tools/src/prompt-kit.test.ts"
        covers_dc: ["DC-001", "DC-003", "DC-004", "DC-005"]
        action: "new"
      - type: "unit"
        target: "packages/agent-stack/agent-tools/src/index.test.ts"
        covers_dc: ["DC-001"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported."
      - "Root exports include buildFacetAgentSystemPrompt, FacetAgentSystemPromptOptions, FacetPromptAssets, and the named prompt section constants listed in Public API Impact."
      - "Builder includes STAGE_SPEC by import, not copied vocabulary text."
      - "Empty assets omit THEMES/STAMPS; populated assets serialize names/descriptions/slot names only."
      - "Prompt contains compact UX, edit-before-append, tool playbook, and structured tool-result recovery guidance."
      - "No regression: agent-tools scoped tests and build pass."
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Reference-agent Compatibility Wrapper"
    owner_role: "subagent"
    packages: ["@facet/reference-agent"]
    objective: "Refactor buildSystem to delegate to @facet/agent-tools while preserving reference-agent exports and tests."
    files:
      - path: "packages/agent-stack/reference-agent/src/prompt/system.ts"
        change_type: "update"
        purpose: "Replace local generic prompt section assembly with the agent-tools helper; keep DEFAULT_GUIDE, TOOLS, PromptAssets, and compatibility re-exports."
      - path: "packages/agent-stack/reference-agent/src/prompt.test.ts"
        change_type: "update"
        purpose: "Assert composed prompt contains reusable kit guidance, section compatibility, asset/privacy boundaries, and TOOLS identity."
      - path: "packages/agent-stack/reference-agent/src/index.test.ts"
        change_type: "update"
        purpose: "Keep/extend root export type coverage if PromptAssets becomes an alias."
    depends_on: ["WU-1"]
    parallel_group: "serial-b"
    red_check:
      command: "pnpm exec vitest run packages/agent-stack/reference-agent/src/prompt.test.ts packages/agent-stack/reference-agent/src/index.test.ts"
      target: "packages/agent-stack/reference-agent/src/prompt.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/agent-stack/reference-agent/src/prompt.test.ts packages/agent-stack/reference-agent/src/index.test.ts"
      - "pnpm --filter @facet/reference-agent typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/agent-stack/reference-agent/src/*.test.ts packages/agent-stack/reference-agent/src/harness/*.test.ts"
      - "pnpm exec vitest run packages/agent-stack/quickstart/src/prompt.test.ts packages/agent-stack/quickstart/src/quickstart.e2e.test.ts"
      - "pnpm exec vitest run packages/core/core/src/validate.test.ts packages/core/runtime/src/runtime.test.ts"
      - "pnpm --filter @facet/reference-agent build"
    test_plan:
      - type: "unit"
        target: "packages/agent-stack/reference-agent/src/prompt.test.ts"
        covers_dc: ["DC-002", "DC-003", "DC-004", "DC-005"]
        action: "update"
      - type: "unit"
        target: "packages/agent-stack/reference-agent/src/index.test.ts"
        covers_dc: ["DC-002"]
        action: "update"
      - type: "integration"
        target: "packages/agent-stack/quickstart/src/quickstart.e2e.test.ts"
        covers_dc: ["DC-002"]
        action: "existing"
      - type: "unit"
        target: "packages/agent-stack/reference-agent/src/harness/loop.test.ts"
        covers_dc: ["DC-007"]
        action: "existing"
      - type: "unit"
        target: "packages/core/core/src/validate.test.ts"
        covers_dc: ["DC-007"]
        action: "existing"
      - type: "integration"
        target: "packages/core/runtime/src/runtime.test.ts"
        covers_dc: ["DC-007"]
        action: "existing"
    done_conditions:
      - "RED->GREEN evidence reported."
      - "buildSystem(guide, assets?) signature and root exports remain compatible."
      - "TOOLS remains the exact FACET_STAGE_TOOL_SPECS object."
      - "DEFAULT_GUIDE, event/history message assembly, stage summaries, provider adapters, and harness context remain in reference-agent."
      - "Existing core validation, harness failure, and runtime ordering boundary tests pass."
      - "No regression: reference-agent scoped tests and build pass."
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-3"
    title: "Docs And Release Notes"
    owner_role: "main-agent"
    packages: ["@facet/agent-tools", "@facet/reference-agent"]
    objective: "Document the prompt-kit boundary and add release notes."
    files:
      - path: "packages/agent-stack/agent-tools/README.md"
        change_type: "update"
        purpose: "Describe prompt kit as reusable LLM authoring guidance plus stage tools."
      - path: "packages/agent-stack/reference-agent/README.md"
        change_type: "update"
        purpose: "Explain it consumes the prompt kit but remains a runnable reference brain."
      - path: "docs/PACKAGE-BOUNDARIES.md"
        change_type: "update"
        purpose: "Note prompt kit in Agent Authoring and keep reference-agent policy boundary clear."
      - path: "docs/ARCHITECTURE.md"
        change_type: "update"
        purpose: "Mention shared prompt kit under agent authoring surfaces."
      - path: ".changeset/facet-agent-prompt-kit.md"
        change_type: "add"
        purpose: "Patch changes for @facet/agent-tools and @facet/reference-agent."
    depends_on: ["WU-1", "WU-2"]
    parallel_group: "serial-c"
    red_check:
      command: "N/A"
      target: "/update-docs gate"
      justification: "docs and changeset only; no production behavior file in this WU."
    quick_checks:
      - "pnpm format:check"
    no_regression_checks:
      - "pnpm typecheck"
    test_plan:
      - type: "integration"
        target: "/update-docs gate"
        covers_dc: ["DC-006"]
        action: "update"
    done_conditions:
      - "N/A RED acknowledged with docs-only justification."
      - "Docs say @facet/agent-tools provides reusable prompt/tool mechanism, not provider adapters or a customer brain."
      - "Docs say @facet/reference-agent remains the runnable reference brain."
      - "Changeset names both changed packages."
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"
