# Execution Manifest: Rich Text Brick (richtext)
#
# Keep synchronized with specs/dev-specs/richtext.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "richtext"
spec_path: "specs/dev-specs/richtext.md"
context_evidence_path: "specs/context/richtext.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; all packages build"
    owner: "main-agent"
    verification: "pnpm build"
  - concern: "cross-package-compile-window"
    requirement: "WU-1 widens the FacetNode union, making the mapped EXECUTOR_REGISTRY require a richtext key; full-repo pnpm typecheck is green only after WU-5. Sequence per execution order."
    owner: "main-agent"
    verification: "pnpm --filter @facet/agent-tools typecheck after WU-5"
  - concern: "intra-package-vocab-sync-window"
    requirement: "WU-1 widens the closed brick-set PRIMITIVE_BRICK_TYPES, which several sibling-owned hand-maintained vocab mirrors assert in lockstep: STAGE_SPEC/spec.test.ts + component-validation.test.ts (core, WU-1b), catalog.test.ts (core, WU-2), react brick-render-registry.test.ts (WU-4), agent-tools specs.test.ts (WU-5b), assets catalog.test.ts (WU-2b). A sibling's lockstep test is RED between WU-1 and the WU that repairs it, so each WU's no_regression command is scoped to EXCLUDE the sibling-owned vocab-sync suites it does not itself repair (exclusions listed per WU). Each WU keeps every other test in its package green; the FULL un-excluded per-package suites are enforced at the final /verify gate after all WUs land."
    owner: "main-agent"
    verification: "pnpm test (full suites) at /verify after all WUs"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "core — richtext node model, validation, safe-href, registry"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Add the richtext node types, validateRichText sanitizer, the stricter isSafeHref gate + barrel re-export, and the exhaustive BRICK_REGISTRY entry."
    module_shape:
      decision: "preserve"
      rationale: "Types live in nodes.ts and validation in primitive-node-validation.ts beside the other primitives (text/box/media/field); the registry entry and barrel re-export sit in their existing owning files. No new module — richtext mirrors the established primitive layout. Public surface (RichTextNode/Mark/BLOCK_TYPES) flows through the existing nodes.js wildcard barrel; isSafeHref through the explicit validate.ts named re-export block (matching isSafeMediaSrc)."
    files:
      - path: "packages/core/core/src/nodes.ts"
        change_type: "update"
        purpose: "Add RichTextNode, Mark, Run, RichTextBlock, BLOCK_TYPES, MARK_KINDS, LinkTarget; add richtext to PRIMITIVE_BRICK_TYPES and PrimitiveBrickNode."
      - path: "packages/core/core/src/primitive-node-validation.ts"
        change_type: "update"
        purpose: "Add isSafeHref (stricter than isSafeMediaSrc), validateRichText (clamp level/depth, cap arrays + text, drop unknown marks, degrade unknown blocks, route link target via normalizeFacetAction / isSafeHref), caps constants."
      - path: "packages/core/core/src/validate.ts"
        change_type: "update"
        purpose: "Add isSafeHref to the explicit named re-export block (RISK-PKG-1)."
      - path: "packages/core/core/src/brick-registry.ts"
        change_type: "update"
        purpose: "Add the richtext BrickEntry (no resolve/resolveFromContent) (RISK-API-1)."
      - path: "packages/core/core/src/richtext-validation.test.ts"
        change_type: "add"
        purpose: "Validation + safe-href + fail-safe + closed-set + clamp tests."
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/richtext-validation.test.ts"
      target: "packages/core/core/src/richtext-validation.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/richtext-validation.test.ts"
      - "pnpm --filter @facet/core typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src --exclude '**/spec.test.ts' --exclude '**/component-validation.test.ts' --exclude '**/catalog.test.ts'"
    no_regression_note: "The three closed-vocab lockstep suites are intentionally RED between WU-1 and their owning sync WUs (spec.test.ts + component-validation.test.ts -> WU-1b; catalog.test.ts -> WU-2). brick-registry.test.ts stays green because WU-1 adds BRICK_REGISTRY.richtext. Full core suite runs at /verify."
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/richtext-validation.test.ts"
        covers_dc: ["DC-002", "DC-003", "DC-004", "DC-005", "DC-006", "DC-007"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "isSafeHref rejects data:/javascript:/data:image/svg+xml and every non-allowlisted scheme; accepts http(s)/// /local; exported via the barrel"
      - "validateRichText clamps level(1-3)/depth(0-5), caps blocks/runs/marks/text, drops unknown mark kinds, degrades unknown block types to paragraph, skips text-less runs, routes internal link via normalizeFacetAction, never throws"
      - "BRICK_REGISTRY.richtext present (no resolve); @facet/core typechecks"
      - "No regression (scoped): pnpm exec vitest run packages/core/core/src --exclude '**/spec.test.ts' --exclude '**/component-validation.test.ts' --exclude '**/catalog.test.ts' (vocab-sync suites owned by WU-1b/WU-2; full suite at /verify)"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

