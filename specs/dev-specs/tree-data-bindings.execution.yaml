# Execution Manifest: Tree Data Section + Bindings
#
# Keep synchronized with specs/dev-specs/tree-data-bindings.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "tree-data-bindings"
spec_path: "specs/dev-specs/tree-data-bindings.md"
context_evidence_path: "specs/context/tree-data-bindings.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; playground buildable; monorepo typechecks at baseline"
    owner: "main-agent"
    verification: "pnpm install && pnpm typecheck"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "Core data model, sanitizer, and shared resolve/precedence helper"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Add the data warehouse types + from/column/row node fields, sanitizeDataWarehouse, and the ONE shared resolveNodeData (precedence + projection) helper — no wiring yet."
    module_shape:
      decision: "sibling-helper"
      rationale: "New pure module data-binding.ts holds the sanitizer + resolve/projection helper so BOTH the content gate (tree.ts) and the renderer (@facet/react) import ONE precedence source (RISK-INV-5). Public via the core barrel; tests co-located as data-binding.test.ts. Types live on component-nodes.ts next to the node interfaces they extend."
    files:
      - path: "packages/core/core/src/component-nodes.ts"
        change_type: "update"
        purpose: "Add Dataset/DataRow/DataCell/DataWarehouse types; from? on Table/Chart/List/KeyValue; from?+column?+row? on MetricFields."
      - path: "packages/core/core/src/data-binding.ts"
        change_type: "add"
        purpose: "DATASET_NAME_RE, caps, sanitizeDataWarehouse (hostile-input, non-recursive, bounded), resolveNodeData (pure precedence + Projection Contract)."
      - path: "packages/core/core/src/index.ts"
        change_type: "update"
        purpose: "Export new types + sanitizeDataWarehouse/resolveNodeData."
      - path: "packages/core/core/src/data-binding.test.ts"
        change_type: "add"
        purpose: "Red_check host for sanitizer + resolver."
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/data-binding.test.ts"
      target: "packages/core/core/src/data-binding.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/data-binding.test.ts"
      - "pnpm --filter @facet/core typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/data-binding.test.ts"
        covers_dc: ["DC-004"]
        action: "new"
      - type: "unit"
        target: "packages/core/core/src/data-binding.test.ts"
        covers_dc: ["DC-005"]
        action: "new"
      - type: "unit"
        target: "packages/core/core/src/data-binding.test.ts"
        covers_dc: ["DC-001"]
        action: "new"
      - type: "unit"
        target: "packages/core/core/src/data-binding.test.ts"
        covers_dc: ["DC-004"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "sanitizeDataWarehouse never throws on hostile input; caps + forbidden keys enforced"
      - "resolveNodeData pure, total, deterministic precedence"
      - "No regression: pnpm exec vitest run packages/core/core/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

