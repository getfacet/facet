# Execution Manifest: Reference Agent Package
#
# Keep synchronized with specs/dev-specs/reference-agent-package.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "reference-agent-package"
spec_path: "specs/dev-specs/reference-agent-package.md"
context_evidence_path: "specs/context/reference-agent-package.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts when practical; if baseline is red, capture first failing line before implementation."
    owner: "main-agent"
    verification: "run pnpm typecheck && pnpm test && pnpm lint, or record baseline failure evidence"
  - concern: "dirty-worktree"
    requirement: "Preserve existing unrelated modified/untracked files; do not alter or revert user work."
    owner: "main-agent"
    verification: "git status --short before implementation"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"

work_units:
  - id: "WU-1"
    title: "Scaffold Reference Provider Package"
    owner_role: "subagent"
    packages: ["@facet/reference-agent"]
    objective: "Create the new package nucleus and move provider adapter behavior with its tests."
    files:
      - path: "packages/reference-agent/package.json"
        change_type: "add"
        purpose: "Publishable package metadata: name @facet/reference-agent, type module, sideEffects false, source main/types/exports to ./src/index.ts, files [dist], publishConfig dist exports matching repo convention, typecheck/build scripts, and runtime deps on @facet/core, @facet/runtime, and @facet/agent only."
      - path: "packages/reference-agent/tsconfig.json"
        change_type: "add"
        purpose: "Strict TS package config extending ../../tsconfig.base.json."
      - path: "packages/reference-agent/src/provider.ts"
        change_type: "add"
        purpose: "Moved provider interfaces/adapters/resolution."
      - path: "packages/reference-agent/src/provider.test.ts"
        change_type: "add"
        purpose: "Moved provider contract tests."
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: 'pnpm exec vitest run packages/reference-agent/src/provider.test.ts -t "provider adapters preserve request contracts"'
      target: "packages/reference-agent/src/provider.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/reference-agent/src/provider.test.ts"
      - "pnpm --filter @facet/reference-agent typecheck"
      - >-
        node -e "const p=require('fs').readFileSync('packages/reference-agent/package.json','utf8'); const j=JSON.parse(p); for (const k of ['@facet/quickstart','@facet/server','@facet/react','@facet/client']) if (j.dependencies?.[k] || j.devDependencies?.[k]) process.exit(1); if (j.name !== '@facet/reference-agent' || j.sideEffects !== false || !j.publishConfig?.exports?.['.']) process.exit(1)"
    no_regression_checks:
      - "pnpm exec vitest run packages/quickstart/src/provider.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/reference-agent/src/provider.test.ts"
        covers_dc: ["DC-001", "DC-003", "DC-007"]
        action: "new"
      - type: "static"
        target: "packages/reference-agent/package.json"
        covers_dc: ["DC-004", "DC-008"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported."
      - "Provider request mapping, auth headers, malformed response, HTTP error, timeout, and env resolution tests pass."
      - "Package metadata has explicit main, types, exports, files, sideEffects, publishConfig, typecheck, and build fields."
      - "Package deps do not include @facet/quickstart, @facet/server, @facet/react, or @facet/client."
    handoff_format: &handoff
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Move Prompt And Stub Surface"
    owner_role: "subagent"
    packages: ["@facet/reference-agent"]
    objective: "Move prompt/tool definitions and deterministic stub into the new package."
    files:
      - path: "packages/reference-agent/src/prompt.ts"
        change_type: "add"
        purpose: "Moved prompt, tool schema, history/event description helpers."
      - path: "packages/reference-agent/src/prompt.test.ts"
        change_type: "add"
        purpose: "Moved prompt/tool tests."
      - path: "packages/reference-agent/src/stub.ts"
        change_type: "add"
        purpose: "Moved deterministic stub agent and fixture tree."
      - path: "packages/reference-agent/src/stub.test.ts"
        change_type: "add"
        purpose: "Focused stub determinism/theme/action tests extracted from existing quickstart agent tests."
    depends_on: ["WU-1"]
    parallel_group: "serial-b"
    red_check:
      command: 'pnpm exec vitest run packages/reference-agent/src/prompt.test.ts packages/reference-agent/src/stub.test.ts -t "reference prompt and stub exports"'
      target: "packages/reference-agent/src/prompt.test.ts, packages/reference-agent/src/stub.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/reference-agent/src/prompt.test.ts packages/reference-agent/src/stub.test.ts"
      - "pnpm --filter @facet/reference-agent typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/quickstart/src/prompt.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/reference-agent/src/prompt.test.ts"
        covers_dc: ["DC-001", "DC-003", "DC-008"]
        action: "new"
      - type: "unit"
        target: "packages/reference-agent/src/stub.test.ts"
        covers_dc: ["DC-001", "DC-003"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported."
      - "Prompt tests assert STAGE_SPEC inclusion, tool schema, theme/stamp value boundaries, and history formatting."
      - "Stub tests assert deterministic visit/message/tap/theme behavior."
    handoff_format: *handoff

  - id: "WU-3"
    title: "Move Streaming Agent And Barrel"
    owner_role: "subagent"
    packages: ["@facet/reference-agent"]
    objective: "Move the streaming tool-loop agent and expose the exact public reference-agent barrel with compatibility and canonical names."
    files:
      - path: "packages/reference-agent/src/agent.ts"
        change_type: "add"
        purpose: "Moved streaming tool-loop implementation."
      - path: "packages/reference-agent/src/agent.test.ts"
        change_type: "add"
        purpose: "Moved/focused tool-loop fail-safe tests."
      - path: "packages/reference-agent/src/index.ts"
        change_type: "add"
        purpose: "Barrel exports matching the Reference-Agent Export Matrix."
      - path: "packages/reference-agent/src/index.test.ts"
        change_type: "add"
        purpose: "Package barrel/import test for every matrix row."
    depends_on: ["WU-1", "WU-2"]
    parallel_group: "serial-c"
    red_check:
      command: 'pnpm exec vitest run packages/reference-agent/src/index.test.ts -t "exports compatibility and canonical aliases"'
      target: "packages/reference-agent/src/index.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/reference-agent/src/agent.test.ts packages/reference-agent/src/index.test.ts"
      - "pnpm --filter @facet/reference-agent typecheck"
      - >-
        sh -c '! rg -n '"'"'from "@facet/quickstart"|from "@facet/server"|from "@facet/react"|from "@facet/client"|node:'"'"' packages/reference-agent/src packages/reference-agent/package.json'
    no_regression_checks:
      - "pnpm exec vitest run packages/quickstart/src/agent.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/reference-agent/src/agent.test.ts"
        covers_dc: ["DC-001", "DC-003", "DC-008"]
        action: "new"
      - type: "unit"
        target: "packages/reference-agent/src/index.test.ts"
        covers_dc: ["DC-001", "DC-006"]
        action: "new"
      - type: "static"
        target: "packages/reference-agent/src packages/reference-agent/package.json"
        covers_dc: ["DC-004", "DC-008"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported."
      - "Agent tests cover invalid tool args, empty/non-renderable/deep/cyclic render_page input, provider failure/no-output fallback, stamp expansion, and streaming batch closure."
      - "index.test.ts imports from ./index.js and verifies every Reference-Agent Export Matrix row."
      - "Barrel exports old Quickstart* names and the exact canonical aliases createReferenceAgent, ReferenceAgentOptions, and ReferenceProvider."
    handoff_format: *handoff

  - id: "WU-4"
    title: "Workspace Package Wiring"
    owner_role: "subagent"
    packages: ["workspace", "@facet/quickstart", "@facet/reference-agent"]
    objective: "Wire workspace resolution and dependency metadata in one WU so lockfile ownership does not conflict with later quickstart code changes."
    files:
      - path: "tsconfig.base.json"
        change_type: "update"
        purpose: "Add @facet/reference-agent workspace path alias."
      - path: "packages/quickstart/package.json"
        change_type: "update"
        purpose: "Add dependency on @facet/reference-agent; keep/remove other deps only with evidence."
      - path: "pnpm-lock.yaml"
        change_type: "update"
        purpose: "Workspace importer update for the new package and quickstart dependency."
    depends_on: ["WU-3"]
    parallel_group: "serial-d"
    red_check:
      command: 'node -e "const q=JSON.parse(require(''fs'').readFileSync(''packages/quickstart/package.json'',''utf8'')); if (q.dependencies?.[''@facet/reference-agent''] !== ''workspace:*'') process.exit(1)"'
      target: "packages/quickstart/package.json"
      justification: ""
    quick_checks:
      - "pnpm install --lockfile-only"
      - "pnpm --filter @facet/reference-agent build"
      - "pnpm --filter @facet/reference-agent typecheck"
      - "pnpm --filter @facet/quickstart typecheck"
    no_regression_checks:
      - "pnpm typecheck"
    test_plan:
      - type: "static"
        target: "tsconfig.base.json packages/quickstart/package.json pnpm-lock.yaml"
        covers_dc: ["DC-002", "DC-004", "DC-008"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported for the quickstart dependency check."
      - "pnpm-lock.yaml is only edited in this WU."
      - "@facet/reference-agent can build as a package and quickstart resolves the workspace dependency."
    handoff_format: *handoff

  - id: "WU-5"
    title: "Wire Quickstart CLI To Reference Agent"
    owner_role: "subagent"
    packages: ["@facet/quickstart", "@facet/reference-agent"]
    objective: "Make quickstart compose the reference-agent package for CLI/provider/stub boot while preserving quickstart server and page-bundle ownership."
    files:
      - path: "packages/quickstart/src/cli.ts"
        change_type: "update"
        purpose: "Import createQuickstartAgent/DEFAULT_GUIDE/resolveProvider/createStubAgent from @facet/reference-agent."
      - path: "packages/quickstart/src/index.ts"
        change_type: "update"
        purpose: "Re-export the full @facet/reference-agent surface, including compatibility names and canonical aliases, plus ./server.js; do not import this barrel from the browser page entry."
      - path: "packages/quickstart/src/cli.test.ts"
        change_type: "update"
        purpose: "Add barrel compatibility/canonical alias test and keep CLI behavior tests."
    depends_on: ["WU-4"]
    parallel_group: "serial-e"
    red_check:
      command: 'pnpm exec vitest run packages/quickstart/src/cli.test.ts -t "quickstart barrel exposes reference-agent aliases"'
      target: "packages/quickstart/src/cli.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/quickstart/src/cli.test.ts"
      - "pnpm --filter @facet/quickstart typecheck"
      - "pnpm --filter @facet/quickstart build"
      - >-
        sh -c '! rg -n '"'"'@facet/reference-agent|OPENAI_API_KEY|ANTHROPIC_API_KEY|https://api\\.openai\\.com|https://api\\.anthropic\\.com'"'"' packages/quickstart/dist/page/app.js'
    no_regression_checks:
      - "pnpm exec vitest run packages/quickstart/src/provider.test.ts packages/quickstart/src/prompt.test.ts packages/quickstart/src/agent.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/quickstart/src/cli.test.ts"
        covers_dc: ["DC-002", "DC-006", "DC-007"]
        action: "update"
      - type: "static"
        target: "packages/quickstart/dist/page/app.js"
        covers_dc: ["DC-004", "DC-008"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported."
      - "runCli behavior and output remain assertion-equivalent."
      - "Quickstart barrel exports startQuickstart plus compatibility and canonical reference-agent symbols."
      - "Browser bundle scan proves no provider package import, provider API URL, or provider key env name leaked into dist/page/app.js."
    handoff_format: *handoff

  - id: "WU-6"
    title: "Convert Quickstart Brain Files To Shims"
    owner_role: "subagent"
    packages: ["@facet/quickstart", "@facet/reference-agent"]
    objective: "Remove duplicate quickstart brain implementation by turning local brain files into compatibility shims."
    files:
      - path: "packages/quickstart/src/agent.ts"
        change_type: "update"
        purpose: "Re-export from @facet/reference-agent."
      - path: "packages/quickstart/src/provider.ts"
        change_type: "update"
        purpose: "Re-export from @facet/reference-agent."
      - path: "packages/quickstart/src/prompt.ts"
        change_type: "update"
        purpose: "Re-export from @facet/reference-agent."
      - path: "packages/quickstart/src/stub.ts"
        change_type: "update"
        purpose: "Re-export from @facet/reference-agent."
      - path: "packages/quickstart/src/quickstart.e2e.test.ts"
        change_type: "update"
        purpose: "Import stub from new package and add identity check for local shims."
    depends_on: ["WU-5"]
    parallel_group: "serial-f"
    red_check:
      command: 'pnpm exec vitest run packages/quickstart/src/quickstart.e2e.test.ts -t "compatibility modules re-export reference-agent implementations"'
      target: "packages/quickstart/src/quickstart.e2e.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/quickstart/src/quickstart.e2e.test.ts"
      - "pnpm exec vitest run packages/quickstart/src/provider.test.ts packages/quickstart/src/prompt.test.ts packages/quickstart/src/agent.test.ts"
    no_regression_checks:
      - "pnpm --filter @facet/quickstart typecheck"
    test_plan:
      - type: "e2e"
        target: "packages/quickstart/src/quickstart.e2e.test.ts"
        covers_dc: ["DC-003", "DC-006", "DC-008"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported."
      - "Local quickstart brain files contain re-exports only; no duplicate tool-loop/provider/prompt/stub implementation remains."
      - "Quickstart E2E still boots the wrapper with the stub agent."
      - "Quickstart rapid double-message ordering E2E remains green."
    handoff_format: *handoff

  - id: "WU-7"
    title: "Migrate Quickstart E2E Consumers"
    owner_role: "subagent"
    packages: ["@facet/quickstart", "@facet/reference-agent"]
    objective: "Split quickstart E2E imports so brain symbols come from @facet/reference-agent and server symbols stay from quickstart."
    files:
      - path: "packages/quickstart/e2e/smoke.test.ts"
        change_type: "update"
        purpose: "Import reference agent/provider from new package and server from quickstart."
      - path: "packages/quickstart/e2e/journey/harness.ts"
        change_type: "update"
        purpose: "Import provider type/resolution from new package, startQuickstart from quickstart."
      - path: "packages/quickstart/e2e/journey/harness.test.ts"
        change_type: "update"
        purpose: "Import stub from new package if needed."
      - path: "packages/quickstart/e2e/journey/journey.selftest.test.ts"
        change_type: "update"
        purpose: "Import stub from new package."
    depends_on: ["WU-6"]
    parallel_group: "serial-g"
    red_check:
      command: 'pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/harness.test.ts -t "journey harness imports provider from reference-agent"'
      target: "packages/quickstart/e2e/journey/harness.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/harness.test.ts"
      - "pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/journey/journey.selftest.test.ts"
      - "pnpm exec vitest run --config packages/quickstart/e2e/vitest.config.ts packages/quickstart/e2e/smoke.test.ts"
      - "git grep -n -E 'createQuickstartAgent|QuickstartProvider|resolveProvider|createStubAgent' packages apps/playground docs README.md AGENTS.md .changeset 2>/dev/null"
    no_regression_checks:
      - "pnpm exec vitest run packages/quickstart/src/quickstart.e2e.test.ts"
    test_plan:
      - type: "integration"
        target: "packages/quickstart/e2e/journey/harness.test.ts"
        covers_dc: ["DC-006"]
        action: "update"
      - type: "integration"
        target: "packages/quickstart/e2e/journey/journey.selftest.test.ts"
        covers_dc: ["DC-006"]
        action: "update"
      - type: "e2e"
        target: "packages/quickstart/e2e/smoke.test.ts"
        covers_dc: ["DC-002", "DC-003", "DC-007"]
        action: "update"
      - type: "static"
        target: "packages apps/playground docs README.md AGENTS.md .changeset consumer sweep"
        covers_dc: ["DC-006"]
        action: "review"
    done_conditions:
      - "RED->GREEN evidence reported."
      - "E2E support no longer imports provider/agent symbols from quickstart barrel except compatibility-specific tests."
      - "Consumer sweep output is classified: every old brain symbol hit is either migrated to @facet/reference-agent, a quickstart compatibility shim/test, or documented migration text."
      - "Provider smoke follows the updated key-gated policy: Tier 2 blocks for packages/quickstart/ changes and for packages/reference-agent provider/agent/package changes."
    handoff_format: *handoff

  - id: "WU-8"
    title: "Update Documentation"
    owner_role: "main-agent"
    packages: ["docs", "@facet/quickstart", "@facet/reference-agent"]
    objective: "Update user-facing and agent-facing docs to reflect the new package boundary."
    files:
      - path: "AGENTS.md"
        change_type: "update"
        purpose: "Package map and live-test wording; Tier 2 provider smoke blocks when packages/quickstart/ or reference-agent provider/agent/package files change."
      - path: "README.md"
        change_type: "update"
        purpose: "Package table and your-model-defaults wording."
      - path: "docs/ARCHITECTURE.md"
        change_type: "update"
        purpose: "Reference brain section naming."
      - path: "packages/quickstart/README.md"
        change_type: "update"
        purpose: "Quickstart as wrapper composing reference-agent."
      - path: "packages/reference-agent/README.md"
        change_type: "add"
        purpose: "Reference-agent usage, providers, stub, security notes."
    depends_on: ["WU-7"]
    parallel_group: "serial-h"
    red_check:
      command: "N/A"
      target: "docs"
      justification: "docs-only WU; no production code changes."
    quick_checks:
      - "pnpm exec prettier --check AGENTS.md README.md docs/ARCHITECTURE.md packages/quickstart/README.md packages/reference-agent/README.md"
      - "rg -n '@facet/reference-agent|@facet/agent|@facet/quickstart' AGENTS.md README.md docs/ARCHITECTURE.md packages/quickstart/README.md packages/reference-agent/README.md"
    no_regression_checks:
      - "pnpm format:check"
    test_plan:
      - type: "docs"
        target: "AGENTS.md README.md docs/ARCHITECTURE.md packages/quickstart/README.md packages/reference-agent/README.md"
        covers_dc: ["DC-005"]
        action: "update"
    done_conditions:
      - "N/A RED acknowledged with docs-only justification."
      - "Docs clearly distinguish Stage SDK (@facet/agent), reference brain (@facet/reference-agent), and boot wrapper (@facet/quickstart)."
      - "Quickstart README still documents CLI flags and provider key behavior."
      - "AGENTS live-test policy names packages/reference-agent provider/agent/package changes as Tier-2-blocking."
    handoff_format: *handoff

  - id: "WU-9"
    title: "Add Release Metadata"
    owner_role: "main-agent"
    packages: ["changeset"]
    objective: "Record package-level release notes for the new package and quickstart dependency/surface change."
    files:
      - path: ".changeset/reference-agent-package.md"
        change_type: "add"
        purpose: "Changeset for @facet/reference-agent and @facet/quickstart."
    depends_on: ["WU-8"]
    parallel_group: "serial-i"
    red_check:
      command: "N/A"
      target: ".changeset/reference-agent-package.md"
      justification: "release-note markdown only; no production code changes."
    quick_checks:
      - "pnpm exec prettier --check .changeset/reference-agent-package.md"
    no_regression_checks:
      - "pnpm format:check"
    test_plan:
      - type: "docs"
        target: ".changeset/reference-agent-package.md"
        covers_dc: ["DC-005"]
        action: "new"
    done_conditions:
      - "N/A RED acknowledged with release-note-only justification."
      - "Changeset mentions new package and quickstart now composing it."
    handoff_format: *handoff

execution_order:
  - "WU-1"
  - "WU-2"
  - "WU-3"
  - "WU-4"
  - "WU-5"
  - "WU-6"
  - "WU-7"
  - "WU-8"
  - "WU-9"

final_static_checks:
  - concern: "no-invariant-drift"
    command: 'sh -c ''git diff --name-only -- packages/core packages/react packages/client packages/server | if rg -n "."; then exit 1; else exit 0; fi'''
    covers_dc: ["DC-004", "DC-008"]
  - concern: "browser-provider-separation"
    command: "sh -c '! rg -n '\\''@facet/reference-agent|OPENAI_API_KEY|ANTHROPIC_API_KEY|https://api\\.openai\\.com|https://api\\.anthropic\\.com'\\'' packages/quickstart/dist/page/app.js'"
    covers_dc: ["DC-004", "DC-008"]
  - concern: "post-change-consumer-sweep"
    command: "git grep -n -E 'createQuickstartAgent|QuickstartProvider|resolveProvider|createStubAgent' packages apps/playground docs README.md AGENTS.md .changeset 2>/dev/null"
    covers_dc: ["DC-006"]

final_gate_chain:
  - "/update-tests"
  - "/verify"
  - "/code-review"
  - "final_static_checks"
  - "/live-test (Tier 1 always; Tier 2 blocks for packages/quickstart/ changes and for packages/reference-agent provider/agent/package changes)"
  - "/update-docs"
  - "Commit/PR only on the user's explicit go."
