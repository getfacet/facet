# Execution Manifest: Quickstart Built-in Agent (Bundle A)
#
# Keep synchronized with specs/dev-specs/quickstart-builtin-agent.md
# (WU ids, files, deps, checks). Final gate source of truth: AGENTS.md +
# docs/REVIEW-RULES.md.

feature_slug: "quickstart-builtin-agent"
spec_path: "specs/dev-specs/quickstart-builtin-agent.md"
context_evidence_path: "specs/context/quickstart-builtin-agent.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; playground buildable (WU-3 touches its sources); no provider key required for any blocking WU (keys only for the optional Tier-2/3 smoke)"
    owner: "main-agent"
    verification: "pnpm install && pnpm --filter @facet/playground typecheck"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"

work_units:
  - id: "WU-1"
    title: "Core contract — collect on agent actions, fields on action events, the cap constant"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Land the additive wire/type contract — AgentAction.collect?: NodeId, the ClientEvent action arm's fields?: Readonly<Record<string, string>>, MAX_FIELD_VALUE_CHARS = 2000 — with asAction keeping a string collect (dropping non-strings with an issue, action kept), leaving the whole repo compiling unchanged."
    files:
      - path: "packages/core/src/nodes.ts"
        change_type: "update"
        purpose: "AgentAction.collect?: NodeId + doc comment (node-id reference; browser snapshots field values in that box's subtree at press time)"
      - path: "packages/core/src/protocol.ts"
        change_type: "update"
        purpose: "action arm gains fields?: Readonly<Record<string, string>> (on the EVENT, per Decision Lock; AgentEventFrame wraps the event whole); export MAX_FIELD_VALUE_CHARS = 2000 as the shared cap"
      - path: "packages/core/src/validate.ts"
        change_type: "update"
        purpose: "asAction agent branch copies collect when typeof value.collect === 'string'; non-string collect dropped with an issue, action kept (fail-safe)"
      - path: "packages/core/src/validate.test.ts"
        change_type: "update"
        purpose: "RED-first: string collect kept + kind-stamped; non-string collect dropped with issue while name/payload survive; legacy {name}-only actions byte-identical"
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts -t 'keeps a string collect id on an agent action'"
      target: "packages/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts -t 'keeps a string collect id on an agent action'"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "unit"
        target: "packages/core/src/validate.test.ts"
        covers_dc: ["DC-001", "DC-002"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "pnpm typecheck green repo-wide (additive claim verified: zero files outside core changed)"
      - "@facet/core still dependency-free, no node:* imports; new names flow through the existing export * barrel"
      - "No regression: pnpm test + pnpm lint"
