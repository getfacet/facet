# Execution Manifest: Component Model + Renderer Layout Contract
#
# Keep synchronized with specs/dev-specs/component-model-and-layout-contract.md.
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "component-model-and-layout-contract"
spec_path: "specs/dev-specs/component-model-and-layout-contract.md"
context_evidence_path: "specs/context/component-model-and-layout-contract.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "PATH=/opt/homebrew/bin:$PATH pnpm typecheck && PATH=/opt/homebrew/bin:$PATH pnpm test && PATH=/opt/homebrew/bin:$PATH pnpm lint"
  - concern: "runtime"
    requirement: "Use pnpm 9.12.0 from /opt/homebrew/bin on this workspace"
    owner: "main-agent"
    verification: "PATH=/opt/homebrew/bin:$PATH pnpm --version"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "Core Intrinsic Vocabulary And Renderability"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Define primitive/component vocabulary, new intrinsic node shapes, metric alias compatibility, and content detection."
    module_shape:
      decision: "sibling-helper"
      rationale: "Public node union remains in nodes.ts; private component-validation.ts keeps bounded component parsing out of the already-large validate.ts and has focused tests."
    files:
      - path: "packages/core/core/src/nodes.ts"
        change_type: "update"
        purpose: "Add primitive and intrinsic component constants, new intrinsic interfaces, MetricNode, and legacy aliases."
      - path: "packages/core/core/src/tree.ts"
        change_type: "update"
        purpose: "Recognize renderable content for new intrinsic nodes and metric/stat."
      - path: "packages/core/core/src/component-validation.ts"
        change_type: "add"
        purpose: "Private bounded sanitizers/helpers for component node payloads."
      - path: "packages/core/core/src/tree.test.ts"
        change_type: "update"
        purpose: "Renderable-content tests for metric, keyValue, emptyState, loading, and hostile empty nodes."
      - path: "packages/core/core/src/component-validation.test.ts"
        change_type: "add"
        purpose: "Focused tests for primitive preservation, intrinsic set lock, bounded arrays, and backend-field rejection."
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/tree.test.ts packages/core/core/src/component-validation.test.ts"
      target: "packages/core/core/src/tree.test.ts packages/core/core/src/component-validation.test.ts"
      justification: ""
    quick_checks:
      - "PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/tree.test.ts packages/core/core/src/component-validation.test.ts"
      - "PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/core typecheck"
    no_regression_checks:
      - "PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/core test"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/component-validation.test.ts"
        covers_dc: ["DC-002", "DC-003", "DC-005", "DC-010", "DC-012"]
        action: "new"
      - type: "unit"
        target: "packages/core/core/src/tree.test.ts"
        covers_dc: ["DC-005", "DC-010", "DC-011"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "stat and metric both count as renderable when valid"
      - "No regression: @facet/core tests"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

