    owner_role: "subagent"
    packages: ["@facet/runtime"]
    objective: "Add the file-backed reference store using node:fs, exported only from the node-only barrel, round-tripping the opaque payload and skipping corrupt files."
    files:
      - path: "packages/core/runtime/src/file-summary-store.ts"
        change_type: "add"
        purpose: "FileSummaryStore (JSON per key, node:fs, shape guard, corrupt read -> undefined, monotonic coveredThrough) mirroring FileSink"
      - path: "packages/core/runtime/src/file-summary-store.test.ts"
        change_type: "add"
        purpose: "Identical store contract over a temp dir"
      - path: "packages/core/runtime/src/node.ts"
        change_type: "update"
        purpose: "Node barrel export"
    depends_on: ["WU-1"]
    parallel_group: "par-stores"
    red_check:
      command: "pnpm exec vitest run packages/core/runtime/src/file-summary-store.test.ts"
      target: "packages/core/runtime/src/file-summary-store.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/runtime/src/file-summary-store.test.ts"
      - "pnpm --filter @facet/runtime typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/runtime/src/sink.test.ts packages/core/runtime/src/session-file.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/core/runtime/src/file-summary-store.test.ts"
        covers_dc: ["DC-012"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported"
      - "Contract assertions identical to WU-1 (keyed, opaque round-trip, monotonic, corrupt -> undefined)"
      - "Exported only from node.ts; main barrel unchanged"
      - "No regression: file-sink/session-file suites"
    handoff_format: *handoff

