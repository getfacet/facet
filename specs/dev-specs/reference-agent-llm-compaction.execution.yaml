# Execution Manifest: Reference-Agent LLM Context Compaction (compaction v2)
#
# Keep synchronized with specs/dev-specs/reference-agent-llm-compaction.md
# (WU ids, files, deps, checks). Final gate source of truth: AGENTS.md +
# docs/REVIEW-RULES.md.

feature_slug: "reference-agent-llm-compaction"
spec_path: "specs/dev-specs/reference-agent-llm-compaction.md"
context_evidence_path: "specs/context/reference-agent-llm-compaction.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands in the prepared worktree"
  - concern: "runtime"
    requirement: "pnpm install done; playground buildable"
    owner: "main-agent"
    verification: "pnpm --filter @facet/playground build"
  - concern: "dependency-boundary"
    requirement: "@facet/runtime must not gain any agent-stack dependency; SummaryStore payload stays opaque"
    owner: "main-agent"
    verification: "packages/core/runtime/package.json review + pnpm --filter @facet/runtime typecheck"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "Runtime SummaryStore interface + MemorySummaryStore (browser-safe)"
    owner_role: "subagent"
    packages: ["@facet/runtime"]
    objective: "Add the brain-agnostic opaque-payload SummaryStore interface and in-memory reference with a monotonic coveredThrough guard, exported from the browser-safe barrel."
    files:
      - path: "packages/core/runtime/src/summary-store.ts"
        change_type: "add"
        purpose: "SummaryStore interface (keyed get/put via sessionKey, opaque { payload; coveredThrough; generation }) + MemorySummaryStore with monotonic reject-regressive put"
      - path: "packages/core/runtime/src/summary-store.test.ts"
        change_type: "add"
        purpose: "Store contract: keyed get/put, opaque round-trip, monotonic reject, corrupt/absent -> undefined"
      - path: "packages/core/runtime/src/index.ts"
        change_type: "update"
        purpose: "Barrel export (no node:* import)"
    depends_on: []
    parallel_group: "par-foundation"
    red_check:
      command: "pnpm exec vitest run packages/core/runtime/src/summary-store.test.ts"
      target: "packages/core/runtime/src/summary-store.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/runtime/src/summary-store.test.ts"
      - "pnpm --filter @facet/runtime typecheck"
      - 'node -e "require(''node:fs'').readFileSync(''packages/core/runtime/src/summary-store.ts'',''utf8'').includes(''node:'') && process.exit(1)"'
    no_regression_checks:
      - "pnpm exec vitest run packages/core/runtime/src/sink.test.ts packages/core/runtime/src/stage-store.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/core/runtime/src/summary-store.test.ts"
        covers_dc: ["DC-009", "DC-012"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported"
      - "Payload is opaque; no reference-agent/LLM type imported into runtime"
      - "Regressive put (lower/equal coveredThrough) rejected/ignored"
      - "Barrel exports the new symbols; main entry stays node:*-free"
      - "No regression: runtime sink/stage-store suites"
    handoff_format: &handoff
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
