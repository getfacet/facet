# Execution Manifest: Agent Tool Result Contract
#
# Keep synchronized with specs/dev-specs/agent-tool-result-contract.md.
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "agent-tool-result-contract"
spec_path: "specs/dev-specs/agent-tool-result-contract.md"
context_evidence_path: "specs/context/agent-tool-result-contract.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands in the prepared worktree"
  - concern: "dependency-boundary"
    requirement: "@facet/agent-tools remains provider-free and adds no runtime dependency"
    owner: "main-agent"
    verification: "package.json review plus typecheck/build"

review_fix_policy:
  batching_rule: "Group review comments into batches. Apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "Contract Types, Formatter, And Policy Doc"
    owner_role: "main-agent"
    packages: ["@facet/agent-tools", "docs"]
    objective: "Define and export the structured observation contract and document the policy before changing tool behavior."
    files:
      - path: "docs/AGENT-TOOL-RESULT-CONTRACT.md"
        change_type: "add"
        purpose: "Durable policy/contract doc"
      - path: "packages/agent-stack/agent-tools/src/types.ts"
        change_type: "update"
        purpose: "Export observation/outcome types"
      - path: "packages/agent-stack/agent-tools/src/observation.ts"
        change_type: "add"
        purpose: "Formatter, bounded warning/id helpers, visibility helpers"
      - path: "packages/agent-stack/agent-tools/src/observation.test.ts"
        change_type: "add"
        purpose: "Contract formatter tests"
      - path: "packages/agent-stack/agent-tools/src/index.ts"
        change_type: "update"
        purpose: "Barrel exports"
    depends_on: []
    parallel_group: "serial-contract"
    red_check:
      command: "pnpm exec vitest run packages/agent-stack/agent-tools/src/observation.test.ts"
      target: "packages/agent-stack/agent-tools/src/observation.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/agent-stack/agent-tools/src/observation.test.ts"
      - "pnpm --filter @facet/agent-tools typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/agent-stack/agent-tools/src/executor.test.ts packages/agent-stack/agent-tools/src/buffer.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/agent-stack/agent-tools/src/observation.test.ts"
        covers_dc: ["DC-001", "DC-002"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported"
      - "Contract doc includes false-success, pending, warning, and visibility rules"
      - "Formatter returns bounded JSON string and typed structured data"
      - "Barrel exports new public types/helpers"
    handoff_format: &handoff
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Executor Outcomes And Visibility"
    owner_role: "main-agent"
    packages: ["@facet/agent-tools"]
    objective: "Convert direct executor results to the structured contract and classify visible, not-visible, warning, and rejected outcomes."
    files:
      - path: "packages/agent-stack/agent-tools/src/executor.ts"
        change_type: "update"
        purpose: "Use formatter and visibility classification"
      - path: "packages/agent-stack/agent-tools/src/executor.test.ts"
        change_type: "update"
        purpose: "Pin contract outcomes for success, warnings, false-success, and rejection"
    depends_on: ["WU-1"]
    parallel_group: "serial-contract"
    red_check:
      command: 'pnpm exec vitest run packages/agent-stack/agent-tools/src/executor.test.ts -t "returns applied_not_visible"'
      target: "packages/agent-stack/agent-tools/src/executor.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/agent-stack/agent-tools/src/executor.test.ts"
      - "pnpm --filter @facet/agent-tools typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/agent-stack/agent-tools/src/buffer.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/agent-stack/agent-tools/src/executor.test.ts"
        covers_dc: ["DC-003", "DC-004", "DC-005"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported"
      - "append_node visible success is applied_visible"
      - "orphan set_node is applied_not_visible"
      - "sanitized render is applied_with_warnings"
      - "invalid inputs are rejected with no patch"
    handoff_format: *handoff

  - id: "WU-3"
    title: "Buffer Pending Results And Reference Prompt"
    owner_role: "main-agent"
    packages: ["@facet/agent-tools", "@facet/reference-agent"]
    objective: "Make buffered/pending outcomes explicit and teach the reference prompt to obey the structured result contract."
    files:
      - path: "packages/agent-stack/agent-tools/src/buffer.ts"
        change_type: "update"
        purpose: "Pending and aggregate patch-cap observations use contract JSON"
      - path: "packages/agent-stack/agent-tools/src/buffer.test.ts"
        change_type: "update"
        purpose: "Pin pending outcome and flush behavior"
      - path: "packages/agent-stack/reference-agent/src/prompt/system.ts"
        change_type: "update"
        purpose: "Contract-aware workflow guidance"
      - path: "packages/agent-stack/reference-agent/src/prompt.test.ts"
        change_type: "update"
        purpose: "Prompt contains outcome rules"
    depends_on: ["WU-1", "WU-2"]
    parallel_group: "serial-contract"
    red_check:
      command: 'pnpm exec vitest run packages/agent-stack/agent-tools/src/buffer.test.ts packages/agent-stack/reference-agent/src/prompt.test.ts -t "pending"'
      target: "buffer.test.ts, prompt.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/agent-stack/agent-tools/src/buffer.test.ts packages/agent-stack/reference-agent/src/prompt.test.ts"
      - "pnpm --filter @facet/reference-agent typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/agent-stack/reference-agent/src/harness/loop.test.ts packages/agent-stack/reference-agent/src/harness/transcript.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/agent-stack/agent-tools/src/buffer.test.ts"
        covers_dc: ["DC-006", "DC-008"]
        action: "update"
      - type: "unit"
        target: "packages/agent-stack/reference-agent/src/prompt.test.ts"
        covers_dc: ["DC-007", "DC-008"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported"
      - "Pending observation is not success and includes next action"
      - "Reference prompt says not to claim completion on rejected, pending, warning, or not-visible results"
      - "Transcript bounding still applies to JSON observations"
    handoff_format: *handoff

  - id: "WU-4"
    title: "Package Docs And Release Note"
    owner_role: "main-agent"
    packages: ["@facet/agent-tools", "@facet/reference-agent", "@facet/quickstart"]
    objective: "Update user-facing package docs and package release metadata for the observation contract behavior change."
    files:
      - path: "packages/agent-stack/agent-tools/README.md"
        change_type: "update"
        purpose: "Contract usage"
      - path: "packages/agent-stack/reference-agent/README.md"
        change_type: "update"
        purpose: "Prompt/tool result behavior"
      - path: "packages/agent-stack/quickstart/README.md"
        change_type: "update"
        purpose: "Streaming loop observes structured tool results"
      - path: ".changeset/agent-tool-result-contract.md"
        change_type: "add"
        purpose: "Published package patch notes"
    depends_on: ["WU-1", "WU-2", "WU-3"]
    parallel_group: "serial-contract"
    red_check:
      command: "N/A"
      target: "docs/release metadata"
      justification: "Docs/release-metadata only; no production code files in this WU"
    quick_checks:
      - 'rg "structured|applied_not_visible|pending" packages/agent-stack/agent-tools/README.md packages/agent-stack/reference-agent/README.md packages/agent-stack/quickstart/README.md docs/AGENT-TOOL-RESULT-CONTRACT.md'
      - "pnpm exec prettier --check docs/AGENT-TOOL-RESULT-CONTRACT.md packages/agent-stack/agent-tools/README.md packages/agent-stack/reference-agent/README.md packages/agent-stack/quickstart/README.md .changeset/agent-tool-result-contract.md"
    no_regression_checks:
      - "pnpm format:check"
    test_plan:
      - type: "integration"
        target: 'rg "applied_not_visible|pending" package docs and contract doc'
        covers_dc: ["DC-001", "DC-008"]
        action: "update"
    done_conditions:
      - "N/A red-check justification recorded"
      - "Package docs describe structured observations without implying provider-specific behavior"
      - "Changeset covers @facet/agent-tools and @facet/reference-agent"
    handoff_format: *handoff
