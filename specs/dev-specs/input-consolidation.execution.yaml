execution_order:
  - "par-core-serial: WU-1 → WU-2 (SERIAL, not parallel: WU-2 depends_on [WU-1]). Both edit the shared brick-registry.ts dispatch hub — WU-1 renames the field:→input: entry KEY, WU-2 deletes the search: entry + imports — but because they run in sequence (never concurrently) they touch disjoint regions of that file with no merge conflict. The search: registry removal lives in WU-2 (not WU-1) so it is atomic with the COMPONENT_NODE_TYPES search removal; splitting them would throw at component-validation.ts:94. WU-2 is a 5-file search cutover (within the Gate-7 <=5-files rule); the 6th search-bearing file — tree.ts's now-dead rendersSearch predicate — is split into WU-10 (depends_on [WU-2]), a pure dead-code cleanup with no throw risk."
  - "par-downstream: (WU-3 ∥ WU-4 ∥ WU-5 ∥ WU-6 ∥ WU-7 ∥ WU-8 ∥ WU-9 ∥ WU-10). WU-3/WU-4/WU-8 need only WU-1 and may run in parallel with WU-2; WU-5/WU-6/WU-7/WU-9 need both WU-1 and WU-2; WU-10 needs WU-2 (it edits tree.ts, which no other downstream WU touches, so it runs concurrently with the group)."
  - "React test-suite split: the field/search test authorings in packages/core/react/src are partitioned by seam so none is orphaned — WU-4 migrates the collect tests (StageRenderer.interaction.test.tsx, StageRenderer.budget.test.tsx), WU-3 migrates the render/motion/theme/layout tests (StageRenderer.motion.test.tsx, StageRenderer.theme.test.tsx, component-layout.test.tsx). Because both WUs share the whole-package `pnpm exec vitest run packages/core/react/src` no_regression check, that whole-suite check is fully green only once BOTH WU-3 and WU-4 land; each WU's scoped quick_checks (its own migrated files) are the per-WU RED→GREEN proof, and the whole react suite is re-asserted at the final /verify. Mirrors the whole-repo typecheck being a final gate, not a per-WU gate."
  - "Whole-repo pnpm typecheck passes only after ALL WUs land — the final /verify gate, not a per-WU gate. brick-registry.ts is shared by WU-1 and WU-2 (serial); tree.ts belongs to WU-10 alone (WU-2 only removes the rendersSearch IMPORT, which lives in brick-registry.ts, so WU-10's definition deletion in tree.ts is safe once WU-2 lands — enforced by depends_on [WU-2]); every other file belongs to exactly one WU."
