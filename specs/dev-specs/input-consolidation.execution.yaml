  - id: "WU-10"
    title: "core — delete dead rendersSearch predicate from tree.ts"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "After WU-2 removes the BRICK_REGISTRY search: entry and its rendersSearch import, tree.ts's exported rendersSearch predicate is unreferenced (grep-verified: only references were brick-registry.ts:58 import + :287 dispatch, both deleted in WU-2). Delete it. This is the 6th search-bearing core file, split out of WU-2 so WU-2 stays within the Gate-7 <=5-files rule. Pure cleanliness: rendersSearch(node: Record<string, unknown>) throws nowhere and carries no SearchNode type dependency, so removal changes no runtime behavior and cannot regress fail-safe."
    module_shape:
      decision: "preserve"
      rationale: "Single-line dead-code deletion within an existing core module; no boundary change. Split from WU-2 purely to hold WU-2 at the Gate-7 <=5 files. depends_on [WU-2] because the deletion is only safe after WU-2 has removed the brick-registry.ts import of rendersSearch (else deleting the definition would dangle that import). tree.ts is touched by no other WU, so WU-10 runs concurrently with the par-downstream group."
