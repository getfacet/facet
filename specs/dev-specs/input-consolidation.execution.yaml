# Execution Manifest: Input Consolidation (`field`+`search` → one `input` brick)
#
# Keep synchronized with specs/dev-specs/input-consolidation.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "input-consolidation"
spec_path: "specs/dev-specs/input-consolidation.md"
context_evidence_path: "specs/context/input-consolidation.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; playground buildable; the deterministic quickstart E2E (quickstart.e2e.test.ts) runnable for DC-006"
    owner: "main-agent"
    verification: "pnpm --filter @facet/playground build; pnpm exec vitest run packages/agent-stack/quickstart/src/quickstart.e2e.test.ts"
  - concern: "atomicity"
    requirement: "Hard cutover — repo fully typechecks only after ALL WUs land; per-WU red_checks are vitest behavior tests (no whole-repo typecheck). Whole-repo pnpm typecheck is the final /verify gate."
    owner: "main-agent"
    verification: "pnpm typecheck at /verify"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + test_plan targets (the WU's own tests, incl. the field→input/search-removal test migrations assigned to it) + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "core — field→input rename + STAGE_SPEC + catalog"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Rename the field primitive vocabulary to input (symbols, type discriminant, PRIMITIVE_BRICK_TYPES), rename the shared BRICK_REGISTRY dispatch entry KEY field:→input: (leaving the search: entry for WU-2), rewrite the STAGE_SPEC input line + delete the search line, and remove the search catalog-defaults entry."
    module_shape:
      decision: "preserve"
      rationale: "In-place rename within existing core modules; no new files, no boundary change. Public/private boundary unchanged (barrel re-exports the renamed symbols). brick-registry.ts is the shared dispatch hub imported by the whole validateTree/expand transpile graph; WU-1 edits ONLY its field:→input: entry KEY + validate: validateInput and keeps rendersField/fillField/leavesField references stable so the input: entry resolves against symbols already present on main. WU-1 LEAVES the search: entry intact — WU-2 removes it atomically with the COMPONENT_NODE_TYPES search removal (removing it here would throw at component-validation.ts:94). brick-registry.ts is co-edited by WU-1 and WU-2 but safely, because WU-2 depends_on [WU-1] (serial, disjoint regions, never concurrent)."
    files:
      - path: "packages/core/core/src/nodes.ts"
        change_type: "update"
        purpose: "INPUT_KINDS/InputKind/InputStyle/InputNode; PRIMITIVE_BRICK_TYPES member field→input; PrimitiveBrickNode. Keep INPUT_KINDS value 'search'."
      - path: "packages/core/core/src/primitive-node-validation.ts"
        change_type: "update"
        purpose: "Rename imports + inputStyle/inputOptions helpers + validateInput(); type:'field'→'input' at :520/:528."
      - path: "packages/core/core/src/brick-registry.ts"
        change_type: "update"
        purpose: "Rename the field: registry entry KEY→input: (:231) with validate: validateInput (import rename validateField→validateInput at :25); KEEP rendersSelf: rendersField / fill: fillField / stringLeaves: leavesField references (those tree.ts/expand-composition-fill.ts NAMES are unchanged — only the node-type KEY moves). LEAVE the search: entry (:283-290) + its rendersSearch/fillSearch/leavesSearch imports INTACT — WU-2 removes them atomically with the COMPONENT_NODE_TYPES search removal (removing them here would throw at component-validation.ts:94). Self-consistent after WU-1 alone: validateInput is WU-1's own symbol; every other registry reference still resolves on main."
      - path: "packages/core/core/src/spec.ts"
        change_type: "update"
        purpose: "Line 17 '- input:' (type:'input', keep 'search' in kind enum); DELETE line 34 search; update lists at 10/44."
      - path: "packages/core/core/src/catalog-defaults.ts"
        change_type: "update"
        purpose: "DELETE search entry (:61); type:'field'→'input' (:83)."
    depends_on: []
    parallel_group: "par-core-serial"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/validate.test.ts -t 'input primitive'"
      target: "packages/core/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/validate.test.ts -t 'input primitive'"
      - "pnpm exec vitest run packages/core/core/src/nodes.test.ts packages/core/core/src/spec.test.ts packages/core/core/src/catalog.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/validate.test.ts"
        covers_dc: ["DC-001", "DC-002", "DC-004"]
        action: "update"
      - type: "unit"
        target: "packages/core/core/src/nodes.test.ts"
        covers_dc: ["DC-001"]
        action: "update"
      - type: "unit"
        target: "packages/core/core/src/spec.test.ts"
        covers_dc: ["DC-005", "DC-003"]
        action: "update"
      - type: "unit"
        target: "packages/core/core/src/catalog.test.ts"
        covers_dc: ["DC-003"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "InputNode/InputKind/InputStyle/INPUT_KINDS exported via barrel; no live type:'field', FieldNode/FieldInput/FieldStyle/FIELD_INPUTS, or validateField reference in core. Internal non-barrel behavior-fn names rendersField/fillField/leavesField/fieldHasRenderableControl are deliberately KEPT (RISK-API-6-style: decoupled from the node type; renaming forces cross-WU registry coupling)."
      - "BRICK_REGISTRY has an input: entry (validate: validateInput), no field: entry; rendersField/fillField/leavesField references kept; the search: entry + its imports left intact for WU-2"
      - "STAGE_SPEC teaches input with no search node line; catalog has no search entry"
      - "No regression: packages/core/core/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "core — remove search node type + composition machinery"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Remove the search component node type across the 5 search-bearing core files that either hard-bind to the registry or would dangle an import: the type + SearchNode + COMPONENT_NODE_TYPES membership, the control validator, the composition remap arm, the fillSearch/leavesSearch behavior definitions, AND the BRICK_REGISTRY search: entry + its rendersSearch/fillSearch/leavesSearch imports (removed here, not in WU-1, so the registry entry and COMPONENT_NODE_TYPES membership drop together and no type:'search' node ever hits an undefined registry entry). Also rename the field→input string-literal arm in the composition remap switch. Keeps the rendersField/fillField/leavesField function names (WU-1's renamed registry input: entry consumes them). tree.ts's rendersSearch predicate is NOT touched here — once WU-2 drops its registry import it is unreferenced dead code (no throw, no SearchNode type), so its deletion is the cleanliness-only follow-on WU-10, keeping WU-2 within the Gate-7 <=5-files rule."
    module_shape:
      decision: "preserve"
      rationale: "In-place deletion/rename within existing core modules. Serial after WU-1 (depends_on [WU-1]). brick-registry.ts is co-edited with WU-1 but safely — WU-1 renames the field:→input: entry, WU-2 deletes the search: entry + imports, and because WU-2 runs AFTER WU-1 (never concurrent) they touch disjoint regions with no merge conflict. The registry search: removal is co-located with the COMPONENT_NODE_TYPES search removal in this same WU because component validation dispatches BRICK_REGISTRY[rawType] at component-validation.ts:93 after an isComponentNodeType guard (keyed on COMPONENT_NODE_TYPES) with NO fail-safe try/catch — dropping the registry entry while the type stays in the set would throw at :94 and break WU-2's red_check. That hard-binds exactly {brick-registry.ts, component-nodes.ts}; the three other arms (control validator, remap arm, fillSearch/leavesSearch definitions) blank-degrade rather than throw if they lag, but fillSearch/leavesSearch are IMPORTED by brick-registry.ts so their definitions ride the same WU to avoid a dangling import — 5 files, within the Gate-7 <=5 rule. The 6th search-bearing file, tree.ts's rendersSearch predicate, is dead code once WU-2 drops its import (no throw, no SearchNode type dependency) and is split into the follow-on WU-10 (depends_on [WU-2])."
    files:
      - path: "packages/core/core/src/component-nodes.ts"
        change_type: "update"
        purpose: "Remove SearchNode (:226-228) + 'search' from ComponentNodeType (:22) and ComponentNode union (:287)."
      - path: "packages/core/core/src/component-validation-control.ts"
        change_type: "update"
        purpose: "Remove 'search' from ControlComponentType (:29) + case 'search' validator (:123-128)."
      - path: "packages/core/core/src/expand-composition-remap.ts"
        change_type: "update"
        purpose: "DELETE case 'search' (:156-162); rename case 'field'→case 'input' (:117) (string-literal switch, self-contained)."
      - path: "packages/core/core/src/expand-composition-fill.ts"
        change_type: "update"
        purpose: "DELETE fillSearch (:325) + leavesSearch (:626). KEEP fillField (:105)/leavesField (:546) names — the renamed registry input: entry (WU-1) references them; dispatch is via BRICK_REGISTRY so there is no internal fill/leaves switch to rename."
      - path: "packages/core/core/src/brick-registry.ts"
        change_type: "update"
        purpose: "DELETE the search: registry entry (:283-290) + its rendersSearch (:58)/fillSearch (:82)/leavesSearch (:104) imports. Lands on top of WU-1's field:→input: edit (WU-2 depends_on [WU-1], disjoint region, no parallel conflict). Removing the entry HERE — atomic with the COMPONENT_NODE_TYPES search removal in component-nodes.ts — is required so component-validation.ts:93 never resolves BRICK_REGISTRY['search'] to undefined for a still-typed search node (which would throw at :94). Dropping the rendersSearch import here leaves tree.ts's rendersSearch definition unreferenced — WU-10 deletes that dead predicate."
    depends_on: ["WU-1"]
    parallel_group: "par-core-serial"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/component-validation.test.ts -t 'search node type removed'"
      target: "packages/core/core/src/component-validation.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/component-validation.test.ts -t 'search node type removed'"
      - "pnpm exec vitest run packages/core/core/src/expand-composition.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/component-validation.test.ts"
        covers_dc: ["DC-003", "DC-004"]
        action: "update"
      - type: "unit"
        target: "packages/core/core/src/expand-composition.test.ts"
        covers_dc: ["DC-003", "DC-001"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "SearchNode + all 'search' union/validator/remap arms deleted; fillSearch/leavesSearch definitions deleted; BRICK_REGISTRY search: entry + its rendersSearch/fillSearch/leavesSearch imports deleted; no dangling reference (the now-unreferenced tree.ts rendersSearch definition is deleted in WU-10)"
      - "Registry search: entry removed in the SAME WU as the COMPONENT_NODE_TYPES search removal (no undefined-entry throw at component-validation.ts:94); rendersField/fillField/leavesField + fieldHasRenderableControl kept (consumed by WU-1's registry input: entry)"
      - "Exactly 5 source files (Gate-7 <=5 satisfied): hard-bound {brick-registry.ts, component-nodes.ts} + the three import-/validator-coupled arms; tree.ts's dead rendersSearch deferred to WU-10"
      - "Runs AFTER WU-1 (depends_on [WU-1]): WU-1's field:→input: registry edit lands first; WU-2 edits a disjoint region of brick-registry.ts — no parallel merge conflict"
      - "No regression: packages/core/core/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
