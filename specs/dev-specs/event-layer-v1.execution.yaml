# Execution Manifest: Event Layer v1 — 3-Layer Model + Ordered Replay Log
#
# Keep synchronized with specs/dev-specs/event-layer-v1.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "event-layer-v1"
spec_path: "specs/dev-specs/event-layer-v1.md"
context_evidence_path: "specs/context/event-layer-v1.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; playground buildable; quickstart bundle rebuildable for the live gate"
    owner: "main-agent"
    verification: "pnpm --filter @facet/playground dev reachable; pnpm --filter @facet/quickstart build succeeds"
  - concern: "atomic-rename"
    requirement: "This is a breaking cross-package rename: full-repo pnpm typecheck/pnpm test are green only AFTER the whole WU chain lands. Interim WUs gate on their OWN package (typecheck + vitest); full-repo green is asserted at the final /verify gate."
    owner: "main-agent"
    verification: "each WU runs its package typecheck + vitest; /verify runs full pnpm typecheck + pnpm test"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"

work_units:
  - id: "WU-1"
    title: "Core event contract — rename + CollectedEvent + TapEffect + seq + transport.record"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Land the 3-layer contract — rename ONLY the ClientEvent envelope kind:action->tap; add CollectedEvent (visit|message|tap), TapEffect, optional per-session seq, and optional FacetTransport.record?; redefine ClientEvent as the forward subset assignable to CollectedEvent; keep the agent on ClientEvent. Scope-locked: do NOT touch FacetAction/AgentAction/onAction/the agent guard (RISK-API-6)."
    files:
      - path: "packages/core/src/protocol.ts"
        change_type: "update"
        purpose: "Rename ClientEvent envelope kind:action->tap; add CollectedEvent, TapEffect, seq? (optional wire field), FacetTransport.record?; derive ClientEvent as the forward subset assignable to CollectedEvent; agent stays on ClientEvent"
      - path: "packages/core/src/protocol.test.ts"
        change_type: "add"
        purpose: "Type-level assignability (ClientEvent subset of CollectedEvent; FacetAgent/AgentEventFrame/FacetContext stay ClientEvent) + record-boundary mapping + tap literal + seq field"
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/core typecheck"
      target: "packages/core/src/protocol.test.ts"
      justification: "Typecheck-gated, NOT a vitest run. WU-1's changes are purely type-level (rename the ClientEvent envelope discriminant; add CollectedEvent/TapEffect/seq?/FacetTransport.record? type aliases) with no runtime footprint in protocol.ts (its only runtime values, MAX_FIELD_VALUE_CHARS/MAX_FIELDS_KEYS, are unchanged). Root vitest.config.ts has no test.typecheck and there is no per-package vitest config, so vitest run strips types via esbuild and expectTypeOf/assertType/@ts-expect-error are runtime no-ops — a vitest run would PASS before implementation, making RED impossible there. Instead protocol.test.ts (written FIRST) asserts a { kind:'tap'; action } value is assignable to ClientEvent/CollectedEvent; against the un-renamed protocol.ts that line does not compile, so pnpm --filter @facet/core typecheck (which compiles src/** incl. *.test.ts) FAILS before the rename and PASSES after — the same typecheck-gated vehicle blessed for WU-8."
    quick_checks:
      - "re-run red_check (pnpm --filter @facet/core typecheck)"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src"
      - "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/core typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src"
      - "cd /Users/hoon/workspace/apps/facet && pnpm --filter @facet/core lint"
    test_plan:
      - type: "unit"
        target: "packages/core/src/protocol.test.ts"
        covers_dc: ["DC-006", "DC-004", "DC-008"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported: core typecheck FAILS pre-rename (protocol.test.ts's {kind:'tap'} assignability line does not compile), PASSES post-rename"
      - "ClientEvent assignable to CollectedEvent; FacetAgent/AgentEventFrame/FacetContext still ClientEvent; 8 importers unaffected (type-level test)"
      - "Only the ClientEvent envelope renamed — nodes.ts/validate.ts untouched (RISK-API-6)"
      - "No regression: packages/core vitest + lint"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

