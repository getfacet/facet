  - "WU-5 || WU-6 (par-2: WU-5 needs runtime.record from WU-2; WU-6 needs onRecord/record from WU-4)"
  - "WU-10 (par-3: needs WU-1 + WU-5 renamed /event validator + WU-6 renamed stub switch; WU-6 no_regression excludes quickstart.e2e.test.ts which WU-10 owns and greens)"

final_gate_chain:
  - "/verify (full pnpm typecheck + pnpm test + pnpm lint + format:check + build — the atomic-rename green assertion)"
  - "/code-review (PASS = P0-P2 = 0)"
  - "/live-test — Tier 1 (stub E2E + real bundle) always; Tier 2 BLOCKING (WU-6 touches packages/quickstart/) — missing key = FAIL; owner-run live-journey pre-merge"
  - "/update-docs (STAGE_SPEC/protocol docs if the event model is documented)"
  - "/refactor-audit (periodic; owner-run — not per-feature)"
  - "Squash -> one feature commit; commit/PR on the user's explicit go"
