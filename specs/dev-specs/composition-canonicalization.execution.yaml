feature_slug: "composition-canonicalization"
spec_path: "specs/dev-specs/composition-canonicalization.md"
context_evidence_path: "specs/context/composition-canonicalization.md"

shared_preflight:
  - concern: "prepared-worktree"
    requirement: "Reuse feat/component-model-and-layout-contract at /Users/hoon/workspace/apps/facet-wt/component-model-and-layout-contract; do not create another branch, worktree, or PR"
    owner: "main-agent"
    verification: "git branch --show-current && git status --short --branch"
  - concern: "baseline-green"
    requirement: "PATH=/opt/homebrew/bin:$PATH pnpm typecheck && pnpm test && pnpm lint pass before WU-1"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "consumer-baseline"
    requirement: "Record exact legacy identifiers plus targeted composition-related stamp/stamps hits before implementation"
    owner: "main-agent"
    verification: "run the consumer grep from specs/context/composition-canonicalization.md"
  - concern: "red-evidence-quality"
    requirement: "After test-first edits, every production WU RED must show an actual failed assertion; CLI errors, zero selected tests, no-test exits, and skipped-only output are invalid evidence"
    owner: "main-agent and WU worker"
    verification: "inspect and report raw red_check output before any production edit"
  - concern: "root-package-integrity"
    requirement: "All npm pack/install/browser-consumer work happens under one mktemp root; package.json and pnpm-lock.yaml in the worktree remain byte-identical"
    owner: "main-agent and WU-20 worker"
    verification: "hash package.json and pnpm-lock.yaml before/after the final packed smoke"

review_fix_policy:
  batching_rule: "Group review comments into batches. Scoped workers apply fixes; main agent reruns /verify and /code-review after each batch."
  subagent_scope: "Work Unit files plus quick_checks and no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "Canonical Composition Validation"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Merge both validation layers into the canonical composition type/validator, reject raw maps above 1023 nodes, and remove component-definition compatibility."
    module_shape:
      decision: "no-split"
      rationale: "Keep the shared node sanitizer single-owner in validate.ts; merged behavior shrinks total code and avoids a broad extraction."
    files:
      - path: "packages/core/core/src/validate.ts"
        change_type: "update"
        purpose: "Define FacetComposition, CompositionMetadata, CompositionValidationResult, and validateComposition; reject above 1023 raw nodes before sanitization while retaining MAX_ISSUES=64 plus one suppression tail."
      - path: "packages/core/core/src/validate.test.ts"
        change_type: "update"
        purpose: "Merge canonical validation and explicitly cover empty/null, deep/cyclic/dangling, hostile getter/proxy, 1023-node acceptance, 1024-node whole rejection, bounded issues, slot/metadata, and no-old-API behavior."
      - path: "packages/core/core/src/component-definition.ts"
        change_type: "delete"
        purpose: "Remove the duplicate public validator wrapper."
      - path: "packages/core/core/src/component-definition.test.ts"
        change_type: "delete"
        purpose: "Move its safety cases into validate.test.ts."
      - path: "packages/core/core/src/issues.ts"
        change_type: "update"
        purpose: "Align internal boundary documentation and provide a private never-throwing caught-detail normalizer: safely read string/message, remove C0/DEL/C1, cap at 256 characters, and return fixed unknown error when a message getter throws. This module remains outside the barrel."
    depends_on: []
    parallel_group: "serial-core-a"
    red_check:
      command: 'PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/validate.test.ts -t "validates canonical compositions"'
      target: "packages/core/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - 'PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/validate.test.ts -t "validates canonical compositions"'
      - "PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/validate.test.ts"
    no_regression_checks:
      - "PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/validate.test.ts"
      - 'test "$(wc -l < packages/core/core/src/validate.ts | tr -d '' '')" -le 1615 && test "$(wc -l < packages/core/core/src/validate.test.ts | tr -d '' '')" -le 2150'
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/validate.test.ts"
        covers_dc: ["DC-001", "DC-002"]
        action: "update"
        scenarios:
          - "empty/null/malformed input returns no composition and never throws"
          - "deep/cyclic/dangling graphs are pruned with MAX_DEPTH preserved"
          - "hostile getters/proxies return bounded sanitized issues"
          - "1023 raw nodes are accepted but 1024 raw nodes reject the whole composition"
          - "issue output is at most MAX_ISSUES=64 plus one suppression tail"
          - "every returned composition nodes map has a null prototype"
    done_conditions:
      - "RED→GREEN evidence reported"
      - "Both previous validation safety layers survive under one canonical result shape"
      - "No stamp or component-definition public validator remains in the touched files"
      - "validate.ts <=1615 and validate.test.ts <=2150 lines; exceeding either ceiling stops implementation for re-planning"
    handoff_format: &handoff
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Canonical Composition Expansion"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Publish CompositionParams, ExpandAt, UseCompositionResult, ExpandCompositionResult, ExpandCompositionOptions, and expandComposition without a shim, preserving bounded zero-partial behavior."
    module_shape:
      decision: "public-surface"
      rationale: "The existing expander is cohesive; rename source/test in place and retain its dependency-free boundary."
    files:
      - path: "packages/core/core/src/expand-stamp.ts"
        change_type: "delete"
        purpose: "Remove the old expansion implementation path."
      - path: "packages/core/core/src/expand-stamp.test.ts"
        change_type: "delete"
        purpose: "Remove the old-named behavior suite."
      - path: "packages/core/core/src/expand-composition.ts"
        change_type: "add"
        purpose: "Export exactly CompositionParams, ExpandAt, UseCompositionResult, ExpandCompositionResult, ExpandCompositionOptions, and expandComposition; import but never re-export the private error normalizer; cap output at 1023 nodes, existing ids at 5000, total mint attempts at 4096, issues at MAX_ISSUES+1, and fail atomically."
      - path: "packages/core/core/src/expand-composition.test.ts"
        change_type: "add"
        purpose: "Start with an existsSync assertion before dynamic import/AST access so RED is an assertion failure while the source is absent; then port behavior, assert exact six exports, reject star/default/extras, and cover malformed/over-cap/infinite/throwing existingIds, throwing/colliding mintId, a message getter that throws, 256-character post-sanitize cap, C0/DEL/C1 removal, sentinel non-disclosure, partial-mint failure, global work caps, target stripping, and zero-partial output."
    depends_on: ["WU-1"]
    parallel_group: "serial-core-b"
    red_check:
      command: 'PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/expand-composition.test.ts -t "bounds hostile expansion work"'
      target: "packages/core/core/src/expand-composition.test.ts"
      justification: ""
    quick_checks:
      - 'PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/expand-composition.test.ts -t "bounds hostile expansion work"'
      - "PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/expand-composition.test.ts"
    no_regression_checks:
      - "PATH=/opt/homebrew/bin:$PATH pnpm exec vitest run packages/core/core/src/expand-composition.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/expand-composition.test.ts"
        covers_dc: ["DC-001", "DC-003"]
        action: "new"
        scenarios:
          - "TypeScript AST sees exactly CompositionParams, ExpandAt, UseCompositionResult, ExpandCompositionResult, ExpandCompositionOptions, and expandComposition with no export-star/default/extra declaration"
          - "external action targets are stripped before remap"
          - "5000 yielded existing ids succeed; the 5001st, malformed, infinite, or throwing iterable returns a bounded no-op"
          - "fresh-id success on the 4096th total attempt succeeds; a required 4097th attempt and throwing/colliding mintId return a bounded no-op"
          - "outer and mint catches survive an exception whose message getter throws, reveal no sentinel, remove every C0/DEL/C1 control, and retain at most 256 detail characters"
          - "a mint failure after earlier ids were tentatively allocated returns empty nodes/slots/ids and no root or patch intent"
          - "reachable output above 1023 nodes and every other failure emits zero nodes/ops"
          - "success and failure issue arrays never exceed MAX_ISSUES=64 plus one suppression tail"
    done_conditions:
      - "RED→GREEN evidence reported"
      - "Pre-implementation output is an actual existsSync/expected-export assertion failure, never a missing-module loader error"
      - "Expansion failures emit no partial node set or patch intent"
      - "The AST reports exactly the six locked canonical exports; no helper/star/default/extra export is present; old source/test files and old exported type names are absent"
    handoff_format: *handoff

