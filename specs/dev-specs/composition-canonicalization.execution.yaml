        purpose: "Test canonical suffix, ignored old suffixes, sorting, 4096/4097 bounded enumeration with exact cap+1 stop and zero asset opens/decodes/parses plus safe loadAssets boot fallback, 1024/1025 file boundaries per collection, parse failures, 1048576/1048577-byte boundary, and an initial-1-MiB file-growth race rejected before decode/parse."
