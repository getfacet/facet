        purpose: "Cover defaults/customs/caps/hostile input/dedupe/shadow and old-field ignore."
      - path: "packages/core/runtime/src/file-assets.ts"
        change_type: "update"
        purpose: "Replace full readdirSync materialization with bounded opendirSync/Dir.readSync discovery: cap 4096, read entry 4097 only to detect overflow, stop+close and return empty raw documents with a bounded issue before any asset file open/decode/parse. On success sort bounded names, open at most 1024 theme and 1024 composition files, bounded-read at most cap+1=1048577 bytes, accept exactly 1048576, reject 1048577 before UTF-8 decode/JSON.parse even after an initial 1 MiB stat, avoid unsafe raw exception interpolation, and ignore old suffixes."
      - path: "packages/core/runtime/src/file-assets.test.ts"
