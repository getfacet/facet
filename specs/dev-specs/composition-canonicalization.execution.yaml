  - id: "WU-20"
    title: "Release, Semantic, And Packed Integration Closure"
    owner_role: "subagent"
    packages:
      [
        "changesets",
        "@facet/core",
        "@facet/assets",
        "@facet/runtime",
        "@facet/server",
        "@facet/agent-tools",
        "@facet/reference-agent",
        "@facet/quickstart",
        "@facet/agent",
        "@facet/store-postgres",
      ]
    objective: "Finish release-note migration, semantically validate the exact eight-package minor changeset and occurrence-level legacy closure, then run the final nine-package build/browser/packed-consumer smoke."
    module_shape:
      decision: "preserve"
      rationale: "Keep relevant pending notes, delete the obsolete standalone expansion note, and add one canonical feature changeset. Occurrence/YAML self-checks remain manifest-local verification commands, so final integration adds no repo helper or second owner file."
    files:
      - path: ".changeset/polished-brick-rendering-contracts.md"
        change_type: "update"
        purpose: "Canonical component/catalog wording."
      - path: ".changeset/postgres-assets-v1.md"
        change_type: "update"
        purpose: "Canonical compositions JSONB wording."
      - path: ".changeset/stamp-expand-v1.md"
        change_type: "delete"
        purpose: "Remove obsolete unreleased API note superseded by canonicalization."
      - path: ".changeset/unified-asset-pipeline.md"
        change_type: "update"
        purpose: "Canonical unified composition asset pipeline wording."
      - path: ".changeset/composition-canonicalization.md"
        change_type: "add"
        purpose: "Minor release note for all eight affected packages and the intentional no-alias migration."
    depends_on: ["WU-19"]
    parallel_group: "serial-20"
    red_check:
      command: "N/A"
      target: ".changeset/polished-brick-rendering-contracts.md .changeset/postgres-assets-v1.md .changeset/stamp-expand-v1.md .changeset/unified-asset-pipeline.md .changeset/composition-canonicalization.md"
      justification: "Release-note-only WU; blocking repo semantic checks and Changesets validation are the verification."
    quick_checks:
      - |
        node <<'NODE'
        const assert = require("node:assert/strict");
        const { execFileSync } = require("node:child_process");
        const fs = require("node:fs");

        const globallyAllowedTokens = new Set([
          "timestamp",
          "timestamps",
          "timestamptz",
          "stampedframe",
          "stamped",
          "stamping",
          "unstamped",
          "stampedseed",
        ]);
        const rules = [
          { path: "packages/core/core/src/nodes.ts", token: "stamps", after: " the canonical" },
          { path: "packages/agent-stack/quickstart/e2e/journey/journey.ts", token: "stamp", before: "data-facet-field-id " },
          { path: "packages/core/client/src/sse-transport.ts", token: "stamp", after: " the send-order" },
          { path: "packages/core/server/src/server.ts", token: "stamps", before: "snapshot ", after: " (" },
          { path: "packages/core/server/src/server.ts", token: "stamp", after: " a per-visitor" },
          { path: "packages/core/server/src/sse.ts", token: "stamps", after: " `<era>:<seq>`" },
          { path: "packages/core/server/src/frame-log.ts", token: "stamps", before: "`eventCounter` ", after: " each" },
          { path: "packages/core/server/src/frame-log.ts", token: "stamp", after: " the next" },
          { path: "packages/core/server/src/frame-log.test.ts", token: "stamps", after: " <era>:<seq> on append" },
          { path: "packages/core/react/src/StageRenderer.tsx", token: "stamp", after: " several inputs" },
          { path: "packages/core/react/src/StageRenderer.interaction.test.tsx", token: "stamps", after: " the canonical kind" },
          { path: "packages/extensions/ag-ui/README.md", token: "stamps", after: " a monotonic" },
          { path: "packages/extensions/agent-client/src/connect.ts", token: "stamps", after: " lastHeartbeat" },
        ].map((rule) => ({ ...rule, hits: 0 }));

        function findings(path, text, countRuleHits) {
          const failures = [];
          for (const match of text.matchAll(/stamp/gi)) {
            const start = match.index;
            let wordStart = start;
            let wordEnd = start + match[0].length;
            while (wordStart > 0 && /[A-Za-z0-9_]/.test(text[wordStart - 1])) wordStart--;
            while (wordEnd < text.length && /[A-Za-z0-9_]/.test(text[wordEnd])) wordEnd++;
            const token = text.slice(wordStart, wordEnd).toLowerCase();
            if (globallyAllowedTokens.has(token)) continue;

            const rule = rules.find((candidate) => {
              if (candidate.path !== path || candidate.token !== token) return false;
              const before = candidate.before ?? "";
              const after = candidate.after ?? "";
              return (
                text.slice(Math.max(0, wordStart - before.length), wordStart) === before &&
                text.slice(wordEnd, wordEnd + after.length) === after
              );
            });
            if (rule !== undefined) {
              if (countRuleHits) rule.hits++;
              continue;
            }

            const line = text.slice(0, start).split("\n").length;
            const lineStart = text.lastIndexOf("\n", start - 1) + 1;
            const lineEndRaw = text.indexOf("\n", start);
            const lineEnd = lineEndRaw === -1 ? text.length : lineEndRaw;
            failures.push(`${path}:${line}:${start - lineStart + 1}:${text.slice(lineStart, lineEnd)}`);
          }
          return failures;
        }

        assert.deepEqual(findings("fixture", "timestamp StampedFrame stamped", false), []);
        assert.notDeepEqual(findings("fixture", "timestamp + stamps", false), []);
        assert.notDeepEqual(findings("fixture", "StampedFrame + DEFAULT_STAMPS", false), []);
        assert.notDeepEqual(
          findings(
            "packages/core/core/src/nodes.ts",
            "* stamps the canonical kind while trailing use_stamp remains",
            false,
          ),
          [],
        );

        const raw = execFileSync(
          "git",
          [
            "ls-files",
            "-z",
            "--cached",
            "--others",
            "--exclude-standard",
            "--",
            "packages",
            "apps",
            "README.md",
            "AGENTS.md",
            "docs",
            ".changeset",
          ],
        );
        const files = raw.toString("utf8").split("\0").filter(Boolean);
        const failures = [];
        for (const path of files) {
          if (!fs.existsSync(path)) continue;
          const bytes = fs.readFileSync(path);
          if (bytes.includes(0)) continue;
          failures.push(...findings(path, bytes.toString("utf8"), true));
        }
        for (const rule of rules) {
          if (rule.hits !== 1) failures.push(`allow-list entry consumed ${rule.hits} times: ${rule.path}:${rule.token}`);
        }
        if (failures.length > 0) {
          console.error(failures.join("\n"));
          process.exit(1);
        }
        NODE
      - "! rg -n 'FacetStamp|StampMetadata|StampValidationResult|validateStamp|expandStamp|ExpandStamp|StampParams|UseStamp|DEFAULT_STAMPS|use_stamp|useStamp|invalid_stamp|componentDefinitions|FacetComponentDefinition|ComponentDefinitionValidationResult|validateComponentDefinition|component-definition|CatalogStampsPolicy|CatalogLegacyUsageOrder|componentOrder|MAX_STAMP_|\\.stamp\\.json|\\.component\\.json|stamps\\.js' packages apps README.md AGENTS.md docs .changeset"
      - "test ! -e packages/core/core/src/expand-stamp.ts && test ! -e packages/core/core/src/expand-stamp.test.ts && test ! -e packages/core/core/src/component-definition.ts && test ! -e packages/core/core/src/component-definition.test.ts && test ! -e packages/core/assets/src/stamps.ts && test ! -e packages/core/assets/src/stamps.test.ts"
      - 'for f in specs/feature-intake/component-model-and-layout-contract.md specs/context/component-model-and-layout-contract.md specs/dev-specs/component-model-and-layout-contract.md specs/dev-specs/component-model-and-layout-contract.execution.yaml; do rg -q ''composition-canonicalization'' "$f" && ! rg -qi ''stamp'' "$f" || exit 1; done'
      - |
        node <<'NODE'
        const assert = require("node:assert/strict");
        const fs = require("node:fs");
        const { createRequire } = require("node:module");
        const fromChangesetsCli = createRequire(require.resolve("@changesets/cli/package.json"));
        const parse = fromChangesetsCli("@changesets/parse").default;
        const wanted = [
          "@facet/agent",
          "@facet/agent-tools",
          "@facet/assets",
          "@facet/core",
          "@facet/quickstart",
          "@facet/reference-agent",
          "@facet/runtime",
          "@facet/store-postgres",
        ].sort();

        function validate(text) {
          const parsed = parse(text);
          const names = parsed.releases.map(({ name }) => name).sort();
          assert.equal(parsed.releases.length, 8);
          assert.equal(new Set(names).size, 8);
          assert.deepEqual(names, wanted);
          assert.ok(parsed.releases.every(({ type }) => type === "minor"));
        }

        validate(fs.readFileSync(".changeset/composition-canonicalization.md", "utf8"));
        const mixedQuotes = `---
        '@facet/agent': minor
        "@facet/agent-tools": minor
        '@facet/assets': minor
        "@facet/core": minor
        '@facet/quickstart': minor
        "@facet/reference-agent": minor
        '@facet/runtime': minor
        "@facet/store-postgres": minor
        ---
        fixture
        `;
        assert.doesNotThrow(() => validate(mixedQuotes));
        assert.throws(() => validate(mixedQuotes.replace("---\nfixture", "'@facet/rogue': minor\n---\nfixture")));
        assert.throws(() => validate(mixedQuotes.replace("'@facet/agent': minor", "'@facet/agent': major")));
        assert.throws(() => validate(mixedQuotes.replace("'@facet/assets': minor", "'@facet/assets': patch")));
        assert.throws(() => validate(mixedQuotes.replace("'@facet/agent': minor", "'@facet/agent': minor\n\"@facet/agent\": minor")));
        NODE
      - "PATH=/opt/homebrew/bin:$PATH pnpm exec changeset status"
    no_regression_checks:
      - "PATH=/opt/homebrew/bin:$PATH pnpm exec prettier --check .changeset/polished-brick-rendering-contracts.md .changeset/postgres-assets-v1.md .changeset/unified-asset-pipeline.md .changeset/composition-canonicalization.md"
      - "test ! -e .changeset/stamp-expand-v1.md"
      - "PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/core build && PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/assets build && PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/runtime build && PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/server build && PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/agent-tools build && PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/reference-agent build && PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/quickstart build && PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/agent build && PATH=/opt/homebrew/bin:$PATH pnpm --filter @facet/store-postgres build"
      - |
        set -eu
        ROOT=$PWD
        BEFORE=$(shasum -a 256 "$ROOT/package.json" "$ROOT/pnpm-lock.yaml")
        TEMP_ROOT=$(mktemp -d)
        PACK_DIR=$TEMP_ROOT/packs
        CONSUMER=$TEMP_ROOT/consumer
        mkdir -p "$PACK_DIR" "$CONSUMER"
        finish() {
          status=$?
          AFTER=$(shasum -a 256 "$ROOT/package.json" "$ROOT/pnpm-lock.yaml")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "worktree package metadata changed during packed smoke" >&2
            status=1
          fi
          rm -rf "$TEMP_ROOT"
          trap - EXIT
          exit "$status"
        }
        trap finish EXIT

        for dir in \
          packages/core/core \
          packages/core/assets \
          packages/core/runtime \
          packages/core/server \
          packages/agent-stack/agent-tools \
          packages/agent-stack/reference-agent \
          packages/agent-stack/quickstart \
          packages/extensions/agent \
          packages/extensions/store-postgres
        do
          PATH=/opt/homebrew/bin:$PATH pnpm -C "$dir" pack --pack-destination "$PACK_DIR" >/dev/null
        done
        test "$(find "$PACK_DIR" -name '*.tgz' | wc -l | tr -d ' ')" = 9
        (
          cd "$CONSUMER"
          npm init -y >/dev/null
          npm install --ignore-scripts --legacy-peer-deps --package-lock=false "$PACK_DIR"/*.tgz >/dev/null
        )

        CONSUMER_FILE=$CONSUMER/consumer.mts node <<'NODE'
        const fs = require("node:fs");
        fs.writeFileSync(
          process.env.CONSUMER_FILE,
