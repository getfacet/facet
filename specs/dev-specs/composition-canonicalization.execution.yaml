  - id: "WU-6"
    title: "Unified Runtime Composition Assets"
    owner_role: "subagent"
    packages: ["@facet/runtime"]
    objective: "Expose one compositions input/output/loop and canonical suffix, enumerate at most 4097 directory entries for a 4096 cap, open at most 1024 sorted files per collection after discovery succeeds, and read at most 1048577 bytes per file."
    module_shape:
      decision: "preserve"
      rationale: "Collapse duplicate paths in assets.ts and add a focused file loader test; avoid a generic loader abstraction."
    files:
      - path: "packages/core/runtime/src/assets.ts"
