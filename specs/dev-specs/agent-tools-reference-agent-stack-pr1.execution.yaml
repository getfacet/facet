# Execution Manifest: Agent Tools and Reference Agent Stack PR1
#
# Keep synchronized with specs/dev-specs/agent-tools-reference-agent-stack-pr1.md.

feature_slug: "agent-tools-reference-agent-stack-pr1"
spec_path: "specs/dev-specs/agent-tools-reference-agent-stack-pr1.md"
context_evidence_path: "specs/context/agent-tools-reference-agent-stack.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts when possible"
    owner: "main-agent"
    verification: "run the three commands in the prepared worktree"
  - concern: "workspace-paths"
    requirement: "after package moves, run pnpm install so pnpm-lock.yaml importer paths match grouped packages"
    owner: "main-agent"
    verification: "pnpm install"

review_fix_policy:
  batching_rule: "Group review comments into batches. Apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "Move Core Package Group A"
    owner_role: "main-agent"
    packages: ["@facet/core", "@facet/assets", "@facet/runtime", "@facet/server", "@facet/client"]
    objective: "Move five core package directories under packages/core/ and update their internal tsconfig/manifests for the new depth."
    files:
      - path: "packages/core -> packages/core/core"
        change_type: "update"
        purpose: "Move/update core contract package"
      - path: "packages/assets -> packages/core/assets"
        change_type: "update"
        purpose: "Move/update node-free assets package"
      - path: "packages/runtime -> packages/core/runtime"
        change_type: "update"
        purpose: "Move/update runtime package"
      - path: "packages/server -> packages/core/server"
        change_type: "update"
        purpose: "Move/update reference transport package"
      - path: "packages/client -> packages/core/client"
        change_type: "update"
        purpose: "Move/update browser transport package"
    depends_on: []
    parallel_group: "serial-migration"
    red_check:
      command: 'node -e ''const fs=require("fs"); for (const p of ["packages/core/core","packages/core/assets","packages/core/runtime","packages/core/server","packages/core/client"]) { const pkg=JSON.parse(fs.readFileSync(`${p}/package.json`,"utf8")); if (pkg.repository?.directory!==p) throw new Error(`${p} repository.directory`); const ts=JSON.parse(fs.readFileSync(`${p}/tsconfig.json`,"utf8")); if (ts.extends!=="../../../tsconfig.base.json") throw new Error(`${p} tsconfig extends`); }'''
      target: "grouped package manifests/tsconfigs"
      justification: ""
    quick_checks:
      - 'node -e ''const fs=require("fs"); for (const p of ["packages/core/core","packages/core/assets","packages/core/runtime","packages/core/server","packages/core/client"]) { const pkg=JSON.parse(fs.readFileSync(`${p}/package.json`,"utf8")); if (pkg.repository?.directory!==p) throw new Error(`${p} repository.directory`); const ts=JSON.parse(fs.readFileSync(`${p}/tsconfig.json`,"utf8")); if (ts.extends!=="../../../tsconfig.base.json") throw new Error(`${p} tsconfig extends`); }'''
      - "test -f packages/core/core/package.json"
      - "test -f packages/core/assets/package.json"
      - "test -f packages/core/runtime/package.json"
      - "test -f packages/core/server/package.json"
      - "test -f packages/core/client/package.json"
    no_regression_checks:
      - "covered by WU-4 path config checks and final /verify"
    test_plan:
      - type: "integration"
        target: "find packages/core -mindepth 2 -maxdepth 2 -name package.json"
        covers_dc: ["DC-001", "DC-010"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported"
      - "Move paths exist and old flat paths are gone"
      - "Each moved package manifest repository.directory points to the grouped path"
      - "Each moved package tsconfig extends ../../../tsconfig.base.json"
    handoff_format: &handoff
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

