      - '! rg -n "node packages/quickstart|packages/reference-agent|packages/quickstart" packages/agent-stack/reference-agent/README.md packages/agent-stack/quickstart/README.md'
    no_regression_checks:
      - "pnpm lint"
    test_plan:
      - type: "integration"
        target: "changeset frontmatter"
        covers_dc: ["DC-001", "DC-009", "DC-010"]
        action: "new"
    done_conditions:
      - "N/A red_check acknowledged: docs/release metadata only"
      - "Package docs explain @facet/agent-tools vs @facet/reference-agent"
      - "Quickstart dev command paths use grouped directories"
      - "Changeset includes @facet/agent-tools, @facet/reference-agent, and @facet/quickstart"
    handoff_format: *handoff

execution_order:
  - "WU-1"
  - "WU-2"
  - "WU-3"
  - "WU-4"
  - "(WU-5 -> WU-10) || (WU-6 -> WU-7 -> WU-8 -> WU-9 -> WU-11)"
