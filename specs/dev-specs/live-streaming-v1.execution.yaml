# Execution Manifest: Live Streaming v1 (per-step stage delivery)
#
# Keep synchronized with specs/dev-specs/live-streaming-v1.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "live-streaming-v1"
spec_path: "specs/dev-specs/live-streaming-v1.md"
context_evidence_path: "specs/context/live-streaming-v1.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; playground buildable; no live server/provider key needed (all WUs are unit/integration vitest; quickstart uses a stub provider)"
    owner: "main-agent"
    verification: "pnpm install && pnpm -C apps/playground build"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"

work_units:
  - id: "WU-1"
    title: "Core contract union + shared normalize helpers"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Widen FacetAgent to the async-capable union and add the two pure normalize helpers every call site shares."
    files:
      - path: "packages/core/src/agent-result.ts"
        change_type: "add"
        purpose: "FacetAgentResult union + iterateAgentResult() + collectMessages()."
      - path: "packages/core/src/protocol.ts"
        change_type: "update"
        purpose: "FacetAgent return type -> FacetAgentResult."
      - path: "packages/core/src/index.ts"
        change_type: "update"
        purpose: "Barrel-export the new agent-result module."
      - path: "packages/core/src/agent-result.test.ts"
        change_type: "add"
        purpose: "Unit tests for the normalize helpers."
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "pnpm -C packages/core exec vitest run src/agent-result.test.ts"
      target: "packages/core/src/agent-result.test.ts"
      justification: ""
    quick_checks:
      - "pnpm -C packages/core exec vitest run src/agent-result.test.ts"
      - "pnpm -C packages/core exec vitest run src/protocol.test.ts"
    no_regression_checks:
      - "pnpm -C packages/core test"
      - "pnpm typecheck"
    test_plan:
      - type: "unit"
        target: "packages/core/src/agent-result.test.ts"
        covers_dc: ["DC-008"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "iterateAgentResult normalizes array | Promise | AsyncIterable into a batch iterable; collectMessages returns one flat array with order preserved"
      - "Union widening compiles with no producer edits"
      - "No regression: pnpm -C packages/core test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Streaming producer in @facet/agent (drain flush + defineStreamingAgent)"
    owner_role: "subagent"
    packages: ["@facet/agent"]
    objective: "Make Stage.flush() drain-and-reset and add defineStreamingAgent (async-generator producer yielding a batch per step) while keeping defineAgent single-flush."
    files:
      - path: "packages/agent/src/stage.ts"
        change_type: "update"
        purpose: "flush() resets out after returning (delta semantics)."
      - path: "packages/agent/src/define-agent.ts"
        change_type: "update"
        purpose: "Add defineStreamingAgent; keep defineAgent unchanged."
      - path: "packages/agent/src/index.ts"
        change_type: "update"
        purpose: "Export defineStreamingAgent."
      - path: "packages/agent/src/stage.test.ts"
        change_type: "update"
        purpose: "Repeated-flush delta test."
      - path: "packages/agent/src/define-agent.test.ts"
        change_type: "add"
        purpose: "DC-004 back-compat + streaming producer tests."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm -C packages/agent exec vitest run src/define-agent.test.ts -t 'streaming'"
      target: "packages/agent/src/define-agent.test.ts"
      justification: ""
    quick_checks:
      - "pnpm -C packages/agent exec vitest run src/define-agent.test.ts -t 'streaming'"
      - "pnpm -C packages/agent exec vitest run src/stage.test.ts"
    no_regression_checks:
      - "pnpm -C packages/agent test"
      - "pnpm typecheck"
    test_plan:
      - type: "unit"
        target: "packages/agent/src/define-agent.test.ts"
        covers_dc: ["DC-004"]
        action: "new"
      - type: "unit"
        target: "packages/agent/src/stage.test.ts"
        covers_dc: ["DC-004"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Repeated flush() yields only the delta since the last flush; defineAgent still emits ONE final batch (DC-004)"
      - "defineStreamingAgent yields one non-empty batch per step boundary + a turn-end tail; empty flushes skipped"
      - "No regression: pnpm -C packages/agent test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-3"
    title: "Runtime streaming turn driver"
    owner_role: "subagent"
    packages: ["@facet/runtime"]
    objective: "Drive the agent's batches inside the serial lane -- per-batch fold+save+deliver, ONE Sink record (accumulated), ONE seed on the first non-empty batch, aggregate agentMutated, fail-safe mid-stream throw."
    files:
      - path: "packages/runtime/src/runtime.ts"
        change_type: "update"
        purpose: "handle(visitor, event, onFrame?); streamTurn loop replacing the single persistWithSeed call; unify applyMessages (single-batch) through it; decouple record from per-batch save."
      - path: "packages/runtime/src/runtime.test.ts"
        change_type: "update"
        purpose: "DC-001/002/003(runtime)/005/006 coverage."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm -C packages/runtime exec vitest run src/runtime.test.ts -t 'stream'"
      target: "packages/runtime/src/runtime.test.ts"
      justification: ""
    quick_checks:
      - "pnpm -C packages/runtime exec vitest run src/runtime.test.ts -t 'stream'"
      - "pnpm -C packages/runtime exec vitest run src/runtime.test.ts"
    no_regression_checks:
      - "pnpm -C packages/runtime test"
      - "pnpm typecheck"
    test_plan:
      - type: "unit"
        target: "packages/runtime/src/runtime.test.ts"
        covers_dc: ["DC-001", "DC-002", "DC-003", "DC-005", "DC-006"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "N-batch turn => N onFrame deliveries in yield order; final stage = fold of all batches (DC-001/002)"
      - "Exactly ONE StoredEvent/turn whose messages == fold-order concatenation (DC-006); mid-stream throw records accumulated-so-far, keeps saved partials, no crash (DC-005)"
      - "Seed frame prepended to first non-empty batch ONLY; pendingSeeds consumed once at turn end; agentMutated = OR across batches; applyMessages late path still single-batch and correct"
      - "No regression: pnpm -C packages/runtime test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-4"
    title: "Server in-lane streaming delivery + remote-boundary conformance"
    owner_role: "subagent"
    packages: ["@facet/server"]
    objective: "Deliver each yielded batch inside the lane task via a callback into handle; make the remote/fallback agents conform to the union (single batch, no cross-boundary streaming)."
    files:
      - path: "packages/server/src/server.ts"
        change_type: "update"
        purpose: "Lane task passes onFrame = (m) => deliver(visitorId, m) into runtime.handle; drop the redundant post-turn deliver; recordApplied still fires once on aggregate agentMutated."
      - path: "packages/server/src/agent-channel.ts"
        change_type: "update"
        purpose: "remoteAgent/fallbacks conform to FacetAgentResult by resolving exactly once (single-batch remote turn)."
      - path: "packages/server/src/server.test.ts"
        change_type: "update"
        purpose: "DC-003 ordering + parallel visitors + late-apply-enqueues-behind."
    depends_on: ["WU-3"]
    parallel_group: "par-2"
    red_check:
      command: "pnpm -C packages/server exec vitest run src/server.test.ts -t 'stream'"
      target: "packages/server/src/server.test.ts"
      justification: ""
    quick_checks:
      - "pnpm -C packages/server exec vitest run src/server.test.ts -t 'stream'"
      - "pnpm -C packages/server exec vitest run src/server.test.ts"
    no_regression_checks:
      - "pnpm -C packages/server test"
      - "pnpm typecheck"
    test_plan:
      - type: "integration"
        target: "packages/server/src/server.test.ts"
        covers_dc: ["DC-003"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "N batches fan out in yield order with monotonic era:seq, all inside the one lane task; a same-visitor late apply lands after them; different visitors stay parallel (DC-003)"
      - "recordApplied fires exactly once/turn on aggregate agentMutated; remote agent-client turn stays single-batch (RISK-API-2 non-goal honored)"
      - "No regression: pnpm -C packages/server test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-5"
    title: "Non-streaming boundary normalization (agent-client + bridge)"
    owner_role: "subagent"
    packages: ["@facet/agent-client", "@facet/bridge"]
    objective: "Collapse the widened union to a single batch at the two boundaries that await the agent, so pnpm typecheck (DC-008) passes and behavior is unchanged."
    files:
      - path: "packages/agent-client/src/connect.ts"
        change_type: "update"
        purpose: "collectMessages(agent(...)) before sendControl."
      - path: "packages/bridge/src/bridge.ts"
        change_type: "update"
        purpose: "collectMessages(driver.agent(...)) before reading .length."
      - path: "packages/agent-client/src/connect.test.ts"
        change_type: "update"
        purpose: "An AsyncIterable-returning agent collapses to one control batch."
      - path: "packages/bridge/src/bridge.collect.test.ts"
        change_type: "add"
        purpose: "Union agent collapses to one batch (.length correct)."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm -C packages/agent-client exec vitest run src/connect.test.ts -t 'collect'"
      target: "packages/agent-client/src/connect.test.ts"
      justification: ""
    quick_checks:
      - "pnpm -C packages/agent-client exec vitest run src/connect.test.ts -t 'collect'"
      - "pnpm -C packages/bridge exec vitest run src/bridge.collect.test.ts"
    no_regression_checks:
      - "pnpm -C packages/agent-client test"
      - "pnpm -C packages/bridge test"
      - "pnpm typecheck"
    test_plan:
      - type: "unit"
        target: "packages/agent-client/src/connect.test.ts"
        covers_dc: ["DC-008"]
        action: "update"
      - type: "unit"
        target: "packages/bridge/src/bridge.collect.test.ts"
        covers_dc: ["DC-008"]
        action: "new"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Both boundaries collapse any union form to one flat batch; pnpm typecheck green (DC-008)"
      - "No regression: pnpm -C packages/agent-client test, pnpm -C packages/bridge test"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-6"
    title: "Quickstart per-step streaming + forward-ref closure buffer"
    owner_role: "subagent"
    packages: ["@facet/quickstart"]
    objective: "Yield one batch per provider step via defineStreamingAgent, emitting only referentially-closed batches (forward child-refs held until their target node exists)."
    files:
      - path: "packages/quickstart/src/agent.ts"
        change_type: "update"
        purpose: "createQuickstartAgent uses defineStreamingAgent; yield after each provider step; closure buffer defers set_node/render_page ops with unknown child ids until closure / turn-end tail."
      - path: "packages/quickstart/src/agent.test.ts"
        change_type: "update"
        purpose: "DC-007 (3-step turn => 3 batches) + RISK-INV-1(c) split-forward-ref test."
    depends_on: ["WU-2"]
    parallel_group: "par-2"
    red_check:
      command: "pnpm -C packages/quickstart exec vitest run src/agent.test.ts -t 'per-step'"
      target: "packages/quickstart/src/agent.test.ts"
      justification: ""
    quick_checks:
      - "pnpm -C packages/quickstart exec vitest run src/agent.test.ts -t 'per-step'"
      - "pnpm -C packages/quickstart exec vitest run src/agent.test.ts"
    no_regression_checks:
      - "pnpm -C packages/quickstart test"
      - "pnpm typecheck"
    test_plan:
      - type: "unit"
        target: "packages/quickstart/src/agent.test.ts"
        covers_dc: ["DC-007"]
        action: "update"
    done_conditions:
      - "RED->GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "A 3-step stub turn yields 3 batches (one per provider step) (DC-007)"
      - "set_node with forward child refs split across steps => the ref op is deferred and delivered WITH its target node (no orphan, no loss) -- RISK-INV-1(c)"
      - "No regression: pnpm -C packages/quickstart test; quickstart.e2e.test.ts unaffected"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"
