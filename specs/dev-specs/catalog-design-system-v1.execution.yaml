# Execution Manifest: Catalog + Design System v1
#
# Keep synchronized with specs/dev-specs/catalog-design-system-v1.md
# (WU ids, files, deps, checks). Final gate source of truth:
# AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "catalog-design-system-v1"
spec_path: "specs/dev-specs/catalog-design-system-v1.md"
context_evidence_path: "specs/context/catalog-design-system-v1.md"

shared_preflight:
  - concern: "isolated-worktree"
    requirement: "/worktree-prep creates an isolated feat/catalog-design-system-v1 worktree after owner approval"
    owner: "main-agent"
    verification: "git status --short --branch in the prepared worktree"
  - concern: "dependencies"
    requirement: "pnpm install completes in the prepared worktree"
    owner: "main-agent"
    verification: "pnpm install"
  - concern: "baseline-green"
    requirement: "pnpm typecheck, pnpm test, and pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "pnpm typecheck && pnpm test && pnpm lint"
  - concern: "package-boundary-import-guard"
    requirement: "core/assets/agent-tools must not import downstream runtime/react/server/client/reference packages"
    owner: "main-agent"
    verification: '! rg -n ''from "@facet/(react|runtime|reference-agent|quickstart|server|client|runtime/node)"'' packages/core/core packages/core/assets packages/agent-stack/agent-tools'
  - concern: "dirty-worktree-policy"
    requirement: "carry only approved spec artifacts into the feature worktree and ignore unrelated untracked AG UI spec artifacts from main"
    owner: "main-agent"
    verification: "git status --short before implementation"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
post_gate_release_note: "Squash into one feature commit and commit/PR only on the user's explicit go."
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "package-boundary import guard"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-01"
    title: "Core Theme Tokens And Recipes"
    owner_role: "main-agent"
    packages: ["@facet/core"]
    objective: "Add token/recipe vocabulary required by design-system themes while keeping tree-authored style token-only."
    files:
      - path: "packages/core/core/src/tokens.ts"
        change_type: "update"
        purpose: "Add semantic/chart color names and shadow token vocabulary."
      - path: "packages/core/core/src/theme.ts"
        change_type: "update"
        purpose: "Add validated recipes support and token validation for recipe style bundles."
      - path: "packages/core/core/src/theme.test.ts"
        change_type: "update"
        purpose: "Cover valid recipes, dropped bad recipes, raw CSS rejection, and default compatibility."
    depends_on: []
    parallel_group: "par-core-a"
    red_check:
      command: 'pnpm exec vitest run packages/core/core/src/theme.test.ts -t "component recipes"'
      target: "packages/core/core/src/theme.test.ts"
      justification: ""
    quick_checks:
      - 'pnpm exec vitest run packages/core/core/src/theme.test.ts -t "component recipes"'
      - "pnpm --filter @facet/core typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src/theme.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/theme.test.ts"
        covers_dc: ["DC-003", "DC-010"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported."
      - "Recipes are preserved only when component/variant/style tokens validate."
      - "No raw CSS/scalar style escape hatch is introduced."
    handoff_format: &handoff
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-02"
    title: "Core High-Level Nodes, Validation, Stamp Metadata, And STAGE_SPEC"
    owner_role: "main-agent"
    packages: ["@facet/core"]
    objective: "Expand the core stage protocol with v1 high-level nodes, bounded data-brick validation, stamp metadata, shared container helpers, and universal STAGE_SPEC docs."
    files:
      - path: "packages/core/core/src/nodes.ts"
        change_type: "update"
        purpose: "Add v1 node types and shared isContainer/child reference helpers."
      - path: "packages/core/core/src/validate.ts"
        change_type: "update"
        purpose: "Sanitize high-level nodes and bounded stamp metadata."
      - path: "packages/core/core/src/validate.test.ts"
        change_type: "update"
        purpose: "Cover each node group, data caps, malformed input, primitive fallback, and metadata."
      - path: "packages/core/core/src/spec.ts"
        change_type: "update"
        purpose: "Document universal v1 node vocabulary."
      - path: "packages/core/core/src/spec.test.ts"
        change_type: "update"
        purpose: "Pin high-level vocabulary and no raw CSS/HTML policy."
    depends_on: ["WU-01"]
    parallel_group: "serial-core-contract"
    red_check:
      command: 'pnpm exec vitest run packages/core/core/src/validate.test.ts -t "high-level bricks"'
      target: "packages/core/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - 'pnpm exec vitest run packages/core/core/src/validate.test.ts -t "high-level bricks"'
      - "pnpm exec vitest run packages/core/core/src/spec.test.ts"
      - "pnpm --filter @facet/core typecheck"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src/validate.test.ts packages/core/core/src/spec.test.ts"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/validate.test.ts"
        covers_dc: ["DC-005", "DC-006", "DC-007", "DC-010"]
        action: "update"
      - type: "unit"
        target: "packages/core/core/src/spec.test.ts"
        covers_dc: ["DC-011"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported."
      - "Existing primitive trees still validate unchanged."
      - "Oversized table/chart/list payloads are capped before renderer use."
    handoff_format: *handoff

