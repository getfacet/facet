# Execution Manifest: View-State Channel
#
# Keep synchronized with specs/dev-specs/view-state-channel.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "view-state-channel"
spec_path: "specs/dev-specs/view-state-channel.md"
context_evidence_path: "specs/context/view-state-channel.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "playground buildable; quickstart bundle builds for the WU-7 real-bundle path"
    owner: "main-agent"
    verification: "pnpm --filter @facet/quickstart build"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "Core contract + shared sanitizeView"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Add the ViewSnapshot type, closed enums, MAX_VIEW_* caps, the pure sanitizeView, and the optional view? field on both event unions."
    module_shape:
      decision: "sibling-helper"
      rationale: "New pure node-free view.ts sits beside protocol.ts (like the sanitizeActionPayload precedent); public via `export * from './view.js'` in index.ts. protocol.ts imports the ViewSnapshot type one-directionally (no cycle). Tests co-located."
    files:
      - path: "packages/core/core/src/view.ts"
        change_type: "add"
        purpose: "Viewport/Scheme/ViewSnapshot types, MAX_VIEW_TOGGLED_KEYS, pure sanitizeView (drop enums, cap+drop-oldest toggled, length-cap screen/keys)."
      - path: "packages/core/core/src/protocol.ts"
        change_type: "update"
        purpose: "Add view?: ViewSnapshot to every CollectedEvent and ClientEvent variant, mirroring fields?."
      - path: "packages/core/core/src/index.ts"
        change_type: "update"
        purpose: "Export the new view.js surface through the barrel."
      - path: "packages/core/core/src/view.test.ts"
        change_type: "add"
        purpose: "sanitizeView clamp/drop/enum/cap unit suite + returns-undefined on junk (DC-003)."
      - path: "packages/core/core/src/protocol.test.ts"
        change_type: "update"
        purpose: "Assert view? on both unions and forward⊆collected holds with view (DC-007)."
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "pnpm exec vitest run packages/core/core/src/view.test.ts -t 'sanitizeView'"
      target: "packages/core/core/src/view.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/core/src/view.test.ts -t 'sanitizeView'"
      - "pnpm exec vitest run packages/core/core/src/protocol.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/core/src"
    test_plan:
      - type: "unit"
        target: "packages/core/core/src/view.test.ts"
        covers_dc: ["DC-003"]
        action: "new"
      - type: "unit"
        target: "packages/core/core/src/protocol.test.ts"
        covers_dc: ["DC-007"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "sanitizeView is pure/node-free (no window/localStorage/Node imports)"
      - "view? additive on both unions; forward⊆collected preserved"
      - "No regression: packages/core/core/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-2"
    title: "Server /event boundary clamp"
    owner_role: "subagent"
    packages: ["@facet/server"]
    objective: "Clamp view at the untrusted /event boundary using core sanitizeView, never rejecting the event for view reasons."
    module_shape:
      decision: "preserve"
      rationale: "Add an exported sanitizeEventView to server-validation.ts (a NEW event object, separate from the accept/reject type guard) and call it in server-post.ts before runtime.handle; no new module needed."
    files:
      - path: "packages/core/server/src/server-validation.ts"
        change_type: "update"
        purpose: "Add sanitizeEventView(event): ClientEvent that replaces view via core sanitizeView; isEventBody keeps ignoring view."
      - path: "packages/core/server/src/server-post.ts"
        change_type: "update"
        purpose: "In handleEvent, after isEventBody passes, replace event with sanitizeEventView(event) before runtime.handle."
      - path: "packages/core/server/src/server-validation.test.ts"
        change_type: "add"
        purpose: "Hostile view input drop/clamp + event still processes + no throw (DC-003); no-view event unchanged (DC-007)."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm exec vitest run packages/core/server/src/server-validation.test.ts -t 'view'"
      target: "packages/core/server/src/server-validation.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/server/src/server-validation.test.ts -t 'view'"
      - "pnpm exec vitest run packages/core/server/src/server-validation.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/server/src"
    test_plan:
      - type: "unit"
        target: "packages/core/server/src/server-validation.test.ts"
        covers_dc: ["DC-003", "DC-007"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Malformed/oversized view never 400s the event; event still processes"
      - "sanitizeEventView calls core sanitizeView (no re-implemented bounds)"
      - "No regression: packages/core/server/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-3"
    title: "React view-snapshot capture + publish + device detection"
    owner_role: "subagent"
    packages: ["@facet/react"]
    objective: "Let StageRenderer publish its live {screen,toggled,viewport,scheme} snapshot read-only through a new callback, with report-only viewport/scheme detection that never sends."
    module_shape:
      decision: "sibling-helper"
      rationale: "New view-snapshot.ts holds the snapshot builder + useViewportScheme hook (kept OUT of layout/boxStyle, RISK-INV-5), consumed by StageRenderer and exported via index.ts. Setters stay private in StageRenderer (RISK-INV-1)."
    files:
      - path: "packages/core/react/src/view-snapshot.ts"
        change_type: "add"
        purpose: "captureViewSnapshot builder + useViewportScheme (matchMedia narrow|medium|wide + light|dark); listeners mutate state only, no layout import."
      - path: "packages/core/react/src/StageRenderer.tsx"
        change_type: "update"
        purpose: "Add optional onViewSnapshot; derive toggled from visibilityOverrides+currentScreen; call useViewportScheme; publish snapshot via post-commit effect. Setters unchanged."
      - path: "packages/core/react/src/index.ts"
        change_type: "update"
        purpose: "Export the view-snapshot surface."
      - path: "packages/core/react/src/view-snapshot.test.ts"
        change_type: "add"
        purpose: "Snapshot builder + detection unit tests; resize/scheme change fires no send/record (DC-006); structural fence (RISK-INV-5): brick-renderer-layout.tsx/boxStyle neither import view-snapshot.ts nor read viewport/scheme."
      - path: "packages/core/react/src/StageRenderer.test.ts"
        change_type: "update"
        purpose: "onViewSnapshot publishes on navigate/toggle; setters occur only within handlePress (DC-005)."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm exec vitest run packages/core/react/src/view-snapshot.test.ts -t 'captureViewSnapshot'"
      target: "packages/core/react/src/view-snapshot.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/react/src/view-snapshot.test.ts"
      - "pnpm exec vitest run packages/core/react/src/StageRenderer.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/react/src"
    test_plan:
      - type: "unit"
        target: "packages/core/react/src/view-snapshot.test.ts"
        covers_dc: ["DC-001", "DC-006"]
        action: "new"
      - type: "unit"
        target: "packages/core/react/src/StageRenderer.test.ts"
        covers_dc: ["DC-005"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "onViewSnapshot optional; existing StageRenderer consumers compile unchanged"
      - "viewport/scheme never read by boxStyle/brick-renderer-layout — enforced by the structural fence test in view-snapshot.test.ts (RISK-INV-5); no send on resize/scheme (DC-006)"
      - "Setters remain only in handlePress (DC-005)"
      - "No regression: packages/core/react/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-4"
    title: "Client per-agent-link persistence helper"
    owner_role: "subagent"
    packages: ["@facet/client"]
    objective: "Framework-neutral localStorage persistence of the last-known view snapshot, per agent link, schema-validated on read, degrading silently."
    module_shape:
      decision: "sibling-helper"
      rationale: "New view-storage.ts mirrors visitor.ts (pure, framework-neutral, imports only @facet/core). Exported via client index.ts. Hard constraint: MUST NOT import @facet/react (RISK-PKG-1)."
    files:
      - path: "packages/core/client/src/view-storage.ts"
        change_type: "add"
        purpose: "persistView/loadPersistedView under key facet:view:<agentId>; visitor.ts degrade pattern; validate read via core sanitizeView."
      - path: "packages/core/client/src/index.ts"
        change_type: "update"
        purpose: "Export persistView/loadPersistedView."
      - path: "packages/core/client/src/view-storage.test.ts"
        change_type: "add"
        purpose: "Persist→load round-trip; corrupt/empty → undefined (DC-002); localStorage undefined/throwing → no crash (DC-004)."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm exec vitest run packages/core/client/src/view-storage.test.ts -t 'persist'"
      target: "packages/core/client/src/view-storage.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/core/client/src/view-storage.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/core/client/src"
    test_plan:
      - type: "unit"
        target: "packages/core/client/src/view-storage.test.ts"
        covers_dc: ["DC-002", "DC-004"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "@facet/client imports only @facet/core (no @facet/react)"
      - "Storage-less/throwing → undefined, no crash/console spam (DC-004)"
      - "Read payload validated via core sanitizeView (DC-002)"
      - "No regression: packages/core/client/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-5"
    title: "Agent surfaces — prompt view line + guidance + DC-005 fence"
    owner_role: "subagent"
    packages: ["@facet/reference-agent", "@facet/agent-tools"]
    objective: "Render one inert view line in describeEvent (current + revisit), prime the agent via prompt-kit, and prove view reaches no executor/patch path."
    module_shape:
      decision: "preserve"
      rationale: "describeEvent already owns per-kind event rendering; append one bounded inert line. prompt-kit is static prompt text; add one guidance sentence. No new modules; agent-tools does not render events (observation.ts is tool-result only), so the event line lives in reference-agent."
    files:
      - path: "packages/agent-stack/reference-agent/src/prompt/messages.ts"
        change_type: "update"
        purpose: "Append a bounded inert view line for message/tap/visit when view present; omit when absent; no executor routing."
      - path: "packages/agent-stack/reference-agent/src/prompt.test.ts"
        change_type: "update"
        purpose: "Line rendered from view (DC-001); omitted when absent (DC-007); structural grep that view reaches no patch/fold/executor site (DC-005)."
      - path: "packages/agent-stack/agent-tools/src/prompt-kit.ts"
        change_type: "update"
        purpose: "Add one guidance sentence in FACET_PAGE_EXPERIENCE_PROMPT to target the visitor's current screen."
      - path: "packages/agent-stack/agent-tools/src/prompt-kit.test.ts"
        change_type: "update"
        purpose: "Assert the guidance sentence is present."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm exec vitest run packages/agent-stack/reference-agent/src/prompt.test.ts -t 'view'"
      target: "packages/agent-stack/reference-agent/src/prompt.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/agent-stack/reference-agent/src/prompt.test.ts"
      - "pnpm exec vitest run packages/agent-stack/agent-tools/src/prompt-kit.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/agent-stack/reference-agent/src"
      - "pnpm exec vitest run packages/agent-stack/agent-tools/src"
    test_plan:
      - type: "unit"
        target: "packages/agent-stack/reference-agent/src/prompt.test.ts"
        covers_dc: ["DC-001", "DC-005", "DC-007"]
        action: "update"
      - type: "unit"
        target: "packages/agent-stack/agent-tools/src/prompt-kit.test.ts"
        covers_dc: ["DC-001"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "view rendered as an inert line only; absent → omitted (DC-007)"
      - "Structural test proves view reaches no patch/fold/executor path (DC-005)"
      - "No regression: reference-agent + agent-tools suites"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-6"
    title: "AG-UI input normalizer view pass-through"
    owner_role: "subagent"
    packages: ["@facet/ag-ui"]
    objective: "Stop the AG-UI adapter from silently stripping view; pass a clamped view through both normalizers using core sanitizeView."
    module_shape:
      decision: "preserve"
      rationale: "normalizeClientEvent/normalizeCollectedEvent already rebuild each event from a fixed allowlist; add a conditional-spread view field via core sanitizeView, matching existing style. No new module."
    files:
      - path: "packages/extensions/ag-ui/src/server-input.ts"
        change_type: "update"
        purpose: "In both normalizers, add view via sanitizeView(value['view']), spread only when defined."
      - path: "packages/extensions/ag-ui/src/server.test.ts"
        change_type: "update"
        purpose: "RunAgentInput carrying view yields normalized event with clamped view (DC-001); input without view still normalizes valid (DC-007)."
    depends_on: ["WU-1"]
    parallel_group: "par-1"
    red_check:
      command: "pnpm exec vitest run packages/extensions/ag-ui/src/server.test.ts -t 'view'"
      target: "packages/extensions/ag-ui/src/server.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/extensions/ag-ui/src/server.test.ts -t 'view'"
      - "pnpm exec vitest run packages/extensions/ag-ui/src/server.test.ts"
    no_regression_checks:
      - "pnpm exec vitest run packages/extensions/ag-ui/src"
    test_plan:
      - type: "unit"
        target: "packages/extensions/ag-ui/src/server.test.ts"
        covers_dc: ["DC-001", "DC-007"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "Both normalizers pass a clamped view through (via core sanitizeView)"
      - "Input without view still normalizes valid (DC-007)"
      - "No regression: packages/extensions/ag-ui/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"

  - id: "WU-7"
    title: "Host wiring — attach view on send + persist + revisit"
    owner_role: "subagent"
    packages: ["@facet/quickstart", "apps/playground"]
    objective: "Compose view onto outgoing visit/message/tap events at the host, persist the snapshot per agent link, and seed the revisit visit from storage — making the feature live for /live-test."
    module_shape:
      decision: "sibling-helper"
      rationale: "Extract a pure withView helper beside main.tsx so the host attach is unit-testable (main.tsx is a browser entry with no test); playground inlines the same conditional-spread. Live path proven by /live-test Tier-1 real-bundle."
    files:
      - path: "packages/agent-stack/quickstart/src/page/view-attach.ts"
        change_type: "add"
        purpose: "Pure withView(event, snap?) conditional-spread attach (mirrors fields; no-op when snap undefined)."
      - path: "packages/agent-stack/quickstart/src/page/main.tsx"
        change_type: "update"
        purpose: "Hold viewRef; pass onViewSnapshot to StageRenderer (store + persistView); attach withView on onSend/onAction/visit; seed visit from loadPersistedView."
      - path: "packages/agent-stack/quickstart/src/page/view-attach.test.ts"
        change_type: "add"
        purpose: "withView composes view when present, omits when absent (DC-001)."
      - path: "apps/playground/src/App.tsx"
        change_type: "update"
        purpose: "Same conditional-spread attach on the tap send path."
      - path: "apps/playground/src/live.tsx"
        change_type: "update"
        purpose: "Same conditional-spread attach on the tap/message send path."
    depends_on: ["WU-1", "WU-3", "WU-4"]
    parallel_group: "serial-b"
    red_check:
      command: "pnpm exec vitest run packages/agent-stack/quickstart/src/page/view-attach.test.ts -t 'withView'"
      target: "packages/agent-stack/quickstart/src/page/view-attach.test.ts"
      justification: ""
    quick_checks:
      - "pnpm exec vitest run packages/agent-stack/quickstart/src/page/view-attach.test.ts"
      - "pnpm --filter @facet/quickstart build"
    no_regression_checks:
      - "pnpm exec vitest run packages/agent-stack/quickstart/src"
    test_plan:
      - type: "unit"
        target: "packages/agent-stack/quickstart/src/page/view-attach.test.ts"
        covers_dc: ["DC-001"]
        action: "new"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "send(event) still callable without view; playground/quickstart compile"
      - "view attached on all three forwarded kinds; revisit visit seeded from storage"
      - "Quickstart bundle builds; no regression: packages/agent-stack/quickstart/src"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before"
      - "red_check_output_after"
      - "green_diff_summary"
      - "refactor_decision"
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"
