  - id: "WU-3"
    title: "Renderer behavior — hold gesture, appear class + conditional style element, raw-path fail-safe, view-state coherence"
    owner_role: "subagent"
    packages: ["@facet/react"]
    objective: "StageRenderer detects long-press via an internal HoldableBox (only when a classifiable onHold exists) routing through the ONE existing classifyPress/handlePress seam with post-hold click suppression; applies the appear class per node and renders the APPEAR_CSS <style> element iff the tree uses appear; never throws on raw-path junk; preserves scroll-container DOM identity across unrelated patches."
    files:
      - path: "packages/react/src/StageRenderer.tsx"
        change_type: "update"
        purpose: "HOLD_MS/HOLD_SLOP_PX constants; internal HoldableBox (pointer events + timer, latest-classification ref, suppress-next-click latch cleared on consume-by-click OR next pointerdown whichever first, armed-only contextmenu suppression); classifyPress reuse for onHold; appear class via appearClass; flat non-recursive NULL-GUARDED prescan over the tree.nodes record values (Decision 4: never follows children and checks n != null before touching .style — cycle/depth-safe AND null/scalar-node-value-safe on the raw path, mirroring renderNode's node == null guard) gates the once-per-stage <style>{APPEAR_CSS}</style>; replay-on-mount documented"
      - path: "packages/react/src/StageRenderer.interaction.test.tsx"
        change_type: "update"
        purpose: "jsdom fake-timer suite: hold local kinds zero-transport; hold-agent ONE event, shape byte-identical to press (no gesture field), payload/collect intact; tap/hold/below-threshold split; slop cancel; mid-press removal no-op; hold-only tap no-op; consecutive gestures: hold completed with pointerup OUTSIDE the box then quick tap => onPress fires (latch reset on next pointerdown); hold-then-hold => exactly two onHold actions; scroll-container element identity survives sibling patch; toggle re-show remount pinned"
      - path: "packages/react/src/StageRenderer.test.ts"
        change_type: "update"
        purpose: "static suite: appear class + style element rendered; token-free tree byte-identical (snapshot equality, no style element); raw junk (appear:'explode', onHold:42, scroll:'sideways') renders plain, never throws; CYCLIC raw tree containing an appear token renders without hanging or throwing (prescan cycle-safety, DC-005); raw tree whose nodes record contains a NULL and a SCALAR node value alongside an appear-token node renders without throwing (prescan null-guard, DC-005)"
    depends_on: ["WU-1", "WU-4"]
    parallel_group: "serial-b"
