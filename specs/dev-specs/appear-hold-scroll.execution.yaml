# Keep synchronized with specs/dev-specs/appear-hold-scroll.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "appear-hold-scroll"
spec_path: "specs/dev-specs/appear-hold-scroll.md"
context_evidence_path: "specs/context/appear-hold-scroll.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "pnpm install done; playground buildable for WU-6 demo + DC-009 real-browser check; quickstart bundle rebuildable (RISK-API-7)"
    owner: "main-agent"
    verification: "pnpm --filter @facet/playground dev reachable; pnpm --filter @facet/quickstart build succeeds"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"

work_units:
  - id: "WU-1"
    title: "Core vocabulary — APPEARS group, scroll/appear on BoxStyle, onHold on BoxNode, dual-path-shared validation"
    owner_role: "subagent"
    packages: ["@facet/core"]
    objective: "Land the three words in the contract (APPEARS token group, BoxStyle.appear?/scroll?, BoxNode.onHold?) with validateTree normalization via the field-label-parameterized asAction and the extended boxStyle whitelist, covering tree, fold, and stamp paths in lockstep."
    files:
      - path: "packages/core/src/tokens.ts"
        change_type: "update"
        purpose: "APPEARS = [\"none\",\"fade\",\"slide\"] as const + Appear type (existing const-array pattern)"
      - path: "packages/core/src/nodes.ts"
        change_type: "update"
        purpose: "BoxStyle.appear?, BoxStyle.scroll?, BoxNode.onHold? (mirrors onPress optional-field pattern) + doc comments incl. replay-on-mount and hold-secondary semantics"
      - path: "packages/core/src/validate.ts"
        change_type: "update"
        purpose: "asAction(value, nodeId, field, issues) label parameterization; onHold normalized at the sanitizeNode box arm; boxStyle whitelist gains appear (APPEARS) + scroll (asBool)"
      - path: "packages/core/src/validate.test.ts"
        change_type: "update"
        purpose: "RED-first: junk appear/scroll/onHold stripped (issues name onHold, not onPress); legacy bare-{name} onHold stamped agent; validateStamp parity; pre-D tree byte-identical"
      - path: "packages/core/src/stage-fold.test.ts"
        change_type: "update"
        purpose: "folding a live patch that writes junk appear/scroll/onHold strips it identically (client re-fold path parity)"
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      command: "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts -t 'strips unknown appear scroll tokens and malformed onHold'"
      target: "packages/core/src/validate.test.ts"
      justification: ""
    quick_checks:
      - "re-run red_check"
      - "cd /Users/hoon/workspace/apps/facet && pnpm exec vitest run packages/core/src/validate.test.ts packages/core/src/stage-fold.test.ts"
      - "cd /Users/hoon/workspace/apps/facet && pnpm typecheck"
    no_regression_checks:
      - "cd /Users/hoon/workspace/apps/facet && pnpm test"
      - "cd /Users/hoon/workspace/apps/facet && pnpm lint"
    test_plan:
      - type: "unit"
        target: "packages/core/src/validate.test.ts"
        covers_dc: ["DC-005", "DC-007"]
        action: "update"
      - type: "unit"
        target: "packages/core/src/stage-fold.test.ts"
        covers_dc: ["DC-005"]
        action: "update"
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl)"
      - "asAction issues name the actual field (onHold diagnostics never say onPress); onPress issue behavior unchanged"
      - "validateTree/foldPatchIntoStage/validateStamp all strip the same junk (shared sanitizeNode — one addition, three paths verified)"
      - "No regression: pnpm test + pnpm lint"
