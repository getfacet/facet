# Execution Manifest: [Feature Name]
#
# Keep synchronized with .agents/work/<slug>/dev-spec.md (WU ids, files, deps, checks).
# Final gate source of truth: AGENTS.md + docs/REVIEW-RULES.md.

feature_slug: "feature-slug"
spec_path: ".agents/work/feature-slug/dev-spec.md"
context_evidence_path: ".agents/work/feature-slug/context.md"

shared_preflight:
  - concern: "baseline-green"
    requirement: "pnpm typecheck && pnpm test && pnpm lint pass before any WU starts"
    owner: "main-agent"
    verification: "run the three commands"
  - concern: "runtime"
    requirement: "[e.g. playground buildable; local server/bridge if the WU needs a live check]"
    owner: "main-agent"
    verification: "[command]"

review_fix_policy:
  batching_rule: "Group review comments into batches. Subagents apply scoped fixes + quick checks. Main agent re-runs /verify + /code-review once per batch; the full feature hard gate still runs at the end."
  subagent_scope: "Work Unit files + quick_checks + no_regression_checks only"
  final_gate_rerun_owner: "main-agent"

final_gate_owner: "main-agent"
final_gate_chain:
  flow: "feature"
  steps:
    - "/worktree-prep"
    - "/update-tests"
    - "/verify"
    - "/code-review"
    - "/live-test"
    - "/update-docs"

work_units:
  - id: "WU-1"
    title: "[short title]"
    owner_role: "subagent" # subagent | main-agent
    packages: ["@facet/core"] # affected Facet package(s)
    objective: "[one sentence]"
    module_shape:
      decision: "preserve" # preserve | sibling-helper | role-directory | package-shared | public-surface | no-split
      rationale: "[why this shape fits; include public/private boundary, import direction, and test placement when splitting or adding scaffold]"
    files:
      - path: "packages/<group>/<pkg>/src/<file>.ts"
        change_type: "update" # add | update | delete
        purpose: "[why]"
    depends_on: []
    parallel_group: "serial-a"
    red_check:
      # TDD-first. FAIL before impl, PASS after. Required for prod-code WUs.
      # Deletion/docs/move-only: command = "N/A" + justification.
      command: "pnpm exec vitest run packages/<group>/<pkg>/src/<file>.test.ts -t '<name>'"
      target: "packages/<group>/<pkg>/src/<file>.test.ts"
      justification: "" # required only when command == "N/A"
    quick_checks:
      - "[first re-runs red_check, then any scoped check]"
    no_regression_checks:
      - "pnpm exec vitest run packages/<group>/<pkg>/src"
    test_plan:
      - type: "unit" # unit | integration | e2e
        target: "packages/<group>/<pkg>/src/<file>.test.ts"
        covers_dc: ["DC-001"]
        action: "new" # new | update
    done_conditions:
      - "RED→GREEN evidence reported (red_check FAIL pre-impl + PASS post-impl); N/A WUs acknowledge justification"
      - "[testable completion condition]"
      - "No regression: [suite]"
    handoff_format:
      - "changed_files"
      - "executed_commands"
      - "red_check_output_before" # raw FAIL output before any prod-code edit
      - "red_check_output_after" # raw PASS output after impl
      - "green_diff_summary" # {production_lines_added, production_lines_removed, non_red_check_tests_newly_passing}
      - "refactor_decision" # applied:<...> | skipped:<per-trigger evidence> | skipped_scope_exceeded:<trigger>@<path>:<line>
      - "pass_fail"
      - "first_error_line"
      - "assumptions"
      - "next_action"
